name: Export Approved Prompts
on:
  schedule:
    - cron: '0 14 * * 1'   # Every Monday 2PM UTC
  workflow_dispatch:        # Manual trigger from Actions tab

jobs:
  export:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase Admin
        run: npm install firebase-admin

      - name: Run export script
        env:
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
        run: node export-prompts.cjs

      - name: Check for changes
        id: changes
        run: |
          if [ ! -f "prompts.js" ] || ! git diff --quiet prompts.js; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "PA Agent"
          git config user.email "promptaholics1@gmail.com"
          git add prompts.js
          COUNT=$(node -e "if(require('fs').existsSync('prompts.js')){const c=require('fs').readFileSync('prompts.js','utf8');console.log((c.match(/id:/g)||[]).length)}else{console.log(0)}")
          git commit -m "📚 Auto-export: library updated to ${COUNT} prompts [$(date +'%Y-%m-%d')]"
          git push

      - name: No new prompts
        if: steps.changes.outputs.changed == 'false'
        run: echo "No new approved prompts to export."
