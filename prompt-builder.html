<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>Prompt Builder — Promptaholics</title>
<meta name="description" content="Build expert AI prompts with 9 proven frameworks. Free prompt builder for ChatGPT, Claude, Midjourney, Sora and more."/>
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css"/>

<style>
/* ── Reset & Base ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#07070a;
  --bg2:#0d0d12;
  --surface:rgba(255,255,255,0.04);
  --surface2:rgba(255,255,255,0.07);
  --surface3:rgba(255,255,255,0.10);
  --border:rgba(255,255,255,0.08);
  --border2:rgba(255,255,255,0.14);
  --text:#f0f0f8;
  --text2:#9090b0;
  --text3:#44445a;
  --orange:#ff6224;
  --orange2:#e84e0e;
  --orange-glow:rgba(255,98,36,0.35);
  --orange-dim:rgba(255,98,36,0.12);
  --blur:blur(20px);
  --radius:18px;
  --tab-h:64px;
}

html,body{
  height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:'Instrument Sans',sans-serif;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

/* ── Animated background ── */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 10% 20%, rgba(255,98,36,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 90% 80%, rgba(124,58,237,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 40% 50% at 50% 10%, rgba(0,212,170,0.04) 0%, transparent 50%);
  pointer-events:none;
  z-index:0;
  animation:bgShift 12s ease-in-out infinite alternate;
}
@keyframes bgShift{
  0%{opacity:1;}
  100%{opacity:.6;}
}

/* ── Glass mixin ── */
.glass{
  background:var(--surface);
  backdrop-filter:var(--blur);
  -webkit-backdrop-filter:var(--blur);
  border:1px solid var(--border2);
}
.glass-bright{
  background:var(--surface2);
  backdrop-filter:var(--blur);
  -webkit-backdrop-filter:var(--blur);
  border:1px solid var(--border2);
}

/* ── NAV ── */
.nav{
  position:fixed;top:0;left:0;right:0;
  height:52px;
  background:rgba(7,7,10,0.85);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;
  z-index:100;
}
.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none;}
.nav-logo-mark{
  width:28px;height:28px;
  background:var(--orange);
  border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 12px var(--orange-glow);
}
.nav-logo-mark svg{width:11px;height:13px;}
.nav-logo-text{font-family:'Syne',serif;font-size:14px;font-weight:800;color:var(--text);}
.nav-logo-text span{color:var(--orange);}
.nav-links{display:flex;gap:6px;align-items:center;}
.nav-link{
  font-size:12px;color:var(--text2);text-decoration:none;
  padding:5px 10px;border-radius:8px;transition:all .15s;
}
.nav-link:hover{color:var(--orange);background:var(--orange-dim);}
.nav-home-btn{
  font-size:12px;font-weight:700;color:var(--text2);
  background:var(--surface);border:1px solid var(--border2);
  padding:5px 12px;border-radius:8px;text-decoration:none;
  transition:all .15s;
}
.nav-home-btn:hover{border-color:var(--orange);color:var(--orange);}

/* ── MAIN LAYOUT ── */
.app{
  position:fixed;
  top:52px;bottom:0;left:0;right:0;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  z-index:1;
}

/* ── MOBILE TAB BAR ── */
.tab-bar{
  display:flex;
  background:rgba(7,7,10,0.92);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  border-top:1px solid var(--border);
  flex-shrink:0;
  order:2;
  padding-bottom:env(safe-area-inset-bottom);
}
.tab-btn{
  flex:1;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:3px;
  padding:10px 0 8px;
  background:none;border:none;
  color:var(--text3);
  cursor:pointer;
  transition:all .2s;
  font-family:'Instrument Sans',sans-serif;
  position:relative;
  touch-action:manipulation;
}
.tab-btn .t-icon{font-size:20px;transition:transform .2s;}
.tab-btn .t-label{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;}
.tab-btn.active{color:var(--orange);}
.tab-btn.active .t-icon{transform:translateY(-2px);}
.tab-btn::after{
  content:'';
  position:absolute;bottom:0;left:20%;right:20%;
  height:2px;border-radius:2px;
  background:var(--orange);
  opacity:0;
  transition:opacity .2s;
  box-shadow:0 0 8px var(--orange);
}
.tab-btn.active::after{opacity:1;}

/* ── TAB PANELS ── */
.panels{
  flex:1;
  overflow:hidden;
  position:relative;
  order:1;
}
.panel{
  position:absolute;
  inset:0;
  overflow-y:auto;
  overflow-x:hidden;
  padding:12px 12px 16px;
  display:none;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:thin;
  scrollbar-color:var(--border2) transparent;
}
.panel.active{display:block;}
.panel::-webkit-scrollbar{width:4px;}
.panel::-webkit-scrollbar-track{background:transparent;}
.panel::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* ── PANEL HEADER ── */
.panel-hdr{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;padding:0 2px;
}
.panel-title{
  font-family:'Syne',serif;
  font-size:16px;font-weight:800;
  color:var(--text);
  letter-spacing:-.3px;
}
.panel-sub{font-size:11px;color:var(--text3);margin-top:2px;}

/* ── FRAMEWORK CARDS ── */
.fw-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}
.fw-card{
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:14px;
  padding:14px 12px;
  cursor:pointer;
  transition:all .2s;
  position:relative;
  overflow:hidden;
  touch-action:manipulation;
}
.fw-card::before{
  content:'';
  position:absolute;
  inset:-1px;
  border-radius:14px;
  background:linear-gradient(135deg,var(--fw-color,#ff6224)22,transparent 60%);
  opacity:0;
  transition:opacity .2s;
}
.fw-card:active{transform:scale(0.97);}
.fw-card.active{
  border-color:var(--fw-color,var(--orange));
  background:var(--surface2);
  box-shadow:0 0 20px -5px var(--fw-color,var(--orange-glow));
}
.fw-card.active::before{opacity:1;}
.fw-icon-wrap{
  width:32px;height:32px;
  border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;
  margin-bottom:8px;
  background:rgba(var(--fw-r,255),var(--fw-g,98),var(--fw-b,36),0.15);
}
.fw-name{
  font-family:'Syne',serif;
  font-size:13px;font-weight:800;
  color:var(--text);
  margin-bottom:2px;
  line-height:1.2;
}
.fw-desc{
  font-size:10px;
  color:var(--text3);
  line-height:1.4;
}

/* ── TOOL SELECTOR ── */
.tool-pills{
  display:flex;gap:6px;
  overflow-x:auto;
  scrollbar-width:none;
  padding-bottom:2px;
  margin-bottom:12px;
}
.tool-pills::-webkit-scrollbar{display:none;}
.tool-pill{
  flex-shrink:0;
  padding:7px 14px;
  border-radius:20px;
  border:1px solid var(--border2);
  background:var(--surface);
  font-size:11px;font-weight:700;
  color:var(--text2);
  cursor:pointer;
  transition:all .15s;
  white-space:nowrap;
  font-family:'Instrument Sans',sans-serif;
  touch-action:manipulation;
}
.tool-pill.active{
  background:rgba(255,98,36,0.15);
  border-color:rgba(255,98,36,0.4);
  color:var(--orange);
  box-shadow:0 0 12px -3px var(--orange-glow);
}

/* ── BUILD TAB ── */
.fw-header-bar{
  display:flex;align-items:center;gap:10px;
  padding:12px 14px;
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:14px;
  margin-bottom:12px;
}
.fw-header-icon{
  width:36px;height:36px;
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;
  flex-shrink:0;
}
.fw-header-name{
  font-family:'Syne',serif;
  font-size:14px;font-weight:800;
  color:var(--text);
}
.fw-header-desc{font-size:10px;color:var(--text3);margin-top:2px;}
.change-fw-btn{
  margin-left:auto;
  padding:5px 10px;
  border-radius:8px;
  border:1px solid var(--border2);
  background:none;
  color:var(--text3);
  font-size:11px;font-weight:600;
  cursor:pointer;
  white-space:nowrap;
  font-family:'Instrument Sans',sans-serif;
  flex-shrink:0;
}

/* ── BLOCKS ── */
.block{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  margin-bottom:8px;
  overflow:hidden;
  animation:blockSlide .2s ease both;
}
@keyframes blockSlide{
  from{opacity:0;transform:translateY(8px);}
  to{opacity:1;transform:translateY(0);}
}
.block-hdr{
  display:flex;align-items:center;gap:8px;
  padding:10px 12px 8px;
  border-bottom:1px solid var(--border);
}
.block-tag{
  font-size:9px;font-weight:800;
  padding:2px 6px;
  border-radius:5px;
  letter-spacing:.5px;
  text-transform:uppercase;
  flex-shrink:0;
}
.block-label{
  font-size:12px;font-weight:700;
  color:var(--text);
  flex:1;
}
.block-clear{
  background:none;border:none;
  color:var(--text3);
  font-size:14px;
  cursor:pointer;
  padding:2px 4px;
  border-radius:5px;
  transition:color .15s;
}
.block-clear:hover{color:var(--orange);}
.block-body{padding:10px 12px;}
.block-input{
  width:100%;
  background:transparent;
  border:none;outline:none;
  color:var(--text);
  font-family:'Instrument Sans',sans-serif;
  font-size:14px;
  line-height:1.6;
  resize:none;
  min-height:42px;
}
.block-input::placeholder{color:var(--text3);}
.block-input:focus{color:var(--text);}
select.block-input{
  -webkit-appearance:none;
  cursor:pointer;
  min-height:32px;
  padding:4px 0;
}
select.block-input option{background:#111118;color:var(--text);}

/* ── MIC BTN ── */
.mic-btn{
  width:36px;height:36px;
  border-radius:50%;
  background:var(--surface2);
  border:1.5px solid var(--border2);
  color:var(--text2);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;
  transition:all .2s;
  flex-shrink:0;
}
.mic-btn.listening{
  background:rgba(255,98,36,0.15);
  border-color:var(--orange);
  color:var(--orange);
  animation:micPulse 1s ease-in-out infinite;
  box-shadow:0 0 16px -4px var(--orange-glow);
}
@keyframes micPulse{
  0%,100%{box-shadow:0 0 0 0 var(--orange-glow);}
  50%{box-shadow:0 0 0 8px rgba(255,98,36,0);}
}

/* ── ADD BLOCK BAR ── */
.add-bar{
  display:flex;gap:6px;flex-wrap:wrap;
  padding:10px 12px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  margin-bottom:8px;
}
.add-bar-label{
  font-size:10px;color:var(--text3);
  flex-basis:100%;
  font-weight:600;letter-spacing:.5px;text-transform:uppercase;
}
.add-block-btn{
  padding:5px 10px;
  border-radius:8px;
  border:1px solid var(--border2);
  background:none;
  color:var(--text2);
  font-size:11px;font-weight:600;
  cursor:pointer;
  font-family:'Instrument Sans',sans-serif;
  transition:all .15s;
}
.add-block-btn:hover{border-color:var(--orange);color:var(--orange);}

/* ── PREVIEW ── */
.preview-box{
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:14px;
  overflow:hidden;
  margin-bottom:8px;
  min-height:180px;
  position:relative;
}
.preview-box.has-content{border-color:rgba(255,98,36,0.3);}
.preview-hdr{
  display:flex;align-items:center;gap:8px;
  padding:10px 14px;
  border-bottom:1px solid var(--border);
}
.preview-label{
  font-size:11px;font-weight:700;
  color:var(--text2);
  text-transform:uppercase;
  letter-spacing:.8px;
  flex:1;
}
.preview-stats{display:flex;gap:10px;}
.pstat{font-size:10px;color:var(--text3);}
.pstat span{color:var(--text2);font-weight:700;}
.preview-text{
  padding:14px;
  font-family:'JetBrains Mono',monospace;
  font-size:12px;
  line-height:1.7;
  color:var(--text2);
  white-space:pre-wrap;
  word-break:break-word;
  min-height:140px;
}
.preview-empty{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:140px;
  color:var(--text3);
  font-size:12px;
  text-align:center;
  gap:8px;
  padding:20px;
  font-family:'Instrument Sans',sans-serif;
}
.preview-empty .big{font-size:32px;}

/* ── ACTION BUTTONS ── */
.action-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-bottom:8px;
}
.action-row.three{grid-template-columns:1fr 1fr 1fr;}

.btn{
  padding:14px;
  border-radius:12px;
  font-family:'Instrument Sans',sans-serif;
  font-size:13px;font-weight:700;
  cursor:pointer;
  border:none;
  display:flex;align-items:center;justify-content:center;gap:6px;
  transition:all .15s;
  touch-action:manipulation;
}
.btn-primary{
  background:var(--orange);
  color:#fff;
  box-shadow:0 4px 16px -4px var(--orange-glow);
}
.btn-primary:hover{background:var(--orange2);}
.btn-primary:active{transform:scale(0.97);}
.btn-primary:disabled{opacity:.4;pointer-events:none;}

/* Shimmer on primary button */
.btn-primary.loading{
  background:linear-gradient(90deg,var(--orange),#ff9f24,var(--orange));
  background-size:200% 100%;
  animation:shimmer .8s linear infinite;
}
@keyframes shimmer{to{background-position:-200% 0;}}

.btn-secondary{
  background:var(--surface2);
  color:var(--text2);
  border:1px solid var(--border2);
}
.btn-secondary:hover{border-color:var(--orange);color:var(--orange);}
.btn-secondary:active{transform:scale(0.97);}
.btn-secondary:disabled{opacity:.4;pointer-events:none;}

.btn-ghost{
  background:none;
  color:var(--text3);
  border:1px solid var(--border);
  font-size:12px;
  padding:10px;
}
.btn-ghost:hover{color:var(--text);border-color:var(--border2);}

/* ── OPEN IN TOOL ── */
.tool-open-row{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:6px;
  margin-bottom:8px;
}
.tool-open-btn{
  padding:10px 6px;
  border-radius:10px;
  border:1px solid var(--border);
  background:var(--surface);
  color:var(--text3);
  font-size:10px;font-weight:700;
  cursor:pointer;
  font-family:'Instrument Sans',sans-serif;
  text-align:center;
  transition:all .15s;
  display:flex;flex-direction:column;
  align-items:center;gap:3px;
  touch-action:manipulation;
}
.tool-open-btn:hover{border-color:var(--orange);color:var(--orange);}
.tool-open-btn .t-em{font-size:16px;}

/* ── IMPROVE SECTION ── */
.improve-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  overflow:hidden;
  margin-bottom:8px;
}
.improve-toggle{
  display:flex;align-items:center;gap:8px;
  padding:12px 14px;
  cursor:pointer;
  font-size:13px;font-weight:700;
  color:var(--text2);
  transition:color .15s;
  background:none;border:none;width:100%;text-align:left;
  font-family:'Instrument Sans',sans-serif;
}
.improve-toggle:hover{color:var(--orange);}
.improve-body{display:none;padding:0 14px 14px;}
.improve-body.open{display:block;}
.improve-textarea{
  width:100%;
  background:var(--surface2);
  border:1px solid var(--border2);
  border-radius:10px;
  padding:12px;
  color:var(--text);
  font-family:'Instrument Sans',sans-serif;
  font-size:13px;
  line-height:1.6;
  resize:none;
  outline:none;
  margin-bottom:10px;
  min-height:100px;
}
.improve-textarea:focus{border-color:var(--orange);}
.improve-opts{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.imp-opt{
  padding:5px 10px;
  border-radius:8px;
  border:1px solid var(--border2);
  background:none;
  color:var(--text3);
  font-size:11px;font-weight:600;
  cursor:pointer;
  font-family:'Instrument Sans',sans-serif;
  transition:all .15s;
}
.imp-opt.active{
  background:var(--orange-dim);
  border-color:rgba(255,98,36,0.4);
  color:var(--orange);
}

/* ── SAVED SECTION ── */
.saved-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  overflow:hidden;
  margin-bottom:8px;
}
.saved-toggle{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px;
  cursor:pointer;
  font-size:13px;font-weight:700;
  color:var(--text2);
  transition:color .15s;
  background:none;border:none;width:100%;text-align:left;
  font-family:'Instrument Sans',sans-serif;
}
.saved-list{display:none;padding:0 10px 10px;}
.saved-list.open{display:block;}
.saved-item{
  display:flex;align-items:center;gap:8px;
  padding:8px 8px;
  border-radius:8px;
  cursor:pointer;
  transition:background .15s;
  margin-bottom:2px;
}
.saved-item:hover{background:var(--surface2);}
.saved-text{
  flex:1;font-size:11px;color:var(--text2);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.saved-del{
  background:none;border:none;
  color:var(--text3);font-size:14px;
  cursor:pointer;padding:2px 4px;
  border-radius:4px;flex-shrink:0;
}
.saved-del:hover{color:#ff4d8f;}
.saved-empty{
  padding:12px 8px;
  font-size:11px;color:var(--text3);
  text-align:center;
}

/* ── LEARN TAB ── */
.learn-switcher{
  display:flex;gap:6px;
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:12px;
  padding:4px;
  margin-bottom:12px;
}
.learn-sw-btn{
  flex:1;
  padding:7px;
  border-radius:9px;
  border:none;
  background:none;
  color:var(--text3);
  font-size:11px;font-weight:700;
  cursor:pointer;
  font-family:'Instrument Sans',sans-serif;
  transition:all .15s;
  text-align:center;
}
.learn-sw-btn.active{
  background:var(--orange);
  color:#fff;
  box-shadow:0 2px 8px -2px var(--orange-glow);
}

.learn-card{
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:14px;
  margin-bottom:8px;
  overflow:hidden;
  cursor:pointer;
  transition:border .15s;
}
.learn-card.open{border-color:var(--orange);}
.learn-card-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px;
  gap:10px;
}
.learn-fw-name{
  font-family:'Syne',serif;
  font-size:14px;font-weight:800;
  color:var(--text);
}
.learn-fw-full{font-size:10px;color:var(--text3);margin-top:2px;}
.learn-chevron{
  font-size:16px;color:var(--text3);
  transition:transform .2s;flex-shrink:0;
}
.learn-card.open .learn-chevron{transform:rotate(180deg);color:var(--orange);}
.learn-body{
  display:none;
  border-top:1px solid var(--border);
  padding:14px;
}
.learn-card.open .learn-body{display:block;}
.learn-when{
  font-size:9px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;
  color:var(--orange);margin-bottom:5px;
}
.learn-desc{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:10px;}
.learn-steps{list-style:none;margin-bottom:10px;}
.learn-steps li{
  font-size:11px;color:var(--text2);
  padding:5px 0;
  border-bottom:1px solid var(--border);
  display:flex;gap:8px;align-items:flex-start;
  line-height:1.5;
}
.learn-steps li:last-child{border:none;}
.learn-step-num{
  background:var(--orange-dim);
  color:var(--orange);
  font-size:9px;font-weight:800;
  width:16px;height:16px;
  border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:1px;
}
.learn-eg-label{
  font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  color:var(--text3);margin-bottom:6px;
}
.learn-eg{
  background:rgba(0,0,0,0.3);
  border-left:2px solid var(--orange);
  border-radius:8px;
  padding:10px;
  font-family:'JetBrains Mono',monospace;
  font-size:11px;color:var(--text2);
  line-height:1.7;
  white-space:pre-wrap;
  margin-bottom:10px;
}
.learn-try-btn{
  width:100%;
  padding:9px;
  border-radius:9px;
  border:1px solid rgba(255,98,36,0.3);
  background:var(--orange-dim);
  color:var(--orange);
  font-size:11px;font-weight:700;
  cursor:pointer;
  font-family:'Instrument Sans',sans-serif;
  transition:all .15s;
}
.learn-try-btn:hover{background:rgba(255,98,36,0.2);}

/* ── DESKTOP: Three panel layout ── */
@media(min-width:860px){
  .tab-bar{display:none !important;}
  .panels{display:flex;gap:0;}
  .panel{
    position:relative;
    display:flex !important;
    flex-direction:column;
    border-right:1px solid var(--border);
    padding:16px;
    overflow-y:auto;
  }
  .panel:last-child{border-right:none;}
  #panelFramework{width:220px;flex-shrink:0;}
  #panelBuild{flex:1;}
  #panelLearn{width:300px;flex-shrink:0;border-left:1px solid var(--border);}
  .fw-grid{grid-template-columns:1fr;}
  .fw-card{padding:10px 12px;}
  .tool-open-row{grid-template-columns:repeat(8,1fr);}
}

/* ── TOAST ── */
.toast{
  position:fixed;
  bottom:80px;left:50%;
  transform:translateX(-50%);
  background:var(--surface2);
  border:1px solid var(--orange);
  color:var(--text);
  padding:10px 20px;
  border-radius:24px;
  font-size:13px;font-weight:600;
  font-family:'Instrument Sans',sans-serif;
  z-index:9999;
  display:flex;align-items:center;gap:8px;
  box-shadow:0 4px 20px rgba(0,0,0,.5),0 0 20px -5px var(--orange-glow);
  animation:toastIn .2s ease;
  white-space:nowrap;
}
@keyframes toastIn{
  from{opacity:0;transform:translateX(-50%) translateY(8px);}
  to{opacity:1;transform:translateX(-50%) translateY(0);}
}
.toast-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--orange);
  animation:micPulse 1s ease-in-out infinite;
}

/* ── COPY SUCCESS ANIMATION ── */
@keyframes copySuccess{
  0%{transform:scale(1);}
  50%{transform:scale(1.08);}
  100%{transform:scale(1);}
}
.copy-success{animation:copySuccess .3s ease;}

/* ── LIGHT MODE ── */
.light-mode{
  --bg:#f4f4f8;
  --bg2:#eaeaf0;
  --surface:rgba(255,255,255,0.7);
  --surface2:rgba(255,255,255,0.85);
  --surface3:rgba(255,255,255,0.95);
  --border:rgba(0,0,0,0.08);
  --border2:rgba(0,0,0,0.12);
  --text:#18170f;
  --text2:#44444a;
  --text3:#888899;
}
.light-mode body::before{
  background:
    radial-gradient(ellipse 80% 60% at 10% 20%,rgba(255,98,36,0.06) 0%,transparent 60%),
    radial-gradient(ellipse 60% 40% at 90% 80%,rgba(124,58,237,0.05) 0%,transparent 60%);
}

/* ── SCROLLBAR GLOBAL ── */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* ── MIC TOAST ── */
.mic-toast{
  position:fixed;bottom:80px;left:50%;
  transform:translateX(-50%);
  background:var(--surface2);
  border:1px solid var(--orange);
  color:var(--text);
  padding:10px 20px;border-radius:24px;
  font-size:13px;font-weight:600;
  font-family:'Instrument Sans',sans-serif;
  z-index:9999;
  display:flex;align-items:center;gap:8px;
  box-shadow:0 4px 20px rgba(0,0,0,.4);
  animation:toastIn .2s ease;
}
.mic-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--orange);
  animation:micPulse 1s ease-in-out infinite;
}
</style>

  theme = theme==='dark' ? 'light' : 'dark';
  document.documentElement.classList.toggle('light-mode', theme==='light');
  localStorage.setItem('pa_theme', theme);
  var btn = document.getElementById('themeBtn');

    build:function(v){

function switchTab(name){

function renderBlocks(){
  var fw = FRAMEWORKS.find(function(f){ return f.id===currentFW; });
  if(!fw) return;

  // Update header
  var hIcon = document.getElementById('fwHeaderIcon');
  var hName = document.getElementById('fwHeaderName');
  var hDesc = document.getElementById('fwHeaderDesc');
  if(hIcon) hIcon.textContent = fw.icon;
  if(hName) hName.textContent = fw.name;
  if(hDesc) hDesc.style.color = fw.color;

  var area = document.getElementById('blocksArea');
  if(!area) return;

  area.innerHTML = fw.blocks.map(function(b, i){
    var val = blockValues[b.id] || '';
    var inputHTML = '';
    if(b.type==='select'){
      inputHTML = '<select class="block-input" id="block_'+b.id+'" onchange="onBlockChange(\''+b.id+'\',this.value)">';
      inputHTML += '<option value="">— select —</option>';
      (b.options||[]).forEach(function(o){
        inputHTML += '<option'+(o===val?' selected':'')+'>'+o+'</option>';
      });
      inputHTML += '</select>';
    } else if(b.type==='textarea'){
      inputHTML = '<textarea class="block-input" id="block_'+b.id+'" rows="'+(b.rows||2)+'" '+
        'placeholder="'+b.placeholder.replace(/"/g,'&quot;')+'" '+
        'oninput="onBlockChange(\''+b.id+'\',this.value)">'+val+'</textarea>';
    } else {
      inputHTML = '<input type="text" class="block-input" id="block_'+b.id+'" '+
        'placeholder="'+b.placeholder.replace(/"/g,'&quot;')+'" '+
        'value="'+val+'" oninput="onBlockChange(\''+b.id+'\',this.value)"/>';
    }

    var animDelay = (i * 60)+'ms';
    return '<div class="block" id="blk_'+b.id+'" style="animation-delay:'+animDelay+'">'+
      '<div class="block-hdr">'+
        '<span class="block-tag" style="background:'+b.color+'22;color:'+b.color+'">'+b.tag+'</span>'+
        '<span class="block-label">'+b.label+'</span>'+
        '<button class="block-clear" onclick="clearBlock(\''+b.id+'\')">'+
          '<i class="ph ph-x"></i>'+
        '</button>'+
      '</div>'+
      '<div class="block-body">'+inputHTML+'</div>'+
    '</div>';
  }).join('');

  renderAddBar();
  updatePreview();
}

// ── UPDATE PREVIEW ─────────────────────────────────────────────
function onBlockChange(id, val){
  blockValues[id] = val;
  updatePreview();
}

function updatePreview(){
  var fw = FRAMEWORKS.find(function(f){ return f.id===currentFW; });
  if(!fw) return;

  var allVals = {};
  Object.keys(blockValues).forEach(function(k){ allVals[k] = blockValues[k]; });

  var prompt = fw.build ? fw.build(allVals) : '';

  // Append extra blocks
  Object.keys(allVals).forEach(function(k){
    if(k.startsWith('extra_') && allVals[k]){
      var label = k.replace('extra_','');
      label = label.charAt(0).toUpperCase()+label.slice(1);
      if(prompt && !prompt.includes(label)) prompt += '\n\n'+label+':\n'+allVals[k];
    }
  });

  var previewText = document.getElementById('previewText');
  var previewBox  = document.getElementById('previewBox');
  var previewStats = document.getElementById('previewStats');
  var copyBtn  = document.getElementById('copyBtn');
  var copyBtn2 = document.getElementById('copyBtn2');

  if(!prompt || !prompt.trim()){
    previewText.innerHTML = '<div class="preview-empty"><span class="big">⚡</span>Fill in the blocks and your prompt appears here</div>';
    if(previewBox) previewBox.classList.remove('has-content');
    if(copyBtn)  copyBtn.disabled = true;
    if(copyBtn2) copyBtn2.disabled = true;
    if(previewStats) previewStats.innerHTML = '';
    return;
  }

  previewText.className = 'preview-text';
  previewText.textContent = prompt;
  if(previewBox) previewBox.classList.add('has-content');

  var words = prompt.trim().split(/\s+/).length;
  var chars = prompt.length;
  if(previewStats){
    previewStats.innerHTML =
      '<div class="pstat"><span>'+words+'</span> w</div>'+
      '<div class="pstat"><span>'+chars+'</span> ch</div>';
  }

  if(copyBtn)  copyBtn.disabled = false;
  if(copyBtn2) copyBtn2.disabled = false;
}

function getCurrentPrompt(){
  var el = document.getElementById('previewText');
  return (el && el.classList.contains('preview-text') && el.textContent.trim().length > 10) ? el.textContent : '';
}

// ── COPY ──────────────────────────────────────────────────────
function copyPrompt(){
  var p = getCurrentPrompt();
  if(!p) return;

  // Save
  try{
    var saved2 = JSON.parse(localStorage.getItem('pa_saved_text')||'[]');
    var fw = FRAMEWORKS.find(function(f){ return f.id===currentFW; });
    var name = (fw ? fw.name : 'Prompt')+' — '+new Date().toLocaleDateString();
    if(!saved2.some(function(s){ return s.text===p; })){
      saved2.unshift({name:name, text:p});
      if(saved2.length>50) saved2=saved2.slice(0,50);
      localStorage.setItem('pa_saved_text', JSON.stringify(saved2));
    }
    // Add to builder saved
    saved.unshift({label:p.slice(0,60)+(p.length>60?'...':''), prompt:p, tool:currentTool, fw:currentFW, ts:Date.now()});
    if(saved.length>20) saved=saved.slice(0,20);
    localStorage.setItem('pb_saved', JSON.stringify(saved));
    renderSaved();
  }catch(e){}

  // Copy
  var btns = [document.getElementById('copyBtn'), document.getElementById('copyBtn2')];
  function onDone(){
    btns.forEach(function(btn){
      if(!btn) return;
      btn.innerHTML = '<i class="ph ph-check"></i> Copied!';
      btn.classList.add('copy-success');
      setTimeout(function(){
        btn.innerHTML = '<i class="ph ph-copy"></i> Copy & Save';
        btn.classList.remove('copy-success');
      }, 2000);
    });
  }

  try{
    if(navigator.clipboard && window.isSecureContext){
      navigator.clipboard.writeText(p).then(onDone).catch(function(){
        var ta=document.createElement('textarea');
        ta.value=p; document.body.appendChild(ta); ta.select();
        document.execCommand('copy'); document.body.removeChild(ta);
        onDone();
      });
    } else {
      var ta=document.createElement('textarea');
      ta.value=p; document.body.appendChild(ta); ta.select();
      document.execCommand('copy'); document.body.removeChild(ta);
      onDone();
    }
  }catch(e){ onDone(); }
}

  if(opts.includes('structure'))   improved = improved+'\n\nApproach this systematically. Break it into clear sections.';
  if(opts.includes('format'))      improved = improved+'\n\nFormat your response with clear headers, bullet points where appropriate, and a concise summary at the end.';
  if(opts.includes('specific'))    improved = improved+'\n\nBe highly specific. Use real examples, concrete numbers, and avoid vague generalities.';
  if(opts.includes('constraints')) improved = improved+'\n\nConstraints: Focus only on what is most important. Be concise. Prioritize actionability.';
  if(opts.includes('tone'))        improved = improved+'\n\nTone: Professional yet accessible. Confident but not arrogant.';

  var previewText = document.getElementById('previewText');
  previewText.className = 'preview-text';
  previewText.textContent = improved;
  var previewBox = document.getElementById('previewBox');
  if(previewBox) previewBox.classList.add('has-content');

  var words = improved.trim().split(/\s+/).length;
  var stats = document.getElementById('previewStats');
  if(stats) stats.innerHTML = '<div class="pstat"><span>'+words+'</span> w</div><div class="pstat" style="color:var(--orange);font-weight:700;margin-left:auto;">IMPROVED</div>';

  var copyBtn  = document.getElementById('copyBtn');
  var copyBtn2 = document.getElementById('copyBtn2');
  if(copyBtn)  copyBtn.disabled = false;
  if(copyBtn2) copyBtn2.disabled = false;

  toggleImprove();
  var isMobile = window.innerWidth < 860;
  if(isMobile) switchTab('preview');
}

// Wire up improve options
document.addEventListener('DOMContentLoaded', function(){
  document.querySelectorAll('#improveOptions .imp-opt').forEach(function(btn){
    btn.addEventListener('click', function(){ toggleImpOpt(this); });
  });
});

// ── SAVED ─────────────────────────────────────────────────────
function toggleSaved(){
  savedOpen = !savedOpen;
  var list  = document.getElementById('savedList');
  var arrow = document.getElementById('savedArrow');
  if(list)  list.classList.toggle('open', savedOpen);
  if(arrow) arrow.style.transform = savedOpen ? 'rotate(180deg)' : '';
}

function renderSaved(){
  var list = document.getElementById('savedList');
  var cnt  = document.getElementById('savedCount');
  if(cnt) cnt.textContent = '('+saved.length+')';
  if(!list) return;
  if(!saved.length){
    list.innerHTML = '<div class="saved-empty">No saved prompts yet.</div>';
    return;
  }
  list.innerHTML = saved.map(function(s,i){
    return '<div class="saved-item" onclick="loadSaved('+i+')">'+
      '<span class="saved-text">'+s.label+'</span>'+
      '<button class="saved-del" onclick="deleteSaved('+i+',event)"><i class="ph ph-x"></i></button>'+
    '</div>';
  }).join('');
}

function loadSaved(i){
  var s = saved[i];
  if(!s) return;
  var fw = FRAMEWORKS.find(function(f){ return f.id===s.fw; });
  if(fw){ currentFW = s.fw; blockValues = {}; renderFWGrid(); renderBlocks(); }
  var previewText = document.getElementById('previewText');
  if(previewText){ previewText.className='preview-text'; previewText.textContent=s.prompt; }
  var previewBox = document.getElementById('previewBox');
  if(previewBox) previewBox.classList.add('has-content');
  var copyBtn  = document.getElementById('copyBtn');
  var copyBtn2 = document.getElementById('copyBtn2');
  if(copyBtn)  copyBtn.disabled = false;
  if(copyBtn2) copyBtn2.disabled = false;
}

function deleteSaved(i,e){
  e.stopPropagation();
  saved.splice(i,1);
  localStorage.setItem('pb_saved', JSON.stringify(saved));
  renderSaved();
}

// ── LEARN ─────────────────────────────────────────────────────
function renderLearn(){
  var container = document.getElementById('learnCards');
  if(!container) return;
  container.innerHTML = LEARN_DATA.map(function(fw,i){
    var stepsHtml = fw.steps.map(function(s,j){
      return '<li><span class="learn-step-num">'+(j+1)+'</span><span>'+s+'</span></li>';
    }).join('');
    var ex = fw.example.replace(/\n/g,'<br>');
    return [
      '<div class="learn-card" id="lc'+i+'" onclick="toggleLearnCard('+i+')">',
        '<div class="learn-card-hdr">',
          '<div>',
            '<div class="learn-fw-name">'+fw.name+'</div>',
            '<div class="learn-fw-full">'+fw.full+'</div>',
          '</div>',
          '<i class="ph ph-caret-down learn-chevron"></i>',
        '</div>',
        '<div class="learn-body">',
          '<div class="learn-when">When to use</div>',
          '<div class="learn-desc">'+fw.desc+'</div>',
          '<div class="learn-when">How it works</div>',
          '<ul class="learn-steps">'+stepsHtml+'</ul>',
          '<div class="learn-eg-label">Example prompt</div>',
          '<div class="learn-eg">'+ex+'</div>',
          '<button class="learn-try-btn" data-fw="'+fw.fw+'" onclick="tryFramework(event,this)">Try this framework →</button>',

function toggleLearnCard(i){
  var card = document.getElementById('lc'+i);
  var isOpen = card.classList.contains('open');
  document.querySelectorAll('.learn-card').forEach(function(c){ c.classList.remove('open'); });
  if(!isOpen) card.classList.add('open');
}

function tryFramework(e,btn){
  e.stopPropagation();
  var id = btn.getAttribute('data-fw');
  selectFW(id);
  switchTab('build');
}

// ── TOAST ─────────────────────────────────────────────────────
function showToastMsg(msg){
  var existing = document.getElementById('appToast');
  if(existing) existing.remove();
  var t = document.createElement('div');
  t.className = 'toast';
  t.id = 'appToast';
  t.innerHTML = '<i class="ph ph-info" style="color:var(--orange)"></i><span>'+msg+'</span>';
  document.body.appendChild(t);
  setTimeout(function(){ if(t.parentNode) t.remove(); }, 2500);
}

// ── VOICE DICTATION ───────────────────────────────────────────
var recognition   = null;
var isListening   = false;
var activeMicBtn  = null;
var activeTarget  = null;

function initSpeech(){
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR) return null;
  var r = new SR();
  r.continuous = false;
  r.interimResults = true;
  r.lang = 'en-US';
  r.maxAlternatives = 1;
  return r;
}

function startDictation(targetId, btnId){
  if(isListening){ stopDictation(); return; }
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ showToastMsg('Voice not supported. Try Chrome or Edge.'); return; }

  var target = targetId ? document.getElementById(targetId) : document.querySelector('.block-input');
  if(!target) return;
  activeTarget = target;
  activeMicBtn = document.getElementById(btnId);
  recognition  = initSpeech();

  recognition.onstart = function(){
    isListening = true;
    if(activeMicBtn) activeMicBtn.classList.add('listening');
    showMicToast('Listening... speak now', true);
    activeTarget.focus();
  };

  recognition.onresult = function(e){
    var interim = '', final = '';
    for(var i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal) final += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    if(interim) activeTarget.value = final+interim;
    if(final)   activeTarget.value = final;
    activeTarget.dispatchEvent(new Event('input',{bubbles:true}));
  };

  recognition.onerror = function(e){
    var msg = e.error==='no-speech' ? 'No speech detected' :
              e.error==='not-allowed' ? 'Microphone access denied' : 'Error: '+e.error;
    showMicToast(msg, false);
    setTimeout(removeMicToast, 2000);
    stopDictation();
  };

  recognition.onend = function(){
    stopDictation();
    if(activeTarget && activeTarget.value){
      showMicToast('Got it! ✓', false);
      setTimeout(removeMicToast, 1500);
    }
  };

  recognition.start();
}

function stopDictation(){
  isListening = false;
  if(recognition){ try{ recognition.stop(); }catch(e){} }
  if(activeMicBtn){
    activeMicBtn.classList.remove('listening');
    var icon = activeMicBtn.querySelector('i');
    if(icon) icon.className = 'ph ph-microphone';
  }
}

function showMicToast(msg, listening){
  removeMicToast();
  var t = document.createElement('div');
  t.className = 'mic-toast';
  t.id = 'micToast';
  t.innerHTML = (listening ? '<div class="mic-dot"></div>' : '<i class="ph ph-microphone" style="color:var(--orange)"></i>')+'<span>'+msg+'</span>';
  document.body.appendChild(t);
}

function removeMicToast(){
  var t = document.getElementById('micToast');
  if(t) t.remove();
}

// Keyboard shortcut: Ctrl/Cmd + Shift + M
document.addEventListener('keydown', function(e){
  if((e.ctrlKey||e.metaKey) && e.shiftKey && e.key==='M'){
    e.preventDefault();
    startDictation(null,'mainMicBtn');
  }
});
