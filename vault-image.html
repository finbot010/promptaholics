<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title id="pageTitle">AI Art — Promptaholics</title>
<meta name="description" id="pageDesc" content="AI-generated artwork on Promptaholics — the free AI prompt library."/>
<meta property="og:type" content="website"/>
<meta property="og:site_name" content="Promptaholics"/>
<meta property="og:title" id="ogTitle" content="AI Art — Promptaholics"/>
<meta property="og:description" id="ogDesc" content="AI-generated artwork. Create your own free at Promptaholics."/>
<meta property="og:image" id="ogImage" content=""/>
<meta property="og:image:width" content="1200"/>
<meta property="og:image:height" content="630"/>
<meta property="og:url" id="ogUrl" content=""/>
<meta name="twitter:card" content="summary_large_image"/>
<meta name="twitter:site" content="@promptaholics"/>
<meta name="twitter:title" id="twTitle" content="AI Art — Promptaholics"/>
<meta name="twitter:description" id="twDesc" content="AI-generated artwork. Create your own free at Promptaholics."/>
<meta name="twitter:image" id="twImage" content=""/>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#07070a;--bg2:#0d0d14;--card:#111118;
  --ink:#f0f0f8;--ink2:rgba(240,240,248,.65);--ink3:rgba(240,240,248,.35);
  --orange:#ff6224;--o2:#ff9f24;--green:#22c55e;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);
  --glass:rgba(255,255,255,.04);
}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--ink);font-family:'Instrument Sans',sans-serif;min-height:100dvh;display:flex;flex-direction:column;overflow-x:hidden;}

/* ── Nav ── */
.nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:54px;background:rgba(7,7,10,.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.nav-logo{font-family:'Syne',serif;font-size:15px;font-weight:900;color:var(--ink);text-decoration:none;flex-shrink:0;}
.nav-logo span{color:var(--orange);}
.nav-links{display:flex;gap:12px;align-items:center;}
.nav-link{font-size:12px;color:var(--ink2);text-decoration:none;white-space:nowrap;}
.nav-link:hover{color:var(--ink);}
@media(max-width:480px){
  .nav-links .nav-link:not(:last-child){display:none;}
  .nav{padding:0 14px;}
}

/* ── Main ── */
.main{flex:1;display:flex;align-items:flex-start;justify-content:center;padding:20px 16px 40px;}

/* ── Card ── */
.card{width:100%;max-width:600px;background:var(--card);border:1px solid var(--border2);border-radius:20px;overflow:hidden;}

/* Image */
.img-wrap{position:relative;width:100%;aspect-ratio:1;background:#0a0a10;overflow:hidden;}
.img-wrap img{width:100%;height:100%;object-fit:contain;display:none;}
.img-loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--ink3);font-size:13px;}
.img-loading i{font-size:32px;}

/* Info */
.card-info{padding:16px;}
.badge{display:inline-flex;align-items:center;gap:5px;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:3px 9px;border-radius:20px;background:rgba(255,98,36,.08);border:1px solid rgba(255,98,36,.18);color:var(--orange);margin-bottom:10px;}
.card-title{font-family:'Syne',serif;font-size:clamp(17px,4vw,22px);font-weight:900;letter-spacing:-.5px;margin-bottom:8px;line-height:1.2;}
.card-prompt{font-size:13px;color:var(--ink2);line-height:1.7;margin-bottom:16px;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden;}

/* Actions */
.card-actions{display:flex;gap:8px;flex-wrap:wrap;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 16px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;transition:all .15s;border:none;font-family:'Instrument Sans',sans-serif;white-space:nowrap;}
.btn i{font-size:15px;}
.btn-wear{background:linear-gradient(135deg,var(--orange),var(--o2));color:#fff;box-shadow:0 3px 12px rgba(255,98,36,.3);}
.btn-wear:hover{opacity:.9;}
.btn-share{background:rgba(99,102,241,.12);border:1px solid rgba(99,102,241,.3);color:#818cf8;}
.btn-share:hover{background:rgba(99,102,241,.2);}
.btn-copy{background:var(--glass);border:1px solid var(--border2);color:var(--ink2);}
.btn-copy:hover{border-color:rgba(255,98,36,.3);color:var(--orange);}
.btn-back{background:var(--glass);border:1px solid var(--border2);color:var(--ink3);}
.btn-back:hover{color:var(--ink);}

/* Mobile — stack buttons */
@media(max-width:400px){
  .card-actions{flex-direction:column;}
  .btn{width:100%;}
  .card-info{padding:14px;}
}

/* ── Related strip ── */
.related{max-width:600px;width:100%;margin:20px auto 0;padding:0 16px;}
.related-title{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--ink3);margin-bottom:12px;}
.related-cta{display:flex;gap:10px;flex-wrap:wrap;}
.rcta-btn{display:inline-flex;align-items:center;gap:6px;padding:10px 16px;border-radius:10px;font-size:12px;font-weight:700;text-decoration:none;background:var(--card);border:1px solid var(--border2);color:var(--ink2);transition:all .15s;}
.rcta-btn:hover{border-color:rgba(255,98,36,.3);color:var(--orange);}

/* ── Footer ── */
.footer{text-align:center;padding:20px 16px;font-size:11px;color:var(--ink3);border-top:1px solid var(--border);margin-top:auto;}
.footer a{color:var(--orange);text-decoration:none;}

/* ── Toast ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:11px 18px;font-size:13px;font-weight:600;color:var(--ink);z-index:999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.5);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<nav class="nav">
  <a href="index.html" class="nav-logo">Prompt<span>aholics</span></a>
  <div class="nav-links">
    <a href="vault.html" class="nav-link"><i class="ti ti-photo"></i> Vault</a>
    <a href="agent.html" class="nav-link"><i class="ti ti-sparkles"></i> PA Agent</a>
    <a href="store-v2.html" class="nav-link"><i class="ti ti-shirt"></i> Store</a>
  </div>
</nav>

<div class="main">
  <div class="card">
    <div class="img-wrap">
      <div class="img-loading" id="imgLoading">
        <i class="ti ti-photo"></i>
        <span>Loading image...</span>
      </div>
      <img id="mainImg" src="" alt=""
        onload="this.style.display='block';document.getElementById('imgLoading').style.display='none';"
        onerror="document.getElementById('imgLoading').innerHTML='<i class=\'ti ti-photo-off\'></i><span>Image unavailable</span>';"/>
    </div>
    <div class="card-info">
      <div class="badge" id="toolBadge"><i class="ti ti-sparkles"></i> AI Generated</div>
      <div class="card-title" id="cardTitle">Loading...</div>
      <div class="card-prompt" id="cardPrompt"></div>
      <div class="card-actions">
        <button class="btn btn-wear" onclick="sendToStore()"><i class="ti ti-shirt"></i> Wear it!</button>
        <button class="btn btn-share" onclick="shareImage()"><i class="ti ti-share-2"></i> Share</button>
        <button class="btn btn-copy" onclick="copyPrompt()"><i class="ti ti-copy"></i> Copy Prompt</button>
        <a href="vault.html" class="btn btn-back"><i class="ti ti-arrow-left"></i> Vault</a>
      </div>
    </div>
  </div>
</div>

<div class="related">
  <div class="related-title">Explore More</div>
  <div class="related-cta">
    <a href="vault.html" class="rcta-btn"><i class="ti ti-photo"></i> Browse Image Vault</a>
    <a href="creationstation.html" class="rcta-btn"><i class="ti ti-wand"></i> Create Your Own</a>
    <a href="library.html" class="rcta-btn"><i class="ti ti-books"></i> Prompt Library</a>
  </div>
</div>

<footer class="footer">
  <a href="index.html">Promptaholics</a> — Free AI Prompt Library &amp; Image Vault
</footer>

<div class="toast" id="toast"></div>

<script>
const WORKER = 'https://dawn-thunder-a558.promptaholics.workers.dev';
var params   = new URLSearchParams(window.location.search);
var shareId  = params.get('id')     || '';
var imgUrl   = params.get('img')    || '';
var title    = params.get('title')  || 'AI Art';
var prompt   = params.get('prompt') || '';
var tool     = params.get('tool')   || 'AI Generated';

async function init(){
  // If we have a Firebase share ID, load via Worker
  if(shareId && !imgUrl){
    try{
      var res = await fetch('https://dawn-thunder-a558.promptaholics1.workers.dev/api/vault-share?id=' + encodeURIComponent(shareId));
      var data = await res.json();
      if(data.imageUrl){
        imgUrl = data.imageUrl;
        title  = data.title  || 'AI Art';
        prompt = data.prompt || '';
        tool   = data.tool   || 'AI Generated';
      }
    }catch(e){ console.warn('Could not load share data:', e); }
  }

  // Set content
  document.getElementById('cardTitle').textContent  = title;
  document.getElementById('cardPrompt').textContent = prompt || 'Created with AI on Promptaholics.';
  document.getElementById('toolBadge').innerHTML    = '<i class="ti ti-sparkles"></i> ' + tool;
  document.title = title + ' \u2014 Promptaholics';
  document.getElementById('pageTitle').textContent  = title + ' \u2014 Promptaholics';

  // Image
  if(imgUrl){
    var img = document.getElementById('mainImg');
    img.alt = title;
    img.src = imgUrl;
  }

  // OG tags
  var ogImg = 'https://dawn-thunder-a558.promptaholics1.workers.dev/api/og?img=' + encodeURIComponent(imgUrl) + '&title=' + encodeURIComponent(title);
  setMeta('ogTitle',  title + ' \u2014 Promptaholics');
  setMeta('ogDesc',   prompt ? prompt.slice(0,150) : 'AI-generated artwork on Promptaholics.');
  setMeta('ogImage',  ogImg);
  setMeta('ogUrl',    window.location.href);
  setMeta('twTitle',  title + ' \u2014 Promptaholics');
  setMeta('twDesc',   prompt ? prompt.slice(0,150) : 'AI-generated artwork. Create yours free.');
  setMeta('twImage',  ogImg);
  setMeta('pageDesc', prompt ? prompt.slice(0,150) : 'AI-generated artwork on Promptaholics.');
}

function setMeta(id, val){
  var el = document.getElementById(id);
  if(el) el.setAttribute('content', val);
}

async function shareImage(){
  var shareUrl = 'https://promptaholics.com/share/vault'
    + '?img='    + encodeURIComponent(imgUrl)
    + '&title='  + encodeURIComponent(title)
    + '&prompt=' + encodeURIComponent(prompt.slice(0,200));

  if(navigator.share){
    try{
      await navigator.share({
        title: title + ' \u2014 Promptaholics',
        text: (prompt ? prompt.slice(0,100)+'...' : 'Check out this AI art!'),
        url: shareUrl
      });
      return;
    }catch(e){ if(e.name==='AbortError') return; }
  }
  try{
    await navigator.clipboard.writeText(shareUrl);
    showToast('Link copied \u2014 paste to share!');
  }catch(e){
    window.open('https://twitter.com/intent/tweet?text=' + encodeURIComponent(title + ' ' + shareUrl + ' #AIArt #Promptaholics'), '_blank');
  }
}

function copyPrompt(){
  if(!prompt){ showToast('No prompt available'); return; }
  navigator.clipboard.writeText(prompt).then(function(){
    showToast('Prompt copied!');
  }).catch(function(){ showToast('Copy failed'); });
}

function sendToStore(){
  if(imgUrl){
    localStorage.setItem('pa_store_image', imgUrl);
    localStorage.setItem('pa_store_image_label', title);
  }
  window.location.href = 'store-v2.html';
}

function showToast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 3000);
}

init();
</script>
</body>
</html>
