<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="theme-color" content="#ff6224"/>
<title>Sign In — Promptaholics</title>
<meta name="description" content="Sign in to Promptaholics — Free AI Prompt Library"/>
<link rel="canonical" href="https://promptaholics.com/login"/>
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>

<!-- ── Firebase SDK ── -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  background: #07070a;
  color: #f0f0f8;
  font-family: 'Instrument Sans', sans-serif;
}

/* ── Background gradient ── */
body {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px 16px;
  position: relative;
  overflow: hidden;
}
body::before {
  content: '';
  position: fixed;
  top: -30%;
  left: 50%;
  transform: translateX(-50%);
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(255,98,36,.12) 0%, transparent 70%);
  pointer-events: none;
}

/* ── Card ── */
.login-card {
  background: #111118;
  border: 1px solid #1e1e2c;
  border-radius: 20px;
  padding: 40px 32px;
  width: 100%;
  max-width: 420px;
  position: relative;
  z-index: 1;
  box-shadow: 0 24px 64px rgba(0,0,0,.4);
}

/* ── Logo ── */
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  justify-content: center;
  margin-bottom: 32px;
  text-decoration: none;
}
.logo-mark {
  width: 36px; height: 36px;
  background: #ff6224;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.logo-mark svg { width: 15px; height: 17px; }
.logo-text {
  font-family: 'Syne', serif;
  font-size: 18px;
  font-weight: 800;
  color: #f0f0f8;
}
.logo-text span { color: #ff6224; }

/* ── Headline ── */
.login-title {
  font-family: 'Syne', serif;
  font-size: 26px;
  font-weight: 900;
  text-align: center;
  margin-bottom: 8px;
  letter-spacing: -0.5px;
}
.login-sub {
  font-size: 14px;
  color: #666680;
  text-align: center;
  margin-bottom: 32px;
  line-height: 1.6;
}

/* ── Buttons ── */
.auth-btn {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 14px 20px;
  border-radius: 12px;
  font-family: 'Instrument Sans', sans-serif;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s;
  border: none;
  margin-bottom: 12px;
  min-height: 52px;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.btn-google {
  background: #fff;
  color: #111;
  border: 1px solid #e0e0e0;
}
.btn-google:hover { background: #f5f5f5; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,0,0,.15); }
.btn-google:active { transform: scale(.98); }

.btn-apple {
  background: #fff;
  color: #111;
  border: 1px solid #e0e0e0;
}
.btn-apple:hover { background: #f5f5f5; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,0,0,.15); }
.btn-apple:active { transform: scale(.98); }

/* ── Divider ── */
.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 20px 0;
}
.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: #1e1e2c;
}
.divider span {
  font-size: 12px;
  color: #44445a;
  white-space: nowrap;
}

/* ── Guest option ── */
.btn-guest {
  width: 100%;
  background: none;
  border: 1px solid #1e1e2c;
  color: #9090b0;
  padding: 12px;
  border-radius: 12px;
  font-family: 'Instrument Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all .15s;
  min-height: 48px;
  touch-action: manipulation;
}
.btn-guest:hover { border-color: #2a2a3a; color: #f0f0f8; }

/* ── Status message ── */
.status {
  text-align: center;
  font-size: 13px;
  margin-top: 16px;
  min-height: 20px;
  color: #666680;
}
.status.error { color: #ff4444; }
.status.success { color: #22c55e; }

/* ── Loading spinner ── */
.spinner {
  display: inline-block;
  width: 16px; height: 16px;
  border: 2px solid rgba(0,0,0,.2);
  border-top-color: #111;
  border-radius: 50%;
  animation: spin .6s linear infinite;
  flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Footer ── */
.login-footer {
  text-align: center;
  margin-top: 28px;
  font-size: 12px;
  color: #44445a;
  line-height: 1.8;
}
.login-footer a {
  color: #666680;
  text-decoration: none;
  transition: color .15s;
}
.login-footer a:hover { color: #ff6224; }

/* ── Back link ── */
.back-link {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  margin-top: 20px;
  font-size: 13px;
  color: #666680;
  text-decoration: none;
  transition: color .15s;
}
.back-link:hover { color: #ff6224; }

/* ── User profile (shown after login) ── */
.user-profile {
  display: none;
  text-align: center;
}
.user-avatar {
  width: 64px; height: 64px;
  border-radius: 50%;
  margin: 0 auto 12px;
  border: 2px solid #ff6224;
  object-fit: cover;
}
.user-name {
  font-family: 'Syne', serif;
  font-size: 20px;
  font-weight: 800;
  margin-bottom: 4px;
}
.user-email {
  font-size: 13px;
  color: #666680;
  margin-bottom: 24px;
}
.btn-signout {
  background: none;
  border: 1px solid #1e1e2c;
  color: #9090b0;
  padding: 10px 24px;
  border-radius: 10px;
  font-family: 'Instrument Sans', sans-serif;
  font-size: 13px;
  cursor: pointer;
  transition: all .15s;
  margin-bottom: 16px;
}
.btn-signout:hover { border-color: #ff4444; color: #ff4444; }
.btn-continue {
  display: block;
  background: #ff6224;
  color: #fff;
  padding: 12px 32px;
  border-radius: 10px;
  font-family: 'Instrument Sans', sans-serif;
  font-size: 14px;
  font-weight: 700;
  text-decoration: none;
  transition: background .15s;
  margin: 0 auto;
  width: fit-content;
}
.btn-continue:hover { background: #e84e0e; color: #fff; }

/* ── Animations ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
.login-card { animation: fadeUp .4s ease both; }
</style>
</head>
<body>

<div class="login-card">

  <!-- Logo -->
  <a class="logo" href="/">
    <div class="logo-mark">
      <svg viewBox="0 0 22 24" fill="none">
        <path d="M3 2h8a5 5 0 0 1 0 10H3V2z" fill="white" fill-opacity=".9"/>
        <path d="M14 13l-5 10 4.5-5.5H9.5L14 7l-4.5 5.5H14z" fill="white"/>
      </svg>
    </div>
    <div class="logo-text">Prompt<span>aholics</span></div>
  </a>

  <!-- Sign In Form -->
  <div id="signInView">
    <h1 class="login-title">Welcome back</h1>
    <p class="login-sub">Sign in with Google to save prompts,<br/>access your library and post to social media.</p>

    <!-- Google -->
    <button class="auth-btn btn-google" onclick="signInGoogle()" id="googleBtn">
      <svg width="20" height="20" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        <path fill="none" d="M0 0h48v48H0z"/>
      </svg>
      Continue with Google
    </button>

<!-- Apple login coming soon -->

    <div class="divider"><span>or</span></div>

    <button class="btn-guest" onclick="continueAsGuest()">
      Continue as guest →
    </button>

    <div class="status" id="statusMsg"></div>
  </div>

  <!-- Signed In View -->
  <div class="user-profile" id="userView">
    <img class="user-avatar" id="userAvatar" src="" alt="Profile"/>
    <div class="user-name" id="userName"></div>
    <div class="user-email" id="userEmail"></div>
    <button class="btn-signout" onclick="signOut()">Sign out</button>
    <a class="btn-continue" href="/">Continue to Promptaholics →</a>
  </div>

  <div class="login-footer">
    By signing in you agree to our
    <a href="/terms.html">Terms of Service</a> and
    <a href="/privacy.html">Privacy Policy</a>
  </div>

  <a class="back-link" href="/">
    ← Back to Promptaholics
  </a>

</div>

<!-- ── Firebase Config ────────────────────────────────────
     Replace with your actual Firebase config from:
     console.firebase.google.com → Project Settings
─────────────────────────────────────────────────────────── -->
<script>
const firebaseConfig = {
  apiKey:            "AIzaSyCWuUZjRUKMUEFtUHz6LCeWFSYS-c7qndQ",
  authDomain:        "promptaholics-534d3.firebaseapp.com",
  projectId:         "promptaholics-534d3",
  storageBucket:     "promptaholics-534d3.firebasestorage.app",
  messagingSenderId: "426595742101",
  appId:             "1:426595742101:web:1eb95579695bc6b1a5869c",
  measurementId:     "G-80H30NJST9"
};

// ── Init Firebase ──────────────────────────────────────
var firebaseReady = false;
try {
  firebase.initializeApp(firebaseConfig);
  firebaseReady = true;
} catch(e) {
  console.warn('Firebase not configured yet:', e.message);
}

// ── Auth state listener ───────────────────────────────
if(firebaseReady){
  firebase.auth().onAuthStateChanged(function(user){
    if(user){
      showUserProfile(user);
      // Save to localStorage for other pages to read
      localStorage.setItem('pa_user', JSON.stringify({
        uid:   user.uid,
        name:  user.displayName,
        email: user.email,
        photo: user.photoURL,
      }));
    } else {
      showSignIn();
      localStorage.removeItem('pa_user');
    }
  });
}

// ── Google Sign In ────────────────────────────────────
function signInGoogle(){
  if(!firebaseReady){ showStatus('Firebase not configured yet.','error'); return; }
  setLoading('googleBtn', true);
  var provider = new firebase.auth.GoogleAuthProvider();
  firebase.auth().signInWithPopup(provider)
    .then(function(result){
      showStatus('Signed in! Redirecting...','success');
      setTimeout(function(){ window.location.href = '/'; }, 1200);
    })
    .catch(function(err){
      setLoading('googleBtn', false);
      showStatus(err.message, 'error');
    });
}

// ── Apple Sign In ─────────────────────────────────────
function signInApple(){ /* coming soon */
  if(!firebaseReady){ showStatus('Firebase not configured yet.','error'); return; }
  setLoading('appleBtn', true);
  var provider = new firebase.auth.OAuthProvider('apple.com');
  firebase.auth().signInWithPopup(provider)
    .then(function(result){
      showStatus('Signed in! Redirecting...','success');
      setTimeout(function(){ window.location.href = '/'; }, 1200);
    })
    .catch(function(err){
      setLoading('appleBtn', false);
      showStatus(err.message, 'error');
    });
}

// ── Guest ─────────────────────────────────────────────
function continueAsGuest(){
  window.location.href = '/';
}

// ── Sign Out ──────────────────────────────────────────
function signOut(){
  if(!firebaseReady) return;
  firebase.auth().signOut().then(function(){
    localStorage.removeItem('pa_user');
    showSignIn();
  });
}

// ── UI helpers ────────────────────────────────────────
function showUserProfile(user){
  document.getElementById('signInView').style.display = 'none';
  var uv = document.getElementById('userView');
  uv.style.display = 'block';
  document.getElementById('userAvatar').src = user.photoURL || 'https://ui-avatars.com/api/?name='+encodeURIComponent(user.displayName||'User')+'&background=ff6224&color=fff';
  document.getElementById('userName').textContent  = user.displayName || 'Welcome!';
  document.getElementById('userEmail').textContent = user.email || '';
}
function showSignIn(){
  document.getElementById('signInView').style.display = 'block';
  document.getElementById('userView').style.display   = 'none';
}
function showStatus(msg, type){
  var el = document.getElementById('statusMsg');
  el.textContent  = msg;
  el.className    = 'status ' + (type||'');
}
function setLoading(btnId, loading){
  var btn = document.getElementById(btnId);
  if(!btn) return;
  if(loading){
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div> Signing in...';
  } else {
    btn.disabled = false;
    if(btnId === 'googleBtn') btn.innerHTML = '<svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg> Continue with Google';
    if(btnId === 'appleBtn') btn.innerHTML = '<svg width="20" height="20" viewBox="0 0 814 1000"><path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105-42.3-150.3-109.7c-52-75.6-94.9-197.3-94.9-313.7 0-180.7 117.6-276.2 233.3-276.2 63 0 115.4 41.6 155.1 41.6 37.8 0 97.9-44.2 168.3-44.2 26.5 0 108.2 2.6 168.3 98.2zm-234-181.5c31.1-36.9 53.1-88.1 53.1-139.3 0-7.1-.6-14.3-1.9-20.1-50.6 1.9-110.8 33.7-147.1 75.8-28.5 32.4-55.1 83.6-55.1 135.5 0 7.8 1.3 15.6 1.9 18.1 3.2.6 8.4 1.3 13.6 1.3 45.4 0 102.5-30.4 135.5-71.3z"/></svg> Continue with Apple';
  }
}
</script>

</body>
</html>
