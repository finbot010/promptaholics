<style>
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}

:root{
  --bg:#08080b;--surface:#111116;--surface2:#18181f;--surface3:#1e1e27;
  --border:#1f1f2a;--border2:#2a2a38;
  --text:#f0f0f8;--text2:#9999b0;--text3:#4a4a62;
  --orange:#ff6224;--orange2:#e84e0e;
  --violet:#8b5cf6;--teal:#00ccaa;
  --hh:62px;
}
.light-mode{
  --bg:#f5f5f0;--surface:#ffffff;--surface2:#efefea;--surface3:#e5e5e0;
  --border:#e0ddd6;--border2:#c8c4bc;
  --text:#18170f;--text2:#58554e;--text3:#9a9590;
}

body{background:var(--bg);color:var(--text);font-family:'Instrument Sans','Segoe UI',Arial,sans-serif;line-height:1.6;min-height:100vh;overflow-x:hidden;}
a{color:var(--orange);text-decoration:none;}

/* ══ HEADER ══ */
header{
  height:var(--hh);display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;
  background:rgba(8,8,11,.95);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;
}
.light-mode header{background:rgba(245,245,240,.96);}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo-mark{width:34px;height:34px;background:var(--orange);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.logo-mark svg{width:14px;height:16px;}
.logo-text{font-family:'Syne',serif;font-size:17px;font-weight:800;color:var(--text);}
.logo-text span{color:var(--orange);}
.logo-sub{font-size:10px;color:var(--text3);letter-spacing:.5px;margin-top:1px;}
.hnav{display:flex;align-items:center;gap:6px;}
.hnav a{font-size:13px;color:var(--text2);padding:7px 12px;border-radius:8px;transition:all .15s;font-weight:500;}
.hnav a:hover{color:var(--text);background:var(--surface2);}
.hnav .cta{background:var(--orange);color:#fff;padding:8px 18px;border-radius:9px;font-weight:700;}
.hnav .cta:hover{background:var(--orange2);color:#fff;}
.theme-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text2);width:34px;height:34px;border-radius:8px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.theme-btn:hover{border-color:var(--orange);}

/* ══ HERO ══ */
.hero{
  padding:0;
  min-height:calc(100vh - var(--hh));
  display:flex;align-items:center;
  background:
    radial-gradient(ellipse 60% 80% at 0% 50%,rgba(255,98,36,.07),transparent),
    radial-gradient(ellipse 50% 60% at 100% 50%,rgba(139,92,246,.06),transparent);
  position:relative;overflow:hidden;
}
.hero-grid{
  position:absolute;inset:0;opacity:.03;
  background-image:
    linear-gradient(var(--border) 1px,transparent 1px),
    linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size:48px 48px;pointer-events:none;
}
.hero-inner{
  width:min(1200px, 100% - 40px);max-width:1200px;margin:0 auto;
  display:grid;grid-template-columns:1fr 1fr;
  gap:60px;align-items:center;
  padding:80px 20px;
}
/* LEFT */
.hero-left{display:flex;flex-direction:column;align-items:flex-start;}
.hero-eyebrow{
  display:inline-flex;align-items:center;gap:7px;
  background:rgba(255,98,36,.08);border:1px solid rgba(255,98,36,.2);
  color:var(--orange);padding:5px 16px;border-radius:20px;
  font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  margin-bottom:28px;
}
.hero h1{
  font-family:'Syne',serif;
  font-size:clamp(36px,5vw,64px);
  font-weight:900;line-height:1.05;
  letter-spacing:-2.5px;margin-bottom:20px;
  text-align:left;
}
.hero h1 .acc{color:var(--orange);}
.hero-sub{
  font-size:17px;color:var(--text2);
  max-width:440px;margin-bottom:32px;
  line-height:1.75;text-align:left;
}
.hero-btns{
  display:flex;align-items:center;gap:12px;
  flex-wrap:wrap;margin-bottom:28px;
}
.btn-primary{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--orange);color:#fff;
  padding:14px 28px;border-radius:11px;
  font-size:15px;font-weight:700;transition:all .15s;
  text-decoration:none;
}
.btn-primary:hover{background:var(--orange2);color:#fff;transform:translateY(-1px);}
.btn-ghost{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--surface);border:1px solid var(--border2);
  color:var(--text2);padding:14px 22px;border-radius:11px;
  font-size:15px;font-weight:600;transition:all .15s;
  text-decoration:none;
}
.btn-ghost:hover{border-color:var(--orange);color:var(--orange);}
.hero-trust{
  font-size:12px;color:var(--text3);
  display:flex;align-items:center;gap:14px;flex-wrap:wrap;
}
.hero-trust span{display:flex;align-items:center;gap:5px;}
.hero-trust .dot{width:3px;height:3px;border-radius:50%;background:var(--border2);}

/* RIGHT — live preview card */
.hero-right{position:relative;}
.hero-card{
  background:var(--surface);border:1px solid var(--border2);
  border-radius:20px;overflow:hidden;
  box-shadow:0 24px 80px rgba(0,0,0,.4),0 0 0 1px rgba(255,98,36,.06);
}
.hcard-header{
  padding:14px 18px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;
  background:var(--surface2);
}
.hcard-dots{display:flex;gap:5px;}
.hcard-dot{width:10px;height:10px;border-radius:50%;}
.hcard-title{
  flex:1;text-align:center;
  font-size:11px;font-weight:600;color:var(--text3);
  letter-spacing:.5px;
}
.hcard-badge{
  font-size:10px;font-weight:700;letter-spacing:1px;
  color:var(--orange);background:rgba(255,98,36,.1);
  border:1px solid rgba(255,98,36,.2);
  padding:2px 8px;border-radius:6px;text-transform:uppercase;
}
.hcard-body{padding:20px;}
/* Input area */
.hcard-input-wrap{
  background:var(--surface2);border:1px solid var(--border2);
  border-radius:12px;padding:4px 4px 4px 16px;
  display:flex;align-items:center;gap:8px;
  margin-bottom:16px;transition:border .2s;
}
.hcard-input-wrap:focus-within{border-color:var(--orange);}
.hcard-input{
  flex:1;background:none;border:none;outline:none;
  color:var(--text);font-family:'Instrument Sans',sans-serif;
  font-size:16px;padding:10px 0;
}
.hcard-input::placeholder{color:var(--text3);}
.hcard-go{
  background:var(--orange);color:#fff;border:none;
  padding:9px 16px;border-radius:9px;cursor:pointer;
  font-size:13px;font-weight:700;
  font-family:'Instrument Sans',sans-serif;
  transition:background .15s;white-space:nowrap;
}
.hcard-go:hover{background:var(--orange2);}
/* Output area */
.hcard-output-label{
  font-size:10px;font-weight:700;letter-spacing:1.2px;
  text-transform:uppercase;color:var(--text3);
  margin-bottom:10px;display:flex;align-items:center;gap:6px;
}
.hcard-output-label::after{
  content:'';flex:1;height:1px;background:var(--border);
}
.hcard-output{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:12px;padding:16px;
  font-family:'Fira Code','Courier New',monospace;
  font-size:12px;line-height:1.8;color:var(--text2);
  min-height:140px;position:relative;overflow:hidden;
}
.hcard-output.typing{color:var(--text);}
.hcard-cursor{
  display:inline-block;width:2px;height:14px;
  background:var(--orange);margin-left:2px;
  animation:blink .8s infinite;vertical-align:middle;
}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
.hcard-copy-row{
  display:flex;gap:8px;margin-top:12px;
}
.hcard-copy{
  flex:1;background:var(--orange);color:#fff;border:none;
  padding:10px;border-radius:9px;cursor:pointer;
  font-family:'Instrument Sans',sans-serif;
  font-size:13px;font-weight:700;transition:background .15s;
}
.hcard-copy:hover{background:var(--orange2);}
.hcard-build{
  background:var(--surface2);border:1px solid var(--border2);
  color:var(--text2);padding:10px 14px;border-radius:9px;
  font-size:13px;font-weight:600;cursor:pointer;
  font-family:'Instrument Sans',sans-serif;
  text-decoration:none;display:flex;align-items:center;
  transition:all .15s;
}
.hcard-build:hover{border-color:var(--orange);color:var(--orange);}
/* Floating glow */
.hero-glow{
  position:absolute;top:-40px;right:-40px;
  width:280px;height:280px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,98,36,.12),transparent 70%);
  pointer-events:none;z-index:-1;
}
/* Stats below card */
.hero-stats{
  display:flex;gap:0;
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;overflow:hidden;margin-top:16px;
}
.hstat{
  flex:1;padding:12px 10px;text-align:center;
  border-right:1px solid var(--border);
}
.hstat:last-child{border-right:none;}
.hstat-n{
  font-family:'Syne',serif;font-size:18px;
  font-weight:800;color:var(--text);display:block;
}
.hstat-l{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}

/* MOBILE HERO */
@media(max-width:900px){
  .hero{padding:0 20px;min-height:auto;}
  .hero-inner{
    grid-template-columns:1fr;gap:32px;
    padding:48px 0;text-align:center;
  }
  .hero-left{align-items:center;}
  .hero h1{text-align:center;font-size:clamp(32px,8vw,52px);}
  .hero-sub{text-align:center;max-width:100%;}
  .hero-trust{justify-content:center;}
}
@media(max-width:600px){
  .hero-inner{padding:36px 0 40px;}
  .hero h1{letter-spacing:-1.5px;}
  .hcard-body{padding:14px;}
  .hero-stats{display:grid;grid-template-columns:1fr 1fr;}
  .hstat:nth-child(2){border-right:none;}
  .hstat:nth-child(3){border-right:1px solid var(--border);border-top:1px solid var(--border);}
  .hstat:nth-child(4){border-top:1px solid var(--border);}
}
/* STICKY MOBILE CTA */
.sticky-cta{
  display:none;position:fixed;bottom:0;left:0;right:0;
  background:var(--surface);border-top:1px solid var(--border);
  padding:12px 16px;z-index:150;
}
.sticky-cta a{
  display:block;width:100%;text-align:center;
  background:var(--orange);color:#fff;
  padding:14px;border-radius:11px;
  font-size:15px;font-weight:700;text-decoration:none;
  transition:background .15s;
}
.sticky-cta a:hover{background:var(--orange2);}
@media(max-width:768px){.sticky-cta{display:block;}}

/* ══ AI SEARCH ══ */
.search-section{
  max-width:760px;margin:0 auto;
  padding:0 20px 64px;
}
.search-label{
  text-align:center;
  font-size:11px;font-weight:700;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--text3);
  margin-bottom:14px;
}
.search-label span{color:var(--orange);}
.ai-search-box{
  background:var(--surface);
  border:1.5px solid var(--border2);
  border-radius:16px;overflow:hidden;
  transition:border-color .2s;
  box-shadow:0 4px 24px rgba(0,0,0,.2);
}
.ai-search-box:focus-within{border-color:var(--orange);}
.ai-search-top{
  display:flex;align-items:center;padding:6px 8px 6px 20px;gap:8px;
}
.ai-icon{font-size:20px;flex-shrink:0;}
.ai-input{
  flex:1;background:none;border:none;outline:none;
  color:var(--text);font-size:16px;padding:12px 8px;
  font-family:'Instrument Sans',sans-serif;
}
.ai-input::placeholder{color:var(--text3);}
.ai-search-btn{
  background:var(--orange);color:#fff;border:none;
  padding:10px 20px;border-radius:10px;
  font-family:'Instrument Sans',sans-serif;
  font-size:14px;font-weight:700;cursor:pointer;
  transition:background .15s;white-space:nowrap;
}
.ai-search-btn:hover{background:var(--orange2);}
.ai-search-btn:disabled{opacity:.5;cursor:not-allowed;}
.ai-clear-btn{
  background:none;border:none;color:var(--text3);
  cursor:pointer;padding:8px 12px;font-size:14px;
  display:none;transition:color .15s;
}
.ai-clear-btn.show{display:block;}
.ai-clear-btn:hover{color:var(--text);}
.ai-examples{
  border-top:1px solid var(--border);
  padding:10px 20px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;
}
.ai-ex-label{font-size:11px;color:var(--text3);}
.ai-ex-pill{
  font-size:12px;background:var(--surface2);border:1px solid var(--border);
  color:var(--text2);padding:4px 12px;border-radius:12px;
  cursor:pointer;transition:all .15s;
}
.ai-ex-pill:hover{border-color:var(--orange);color:var(--orange);}
.ai-thinking{
  padding:16px 20px;display:none;
  font-size:13px;color:var(--text2);
  align-items:center;gap:8px;
  border-top:1px solid var(--border);
}
.ai-thinking.show{display:flex;}
.think-dot{width:6px;height:6px;border-radius:50%;background:var(--orange);animation:tdot 1.2s infinite;}
.think-dot:nth-child(2){animation-delay:.2s;}
.think-dot:nth-child(3){animation-delay:.4s;}
@keyframes tdot{0%,80%,100%{opacity:.2;transform:scale(.8);}40%{opacity:1;transform:scale(1);}}

/* AI Results */
.ai-results{
  background:var(--surface);border:1px solid var(--border2);
  border-radius:14px;margin-top:12px;overflow:hidden;
  display:none;
}
.ai-results.show{display:block;}
.ai-results-head{
  padding:12px 18px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.ai-results-title{font-size:13px;font-weight:600;color:var(--text);}
.ai-result-count{font-size:12px;color:var(--text3);}
.ai-result-item{
  display:flex;align-items:center;gap:14px;
  padding:14px 18px;border-bottom:1px solid var(--border);
  cursor:pointer;transition:background .15s;
}
.ai-result-item:last-child{border-bottom:none;}
.ai-result-item:hover{background:var(--surface2);}
.ai-result-rank{
  width:24px;height:24px;border-radius:6px;
  background:var(--surface2);border:1px solid var(--border);
  font-size:11px;font-weight:700;color:var(--text3);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.ai-result-rank.top{background:rgba(255,98,36,.12);border-color:rgba(255,98,36,.3);color:var(--orange);}
.ai-result-body{flex:1;min-width:0;}
.ai-result-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:3px;}
.ai-result-reason{font-size:12px;color:var(--text2);}
.ai-result-meta{display:flex;gap:6px;margin-top:5px;flex-wrap:wrap;}
.ai-result-cat{font-size:10px;color:var(--text3);background:var(--surface2);border:1px solid var(--border);padding:2px 8px;border-radius:6px;}
.ai-result-tool{font-size:10px;color:var(--text3);background:var(--surface2);border:1px solid var(--border);padding:2px 8px;border-radius:6px;}
.ai-result-actions{display:flex;gap:6px;flex-shrink:0;}
.ai-result-copy{background:none;border:1px solid var(--border);color:var(--text2);padding:6px 12px;border-radius:8px;cursor:pointer;font-size:12px;font-family:'Instrument Sans',sans-serif;transition:all .15s;}
.ai-result-copy:hover{border-color:var(--orange);color:var(--orange);}
.ai-result-view{background:var(--orange);color:#fff;border:none;padding:6px 12px;border-radius:8px;cursor:pointer;font-size:12px;font-family:'Instrument Sans',sans-serif;}
.ai-empty{padding:24px;text-align:center;font-size:14px;color:var(--text2);display:none;}
.ai-empty.show{display:block;}
.ai-view-all{
  display:block;text-align:center;padding:14px;
  font-size:13px;font-weight:600;color:var(--orange);
  border-top:1px solid var(--border);transition:background .15s;
}
.ai-view-all:hover{background:var(--surface2);}

/* ══ FLIP CARDS SECTION ══ */
.flip-section{padding:0 20px 64px;max-width:1100px;margin:0 auto;}
.section-eyebrow{
  display:flex;align-items:center;gap:10px;margin-bottom:24px;
}
.ey-line{flex:1;height:1px;background:var(--border);}
.ey-label{
  font-size:11px;font-weight:700;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--text3);
  white-space:nowrap;
}
.flip-grid{
  display:grid;
  grid-template-columns:1.55fr 1fr;
  grid-template-rows:220px 190px 160px;
  gap:4px;
}
/* Hero card — left, spans all 3 rows */
.flip-card.hero{
  grid-column:1;
  grid-row:1/4;
}
/* Right column cards */
.flip-card.r1{ grid-column:2; grid-row:1; }
.flip-card.r2{ grid-column:2; grid-row:2; }
.flip-card.r3{ grid-column:2; grid-row:3; }
.flip-card{perspective:1000px;cursor:pointer;overflow:hidden;}
.flip-inner{
  position:relative;width:100%;height:100%;
  transition:transform .6s cubic-bezier(.4,0,.2,1);
  transform-style:preserve-3d;
}
.flip-card:hover .flip-inner,
.flip-card.flipped .flip-inner{transform:rotateY(180deg);}
.flip-front,.flip-back{
  position:absolute;inset:0;
  border-radius:14px;overflow:hidden;
  backface-visibility:hidden;-webkit-backface-visibility:hidden;
}
.flip-front{
  background:var(--surface);
  border:1px solid var(--border);
}
.flip-card.hero .flip-front{ border-radius:14px 0 0 14px; }
.flip-card.hero .flip-back{ border-radius:14px 0 0 14px; }
.flip-card.r1 .flip-front{ border-radius:0 14px 0 0; }
.flip-card.r1 .flip-back{ border-radius:0 14px 0 0; }
.flip-card.r3 .flip-front{ border-radius:0 0 14px 0; }
.flip-card.r3 .flip-back{ border-radius:0 0 14px 0; }
.flip-img{
  width:100%;height:100%;object-fit:cover;object-position:center top;
  transition:transform .4s;
}

// ── COPY HELPERS ──
function safeCopy(text, btnEl, successText){
  const orig = btnEl ? btnEl.textContent : '';
  if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(() => {
      if(btnEl){ btnEl.textContent = successText || '✅ Copied!'; setTimeout(() => btnEl.textContent = orig, 2000); }
    });
  } else {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.cssText = 'position:fixed;top:-9999px;opacity:0;';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    if(btnEl){ btnEl.textContent = successText || '✅ Copied!'; setTimeout(() => btnEl.textContent = orig, 2000); }
  }
}

// ── COPY LIMIT ──
const COPY_LIMIT = 10;
function getTodayKey(){ const d = new Date(); return 'pa_daily_'+d.getFullYear()+'_'+(d.getMonth()+1)+'_'+d.getDate(); }
function getDailyCopies(){ try { return parseInt(localStorage.getItem(getTodayKey())||'0'); } catch(e){ return 0; } }
function incrementDailyCopy(){ try { localStorage.setItem(getTodayKey(), getDailyCopies()+1); } catch(e){} }
function canCopy(){ return getDailyCopies() < COPY_LIMIT; }
function updateCopyLimitBar(){
  const used = getDailyCopies();
  const remaining = Math.max(0, COPY_LIMIT - used);
  const dots = document.querySelectorAll('.copy-dot');
  dots.forEach((d,i) => { d.style.background = i < used ? 'var(--orange)' : 'var(--surface3)'; });
  const lbl = document.querySelector('.copy-limit-label');
  if(lbl) lbl.innerHTML = remaining > 0 ? '<strong>'+remaining+'</strong> free copies left today' : '<strong>Come back tomorrow</strong> for 10 more free copies';
}

// ── AI SEARCH ──
let aiSearchActive = false;

function setAiQuery(el){
  document.getElementById('aiSearchInput').value = el.textContent;
  runAiSearch();
}

async function runAiSearch(){
  const query = document.getElementById('aiSearchInput').value.trim();
  if(!query) return;
  document.getElementById('aiExamples').style.display = 'none';
  document.getElementById('aiResults').classList.remove('show');
  document.getElementById('aiThinking').classList.add('show');
  document.getElementById('aiSearchBtn').disabled = true;
  document.getElementById('aiClearBtn').classList.add('show');
  aiSearchActive = true;
  const results = keywordSearch(query);
  document.getElementById('aiThinking').classList.remove('show');
  document.getElementById('aiSearchBtn').disabled = false;
  showAiResults(results, query);
}

function keywordSearch(query){
  if(!Array.isArray(PROMPTS)||!PROMPTS.length) return [];
  const q = query.toLowerCase().trim();
  const words = q.split(/\s+/).filter(w => w.length > 1);
  const intentMap = {
    'write':['writing','content','copywriting'],'image':['image generation','midjourney','art'],
    'art':['image generation','creative','midjourney'],'photo':['photography','portrait'],
    'business':['business','marketing','entrepreneur'],'market':['marketing','business'],
    'code':['code','tech','developer'],'tweet':['twitter','social','viral'],
    'linkedin':['linkedin','business'],'tiktok':['tiktok','viral','social'],
    'youtube':['youtube','video','script'],'email':['email','outreach','copywriting'],
    'story':['story','fiction','creative'],'legal':['legal','contract'],
    'real estate':['real estate','property'],'health':['health','wellness'],
    'agent':['agent','automation'],'startup':['startup','business','entrepreneur'],
    'brand':['branding','brand'],'sales':['sales','copywriting'],
    'resume':['resume','career'],'productivity':['productivity','focus'],
    'morning':['routine','habits','wellness'],'fantasy':['fantasy','image generation'],
    'midjourney':['midjourney','image generation'],'viral':['viral','social','marketing'],
    'hook':['hooks','viral','marketing'],'script':['script','youtube','video'],
    'course':['education','learning'],'life':['personal development','wellness'],
  };
  let expanded = [...words];
  Object.keys(intentMap).forEach(p => { if(q.includes(p)) expanded = [...expanded, ...intentMap[p]]; });
  const scored = PROMPTS.map(p => {
    const hay = p.name.toLowerCase()+' '+p.cat.toLowerCase()+' '+p.tags.join(' ').toLowerCase()+' '+(p.desc||'').toLowerCase();
    let score = 0;
    expanded.forEach(w => {
      if(!w || w.length < 2) return;
      if(p.name.toLowerCase().includes(w)) score += 6;
      else if(p.cat.toLowerCase().includes(w)) score += 3;
      else if(p.tags.join(' ').toLowerCase().includes(w)) score += 2;
      else if(hay.includes(w)) score += 1;
    });
    if(p.feat && score > 0) score += 1;
    return {id:p.id, score};
  }).filter(x => x.score > 0).sort((a,b) => b.score-a.score).slice(0,6)
    .map(x => ({id:x.id, reason:'Great match in '+( PROMPTS.find(p=>p.id===x.id)||{cat:''}).cat}));
  return scored;
}

function showAiResults(results, query){
  const list = document.getElementById('aiResultsList');
  const panel = document.getElementById('aiResults');
  const empty = document.getElementById('aiEmpty');
  const count = document.getElementById('aiResultCount');
  if(!results || !results.length){
    list.innerHTML = '';
    count.textContent = '0';
    empty.classList.add('show');
    panel.classList.add('show');
    return;
  }
  empty.classList.remove('show');
  count.textContent = results.length;
  list.innerHTML = results.map((r,i) => {
    const p = PROMPTS.find(x => x.id === r.id);
    if(!p) return '';
    const tl = p.tool==='chatgpt'?'🤖 ChatGPT':p.tool==='midjourney'?'🎨 Midjourney':'⚙️ Other';
    return '<div class="ai-result-item" onclick="showModal(\''+p.id+'\')">'
      +'<div class="ai-result-rank'+(i===0?' top':'')+'>'+(i+1)+'</div>'
      +'<div class="ai-result-body">'
      +'<div class="ai-result-name">'+p.name+'</div>'
      +'<div class="ai-result-reason">✨ '+(r.reason||'Strong match')+'</div>'
      +'<div class="ai-result-meta"><span class="ai-result-cat">'+p.cat+'</span><span class="ai-result-tool">'+tl+'</span></div>'
      +'</div>'
      +'<div class="ai-result-actions">'
      +'<button class="ai-result-copy" onclick="aiCopy(\''+p.id+'\',event)">📋 Copy</button>'
      +'<button class="ai-result-view" onclick="showModal(\''+p.id+'\');event.stopPropagation()">View →</button>'
      +'</div>'
      +'</div>';
  }).join('');
  panel.classList.add('show');
}

function aiCopy(id, e){
  if(!Array.isArray(PROMPTS)) return;
  e.stopPropagation();
  if(!canCopy()){ alert('Daily limit reached — come back tomorrow!'); return; }
  const p = PROMPTS.find(x => x.id === id);
  if(!p) return;
  safeCopy(p.text, e.target, '✅ Copied!');
  incrementDailyCopy();
  updateCopyLimitBar();
}

function clearAiSearch(){
  aiSearchActive = false;
  const inp = document.getElementById('aiSearchInput');
  const panel = document.getElementById('aiResults');
  const empty = document.getElementById('aiEmpty');
  const think = document.getElementById('aiThinking');
  const clr = document.getElementById('aiClearBtn');
  const btn = document.getElementById('aiSearchBtn');
  const ex = document.getElementById('aiExamples');
  if(inp) inp.value = '';
  if(panel) panel.classList.remove('show');
  if(empty) empty.classList.remove('show');
  if(think) think.classList.remove('show');
  if(clr) clr.classList.remove('show');
  if(btn) btn.disabled = false;
  if(ex) ex.style.display = '';
}

// ── FLIP CARDS ──
function flipCopy(btn, e){
  e.stopPropagation();
  const prompt = btn.closest('.flip-back').querySelector('.flip-back-prompt').textContent.trim();
  safeCopy(prompt, btn, '✅ Copied!');
}

// ── POTD ──
function setupPotd(){
  if(!PROMPTS || !PROMPTS.length) return;
  const d = new Date();
  const dayIndex = Math.floor((d - new Date(d.getFullYear(),0,0))/(1000*60*60*24));
  const p = PROMPTS[dayIndex % PROMPTS.length];
  if(!p) return;
  const el = id => document.getElementById(id);
  if(el('potdCat')) el('potdCat').textContent = p.cat;
  if(el('potdName')) el('potdName').textContent = p.name;
  if(el('potdText')) el('potdText').textContent = p.text;
  if(el('potdDate')) el('potdDate').textContent = d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  if(el('potdCopyBtn')) el('potdCopyBtn')._promptId = p.id;
}

function potdCopy(){
  const btn = document.getElementById('potdCopyBtn');
  const id = btn._promptId;
  const p = PROMPTS.find(x => x.id === id);
  if(!p) return;
  if(!canCopy()){ alert('Daily limit reached — come back tomorrow!'); return; }
  safeCopy(p.text, btn, '✅ Copied!');
  incrementDailyCopy();
  updateCopyLimitBar();
}

    extras: 'Deliver:\n- 3 headline variations\n- Primary text 2-3 sentences\n- Description\n- Call to action\n\nFocus on the benefit, not the feature.'
  },
  business: {
    role:   'You are a world-class business strategist and consultant.',
    goal:   'Analyze and provide strategic advice for',
    extras: 'Include:\n- Executive summary\n- Key opportunities\n- Risks and mitigation\n- Prioritized action steps with timelines'
  },
  code: {
    role:   'You are a senior software engineer with 15 years of experience.',
    goal:   'Build a clean, production-ready solution for',
    extras: 'Provide:\n- Well-structured code with comments\n- Error handling\n- Example usage\n- Key technical decisions explained'
  },
  midjourney: {
    role:   '',
    goal:   '',
    extras: 'cinematic lighting, ultra-detailed, masterpiece quality --ar 16:9 --v 7 --stylize 750 --style raw'
  },
  image: {
    role:   '',
    goal:   '',
    extras: 'photorealistic, professional quality, dramatic lighting, ultra-detailed, 8K resolution.'
  },
  art: {
    role:   '',
    goal:   '',
    extras: 'cinematic composition, dramatic volumetric lighting, ultra-detailed, award-winning digital art --ar 16:9 --v 7 --stylize 800'
  }
};

function detectIntent(text){
  var t = text.toLowerCase();
  if(t.match(/youtube|yt script|video script/)) return 'youtube';
  if(t.match(/instagram|ig post|instagram post/)) return 'instagram';
  if(t.match(/tiktok|tik tok|short form|reels/)) return 'tiktok';
  if(t.match(/linkedin/)) return 'linkedin';
  if(t.match(/email|newsletter|subject line|cold email/)) return 'email';
  if(t.match(/blog|article|seo post|write a post/)) return 'blog';
  if(t.match(/facebook ad|google ad|ad copy|advertisement/)) return 'ad';
  if(t.match(/market|campaign|brand|product launch/)) return 'marketing';
  if(t.match(/business|startup|strategy|pitch/)) return 'business';
  if(t.match(/code|function|build a|debug|app|website|script/)) return 'code';
  if(t.match(/midjourney|--ar|--v 7|mj prompt/)) return 'midjourney';
  if(t.match(/dall.?e|image of|photo of|picture of/)) return 'image';
  if(t.match(/draw|paint|art|illustration|artwork/)) return 'art';
  return 'blog';
}

function buildHeroPrompt(rawText){
  var t = rawText.trim();
  if(!t) return '';
  var intent = detectIntent(t);
  var tmpl = HERO_TRANSFORMS[intent] || HERO_TRANSFORMS['blog'];

  // Image/art prompts — no role/structure
  if(intent === 'midjourney' || intent === 'image' || intent === 'art'){
    return t + ', ' + tmpl.extras;
  }

  var lines = [];
  if(tmpl.role) lines.push(tmpl.role);
  lines.push('');
  lines.push(tmpl.goal + ':');
  lines.push(t);
  lines.push('');
  lines.push(tmpl.extras);
  return lines.join('\n');
}

function heroTransform(val){
  clearTimeout(heroTypingTimer);
  var el = document.getElementById('heroOutput');
  if(!val || !val.trim()){
    el.className = 'hcard-output';
    el.innerHTML = '<span style="color:var(--text3);">Type your idea above and watch it transform into a professional prompt in real time...</span>';
    heroCurrentPrompt = '';
    return;
  }
  heroTypingTimer = setTimeout(function(){
    var prompt = buildHeroPrompt(val);
    heroCurrentPrompt = prompt;
    typeHeroPrompt(prompt);
  }, 300);
}

function typeHeroPrompt(text){
  var el = document.getElementById('heroOutput');
  el.className = 'hcard-output typing';
  el.innerHTML = '';
  var i = 0;
  var speed = Math.max(6, Math.min(18, Math.floor(900 / text.length)));

  function tick(){
    if(i < text.length){
      i += 3;
      var chunk = text.slice(0, i);
      el.textContent = chunk;
      setTimeout(tick, speed);
    } else {
      el.textContent = text;
    }
  }
  tick();
}

function heroCopy(){
  if(!heroCurrentPrompt){
    alert('Type something first to generate a prompt!');
    return;
  }
  var btn = document.querySelector('.hcard-copy');
  var orig = btn ? btn.innerHTML : '';
  navigator.clipboard.writeText(heroCurrentPrompt).then(function(){
    if(btn){ btn.innerHTML = '✅ Copied!'; btn.style.background = '#22c55e'; }
    setTimeout(function(){
      if(btn){ btn.innerHTML = orig; btn.style.background = ''; }
    }, 2000);
  }).catch(function(){
    // Fallback
    var ta = document.createElement('textarea');
    ta.value = heroCurrentPrompt;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    if(btn){ btn.innerHTML = '✅ Copied!'; setTimeout(function(){ btn.innerHTML = orig; }, 2000); }
  });
}

// Auto-demo on load
setTimeout(function(){
  var inp = document.getElementById('heroInput');
  if(inp && !inp.value.trim()){
    var demos = [
      'Write me a YouTube script about how AI is changing business',
      'Create an Instagram post for a product launch',
      'Write a cold email to potential investors',
      'Build a viral TikTok hook about productivity hacks',
    ];
    var demo = demos[Math.floor(Math.random() * demos.length)];
    inp.placeholder = demo;
    heroTransform(demo);
    heroCurrentPrompt = buildHeroPrompt(demo);
  }
}, 1800);

// ── GATE TOAST ──
function hideGateToast(){
  var t = document.getElementById('copyGateToast');
  if(t) t.style.display = 'none';
}
function showGateToast(){
  var t = document.getElementById('copyGateToast');
  if(t){ t.style.display = 'block'; setTimeout(function(){ t.style.display='none'; }, 8000); }
}

// ── INIT ──
document.addEventListener('DOMContentLoaded', function(){
  // Wait for PROMPTS if not yet loaded
  if(typeof PROMPTS === 'undefined' || !Array.isArray(PROMPTS)){
    var checkInterval = setInterval(function(){
      if(typeof PROMPTS !== 'undefined' && Array.isArray(PROMPTS)){
        clearInterval(checkInterval);
        initPage();
      }
    }, 50);
    setTimeout(function(){ clearInterval(checkInterval); initPage(); }, 3000);
    return;
  }
  initPage();
});
function initPage(){
  const tb = document.getElementById('themeBtn');
  if(tb) tb.textContent = theme === 'light' ? '☀️' : '🌙';
  updateCopyLimitBar();
  setupPotd();
  // Update prompt count from PROMPTS array
  const sc = document.getElementById('hStatPrompts');
  if(sc && PROMPTS) sc.textContent = PROMPTS.length;
  // Ctrl+K focuses search
  document.addEventListener('keydown', e => {
    if((e.ctrlKey||e.metaKey) && e.key === 'k'){
      e.preventDefault();
      document.getElementById('aiSearchInput').focus();
    }
  });
}

/* Global overflow prevention — MUST be first */
