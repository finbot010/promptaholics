<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="description" content="Build perfect AI prompts visually. Live preview, frameworks, one-click improve, save templates." />
  <link rel="canonical" href="https://promptaholics.com/prompt-builder.html" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <meta name="google-adsense-account" content="ca-pub-1731098620016005" />

  <!-- Google AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1731098620016005" crossorigin="anonymous"></script>

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-DRW8ZNX921"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-DRW8ZNX921');
  </script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

  <title>Prompt Builder — Promptaholics</title>

  <style>
    :root {
      --surface2: #1e1e2c;
      --surface3: #28283a;
      --border: #1e1e2c;
      --border2: #28283a;
      --text: #f0f0f8;
      --orange: #ff6224;
      --orange2: #e84e0e;
      --teal: #00d4aa;
      --violet: #9b6dff;
      --hh: 90px;
      --bg: #0b0b12;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Instrument Sans', sans-serif;
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
    }

    header {
      height: var(--hh);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      background: linear-gradient(90deg, var(--orange), var(--violet));
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 200;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-mark {
      width: 32px;
      height: 32px;
      background: var(--orange);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 700;
      font-family: 'Syne', serif;
    }

    .logo-name {
      font-family: 'Syne', serif;
      font-size: 18px;
      font-weight: 800;
      color: var(--text);
    }

    .logo-name span {
      color: var(--orange);
    }

    main {
      padding: 40px 20px;
      max-width: 900px;
      margin: auto;
    }

    .builder-container {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    textarea {
      width: 100%;
      min-height: 180px;
      background: var(--surface3);
      color: var(--text);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 12px;
      font-size: 16px;
      resize: vertical;
    }

    button {
      background: var(--orange);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px 20px;
      font-size: 16px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.3s ease;
    }

    button:hover {
      background: var(--orange2);
    }

    iframe {
      width: 100%;
      min-height: 300px;
      border: 1px solid var(--border2);
      border-radius: 8px;
      background: var(--surface2);
    }

    @media (max-width: 600px) {
      header {
        flex-direction: column;
        height: auto;
        padding: 12px;
      }
      .logo-name {
        font-size: 16px;
      }
      main {
        padding: 20px 10px;
      }
    }
  </style>
</head>

<body>
  <header>
    <a href="/" class="logo">
      <div class="logo-mark">P</div>
      <div class="logo-name">Prompt<span>aholics</span></div>
    </a>
  </header>

  <main>
    <div class="builder-container">
      <textarea id="promptInput" placeholder="Write your prompt here..."></textarea>
      <button id="previewBtn">Preview Prompt</button>
      <iframe id="previewFrame"></iframe>
    </div>
  </main>

  <script>
    function initPage() {
      const input = document.getElementById('promptInput');
      const previewBtn = document.getElementById('previewBtn');
      const frame = document.getElementById('previewFrame');

      previewBtn.addEventListener('click', () => {
        const content = input.value.trim();
        frame.srcdoc = `<div style='padding:20px;font-family:Instrument Sans;color:#fff;background:#1e1e2c;'>${content}</div>`;
      });
    }

    document.addEventListener('DOMContentLoaded', () => initPage());
  </script>
</body>
</html>
