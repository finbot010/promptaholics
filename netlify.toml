[[edge_functions]]
  path = "/share/vault"
  function = "vault-image"

[[edge_functions]]
  path = "/share/prompt"
  function = "prompt-share"

# Firebase Auth handler — required for Google Sign-In popup/redirect
[[redirects]]
  from = "/__/auth/*"
  to = "https://promptaholics-534d3.firebaseapp.com/__/auth/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/__/firebase/*"
  to = "https://promptaholics-534d3.firebaseapp.com/__/firebase/:splat"
  status = 200
  force = true
