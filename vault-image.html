<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>

<!-- OG tags — populated by JS from URL params -->
<title id="pageTitle">AI Art — Promptaholics</title>
<meta name="description" id="pageDesc" content="AI-generated artwork on Promptaholics — the free AI prompt library."/>

<!-- Open Graph -->
<meta property="og:type" content="website"/>
<meta property="og:site_name" content="Promptaholics"/>
<meta property="og:title" id="ogTitle" content="AI Art — Promptaholics"/>
<meta property="og:description" id="ogDesc" content="AI-generated artwork. Create your own free at Promptaholics."/>
<meta property="og:image" id="ogImage" content=""/>
<meta property="og:image:width" content="1200"/>
<meta property="og:image:height" content="630"/>
<meta property="og:url" id="ogUrl" content=""/>

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image"/>
<meta name="twitter:site" content="@promptaholics"/>
<meta name="twitter:title" id="twTitle" content="AI Art — Promptaholics"/>
<meta name="twitter:description" id="twDesc" content="AI-generated artwork. Create your own free at Promptaholics."/>
<meta name="twitter:image" id="twImage" content=""/>

<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#07070a;--bg2:#0d0d14;--ink:#f0f0f8;--ink2:rgba(240,240,248,.65);--ink3:rgba(240,240,248,.35);--orange:#ff6224;--o2:#ff9f24;--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);}
body{background:var(--bg);color:var(--ink);font-family:'Instrument Sans',sans-serif;min-height:100dvh;display:flex;flex-direction:column;}
.nav{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:54px;background:rgba(7,7,10,.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;}
.nav-logo{font-family:'Syne',serif;font-size:15px;font-weight:900;color:var(--ink);text-decoration:none;}
.nav-logo span{color:var(--orange);}
.nav-links{display:flex;gap:16px;align-items:center;}
.nav-link{font-size:12px;color:var(--ink2);text-decoration:none;}
.nav-link:hover{color:var(--ink);}
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:32px 20px;}
.card{width:100%;max-width:640px;background:var(--bg2);border:1px solid var(--border2);border-radius:20px;overflow:hidden;}
.img-wrap{position:relative;aspect-ratio:1;background:#0a0a10;}
.img-wrap img{width:100%;height:100%;object-fit:contain;}
.img-loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--ink3);font-size:13px;}
.card-info{padding:24px;}
.card-title{font-family:'Syne',serif;font-size:20px;font-weight:900;margin-bottom:8px;}
.card-prompt{font-size:13px;color:var(--ink2);line-height:1.7;margin-bottom:20px;max-height:80px;overflow:hidden;position:relative;}
.card-prompt::after{content:'';position:absolute;bottom:0;left:0;right:0;height:24px;background:linear-gradient(transparent,var(--bg2));}
.card-actions{display:flex;gap:10px;flex-wrap:wrap;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;transition:all .15s;border:none;font-family:'Instrument Sans',sans-serif;}
.btn-primary{background:linear-gradient(135deg,var(--orange),var(--o2));color:#fff;}
.btn-secondary{background:rgba(255,255,255,.05);border:1px solid var(--border2);color:var(--ink2);}
.btn-secondary:hover{border-color:rgba(255,98,36,.3);color:var(--orange);}
.btn-share{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.25);color:#3b82f6;}
.badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 9px;border-radius:20px;background:rgba(255,98,36,.08);border:1px solid rgba(255,98,36,.18);color:var(--orange);margin-bottom:12px;}
.footer{text-align:center;padding:20px;font-size:11px;color:var(--ink3);border-top:1px solid var(--border);}
.footer a{color:var(--orange);text-decoration:none;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:11px 18px;font-size:13px;font-weight:600;color:var(--ink);z-index:999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<nav class="nav">
  <a href="index.html" class="nav-logo">Prompt<span>aholics</span></a>
  <div class="nav-links">
    <a href="vault.html" class="nav-link">Image Vault</a>
    <a href="library.html" class="nav-link">Prompts</a>
    <a href="agent.html" class="nav-link">PA Agent</a>
  </div>
</nav>

<div class="main">
  <div class="card">
    <div class="img-wrap">
      <div class="img-loading" id="imgLoading"><i class="ti ti-photo" style="font-size:32px;margin-bottom:8px;display:block;"></i>Loading image...</div>
      <img id="mainImg" src="" alt="" style="display:none;" onload="document.getElementById('imgLoading').style.display='none';this.style.display='block';" onerror="document.getElementById('imgLoading').textContent='Image unavailable'"/>
    </div>
    <div class="card-info">
      <div class="badge" id="toolBadge"><i class="ti ti-sparkles"></i> AI Generated</div>
      <div class="card-title" id="cardTitle">Loading...</div>
      <div class="card-prompt" id="cardPrompt"></div>
      <div class="card-actions">
        <button class="btn btn-share" onclick="shareImage()"><i class="ti ti-share-2"></i> Share</button>
        <button class="btn btn-secondary" onclick="copyPrompt()"><i class="ti ti-copy"></i> Copy Prompt</button>
        <a href="store-v2.html" class="btn btn-primary" id="printBtn" onclick="sendToStore()"><i class="ti ti-shirt"></i> Print on Hoodie</a>
        <a href="vault.html" class="btn btn-secondary"><i class="ti ti-arrow-left"></i> Back to Vault</a>
      </div>
    </div>
  </div>
</div>

<footer class="footer">
  <a href="index.html">Promptaholics</a> — Free AI Prompt Library · <a href="vault.html">Browse the Vault</a>
</footer>

<div class="toast" id="toast"></div>

<script>
const WORKER = 'https://dawn-thunder-a558.promptaholics1.workers.dev';

// Read URL params
var params = new URLSearchParams(window.location.search);
var imgUrl   = params.get('img') || '';
var title    = params.get('title') || 'AI Art';
var prompt   = params.get('prompt') || '';
var tool     = params.get('tool') || 'AI';
var imageId  = params.get('id') || '';

function init(){
  // Set page content
  document.getElementById('cardTitle').textContent = title;
  document.getElementById('cardPrompt').textContent = prompt || 'Created with AI on Promptaholics';
  document.getElementById('toolBadge').innerHTML = '<i class="ti ti-sparkles"></i> ' + tool;
  document.title = title + ' — Promptaholics';

  if(imgUrl){
    var img = document.getElementById('mainImg');
    img.src = imgUrl;
    img.alt = title;
  }

  // Set OG meta tags dynamically
  var ogImageUrl = WORKER + '/api/og?img=' + encodeURIComponent(imgUrl) + '&title=' + encodeURIComponent(title);
  document.getElementById('ogTitle').content  = title + ' — Promptaholics';
  document.getElementById('ogDesc').content   = prompt ? prompt.slice(0,150) : 'AI-generated artwork on Promptaholics.';
  document.getElementById('ogImage').content  = ogImageUrl;
  document.getElementById('ogUrl').content    = window.location.href;
  document.getElementById('twTitle').content  = title + ' — Promptaholics';
  document.getElementById('twDesc').content   = prompt ? prompt.slice(0,150) : 'AI-generated artwork. Create yours free.';
  document.getElementById('twImage').content  = ogImageUrl;
  document.getElementById('pageTitle').textContent = title + ' — Promptaholics';
  document.getElementById('pageDesc').content = prompt ? prompt.slice(0,150) : 'AI-generated artwork on Promptaholics.';
}

async function shareImage(){
  var shareUrl = window.location.href;
  if(navigator.share){
    try{
      await navigator.share({
        title: title + ' — Promptaholics',
        text: (prompt ? prompt.slice(0,100)+'...' : 'Check out this AI art!') + ' Free AI art at Promptaholics!',
        url: shareUrl
      });
      return;
    }catch(e){ if(e.name==='AbortError') return; }
  }
  try{
    await navigator.clipboard.writeText(shareUrl);
    showToast('Link copied — paste to share!');
  }catch(e){
    var tweet = encodeURIComponent(title + ' ' + shareUrl + ' #AIArt #Promptaholics');
    window.open('https://twitter.com/intent/tweet?text=' + tweet, '_blank');
  }
}

function copyPrompt(){
  if(!prompt){ showToast('No prompt available'); return; }
  navigator.clipboard.writeText(prompt).then(function(){
    showToast('Prompt copied!');
  }).catch(function(){
    showToast('Copy failed');
  });
}

function sendToStore(){
  if(imgUrl){
    localStorage.setItem('pa_store_image', imgUrl);
    localStorage.setItem('pa_store_image_label', title);
  }
}

function showToast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 3000);
}

init();
</script>
</body>
</html>
