name: Weekly Image Generator

on:
  schedule:
    - cron: '0 14 * * 1'
  workflow_dispatch:

jobs:
  generate-images:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate images
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node scripts/generate-images.js

      - name: Commit images
        run: |
          git config user.email "action@github.com"
          git config user.name "Promptaholics Bot"
          git add images/ || true
          git diff --staged --quiet || git commit -m "Weekly image refresh"
          git push || true
