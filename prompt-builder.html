<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Promptaholics Prompt Builder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #000000; /* PURE BLACK LEFT SIDE */
      --panel-bg: #0b0b12;
      --card: #11111a;
      --accent: #ff7a3c;
      --accent-soft: rgba(255, 122, 60, 0.12);
      --accent-strong: rgba(255, 122, 60, 0.22);
      --border: #26263a;
      --text: #f7f7ff;
      --muted: #a0a0c0;
      --radius-lg: 18px;
      --radius-md: 12px;
      --shadow-soft: 0 18px 45px rgba(0, 0, 0, 0.55);
      --shadow-subtle: 0 10px 30px rgba(0, 0, 0, 0.35);
      --transition-fast: 0.18s ease-out;
      --transition-med: 0.25s ease-out;
      --font-sans: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
        "Inter", "Segoe UI", sans-serif;
      --font-mono: "JetBrains Mono", "SF Mono", ui-monospace, Menlo, Monaco,
        Consolas, "Liberation Mono", "Courier New", monospace;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font-sans);
      background: var(--bg); /* PURE BLACK */
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: 16px 8px 80px;
    }

    @media (min-width: 768px) {
      body {
        padding: 32px 16px 40px;
      }
    }

    /* PAGE GRID */
    .page {
      width: 100%;
      max-width: 1200px;
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(0, 1.1fr);
      gap: 24px;
    }

    @media (max-width: 960px) {
      .page {
        grid-template-columns: minmax(0, 1fr);
      }
    }
