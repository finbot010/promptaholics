[[edge_functions]]
  path = "/share/vault"
  function = "vault-image"

[[edge_functions]]
  path = "/share/prompt"
  function = "prompt-share"

# Old store URL — replaces store.html's client-side meta-refresh redirect with a
# real server-side 301 (Google Search Console was flagging the old JS-based one)
[[redirects]]
  from = "/store.html"
  to = "/store-v2.html"
  status = 301
  force = true

# Firebase Auth handler — required for Google Sign-In popup/redirect
[[redirects]]
  from = "/__/auth/*"
  to = "https://promptaholics-534d3.firebaseapp.com/__/auth/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/__/firebase/*"
  to = "https://promptaholics-534d3.firebaseapp.com/__/firebase/:splat"
  status = 200
  force = true
