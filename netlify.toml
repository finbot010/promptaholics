# ═══════════════════════════════════════════════════
#  PROMPTAHOLICS — Netlify Configuration
# ═══════════════════════════════════════════════════

[build]
  publish   = "."
  functions = "netlify/functions"

# ── PERFORMANCE HEADERS ──────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options            = "DENY"
    X-Content-Type-Options     = "nosniff"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    Cache-Control              = "public, max-age=3600, stale-while-revalidate=86400"

[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

# ── IMAGES — short cache so weekly AI images update properly ──
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin  = "*"
    Access-Control-Allow-Headers = "Content-Type"
    Access-Control-Allow-Methods = "POST, OPTIONS"

# ── REDIRECTS ─────────────────────────────────────────
[[redirects]]
  from   = "http://promptaholics.com/*"
  to     = "https://www.promptaholics.com/:splat"
  status = 301
  force  = true

[[redirects]]
  from   = "http://www.promptaholics.com/*"
  to     = "https://www.promptaholics.com/:splat"
  status = 301
  force  = true

# Prompts file — short cache so new prompts show quickly
[[headers]]
  for = "/prompts.js"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"
