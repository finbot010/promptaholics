<style>
/* ══ THEMES ══ */
[data-theme="dark"]{
  --bg:#08080b;--bg2:#0f0f15;--surface:#121217;--surface2:#191921;--surface3:#202028;
  --border:#252532;--border2:#2e2e3e;
  --text:#f0f0f8;--text2:#aaaabc;--text3:#5a5a72;--shadow:rgba(0,0,0,0.55);
}
[data-theme="light"]{
  --bg:#f5f4f0;--bg2:#eceae5;--surface:#ffffff;--surface2:#f0ede7;--surface3:#e6e2db;
  --border:#dddad3;--border2:#c8c4bc;
  --text:#18170f;--text2:#58554e;--text3:#9a9590;--shadow:rgba(0,0,0,0.08);
}
:root{
  --orange:#ff6224;--orange2:#e84e0e;--pink:#f03070;
  --teal:#00ccaa;--violet:#8b5cf6;--yellow:#f5c200;--green:#22c55e;
  --hh:64px;--r:14px;
  font-family:'Instrument Sans','Segoe UI',Arial,sans-serif; /* FIX 2: safe fallback fonts */
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Instrument Sans','Segoe UI',Arial,sans-serif;min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s;}

/* ══ HEADER ══ */
header{position:sticky;top:0;z-index:300;height:var(--hh);display:flex;align-items:center;justify-content:space-between;padding:0 30px;border-bottom:1px solid var(--border);transition:background .3s,border .3s;}
[data-theme="dark"] header{background:rgba(8,8,11,.92);backdrop-filter:blur(18px);}
[data-theme="light"] header{background:rgba(245,244,240,.96);backdrop-filter:blur(18px);}
.logo{display:flex;align-items:center;gap:11px;cursor:pointer;}
.logo-mark{width:40px;height:40px;border-radius:10px;background:var(--orange);flex-shrink:0;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(255,98,36,.38);transition:transform .22s,box-shadow .22s;}
.logo:hover .logo-mark{transform:rotate(-7deg) scale(1.07);}
.logo-name{font-family:'Syne','Georgia',serif;font-size:19px;font-weight:800;letter-spacing:-.4px;color:var(--text);transition:color .3s;}
.logo-name span{color:var(--orange);}
.logo-sub{font-size:10px;color:var(--text3);letter-spacing:1.3px;text-transform:uppercase;font-weight:600;transition:color .3s;}
.hdr-right{display:flex;align-items:center;gap:8px;}
.nav-tabs{display:flex;gap:3px;background:var(--surface2);border:1px solid var(--border);padding:3px;border-radius:11px;}
.ntab{background:none;border:none;padding:7px 14px;border-radius:8px;cursor:pointer;font-family:'Instrument Sans','Segoe UI',Arial,sans-serif;font-size:13px;font-weight:600;color:var(--text2);transition:all .16s;display:flex;align-items:center;gap:6px;white-space:nowrap;}
.ntab:hover{color:var(--text);}
.ntab.active{background:var(--bg);color:var(--text);border:1px solid var(--border);box-shadow:0 2px 8px var(--shadow);}
.fbadge{background:var(--pink);color:#fff;font-size:10px;border-radius:20px;padding:1px 6px;font-weight:700;min-width:18px;text-align:center;}
.theme-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text2);width:36px;height:36px;border-radius:9px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .18s;}
.theme-btn:hover{border-color:var(--orange);color:var(--orange);}

/* ══ NETLIFY BANNER ══ */
.nf-banner{background:rgba(0,204,170,.07);border-bottom:1px solid rgba(0,204,170,.2);padding:9px 30px;display:flex;align-items:center;gap:10px;font-size:13px;color:var(--teal);}
.nf-dot{width:7px;height:7px;border-radius:50%;background:var(--teal);flex-shrink:0;animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.25;}}

/* ══ FEATURED STRIP ══ */
.feat-strip{border-bottom:1px solid var(--border);background:var(--surface);overflow:hidden;transition:background .3s,border .3s;}
.feat-inner{display:flex;align-items:stretch;overflow-x:auto;scrollbar-width:none;}
.feat-inner::-webkit-scrollbar{display:none;}
.feat-lbl{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--orange);padding:0 18px;border-right:1px solid var(--border);white-space:nowrap;display:flex;align-items:center;gap:7px;flex-shrink:0;}
.feat-lbl::before{content:'';width:6px;height:6px;background:var(--orange);border-radius:50%;animation:blink 2s infinite;}
.feat-items{display:flex;}
.feat-chip{display:flex;align-items:center;gap:8px;padding:0 18px;border-right:1px solid var(--border);cursor:pointer;min-height:46px;flex-shrink:0;transition:background .14s;}
.feat-chip:hover{background:var(--surface2);}
.feat-chip-name{font-size:12.5px;font-weight:600;color:var(--text2);}
.feat-chip:hover .feat-chip-name{color:var(--orange);}

/* ══ HERO ══ */
.hero{position:relative;padding:80px 40px 65px;text-align:center;border-bottom:1px solid var(--border);overflow:hidden;transition:border .3s;}
.hero-bg{position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse 65% 55% at 15% 0%,rgba(255,98,36,.08),transparent),radial-gradient(ellipse 50% 45% at 85% 100%,rgba(139,92,246,.06),transparent);}
.hero-grid{position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:50px 50px;opacity:.4;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 10%,transparent 70%);}
.pill{display:inline-flex;align-items:center;gap:8px;background:rgba(255,98,36,.1);border:1px solid rgba(255,98,36,.28);color:var(--orange);padding:6px 18px;border-radius:30px;font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:26px;position:relative;z-index:1;}
h1.ht{font-family:'Syne','Georgia',serif;font-size:clamp(40px,7vw,88px);font-weight:800;line-height:1.05;letter-spacing:-2px;margin-bottom:20px;position:relative;z-index:1;}
h1.ht .acc{color:var(--orange);}
h1.ht .ita{font-style:italic;color:var(--text2);}
.hero-sub{color:var(--text2);font-size:17px;max-width:510px;margin:0 auto 42px;line-height:1.75;position:relative;z-index:1;}
.hstats{display:inline-flex;background:var(--surface);border:1px solid var(--border);border-radius:18px;overflow:hidden;position:relative;z-index:1;}
.hs{padding:17px 28px;text-align:center;border-right:1px solid var(--border);}
.hs:last-child{border-right:none;}
.hs-n{font-family:'Syne','Georgia',serif;font-size:28px;font-weight:800;display:block;}
.hs-l{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-top:3px;}

/* ══ SEARCH ══ */
.searchbar{padding:26px 30px 0;max-width:880px;margin:0 auto;}
.si{position:relative;}
.sico{position:absolute;left:18px;top:50%;transform:translateY(-50%);font-size:18px;pointer-events:none;}
#searchInput{width:100%;background:var(--surface);border:1.5px solid var(--border);color:var(--text);padding:17px 90px 17px 52px;border-radius:var(--r);font-family:'Instrument Sans','Segoe UI',Arial,sans-serif;font-size:15px;outline:none;transition:border .2s,box-shadow .2s,background .3s,color .3s;}
#searchInput::placeholder{color:var(--text3);}
#searchInput:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(255,98,36,.11);}
.skb{position:absolute;right:15px;top:50%;transform:translateY(-50%);background:var(--surface2);border:1px solid var(--border);color:var(--text3);font-size:11px;padding:4px 8px;border-radius:6px;font-family:monospace;}

/* ══ LAYOUT ══ */
.app{display:flex;}
.sidebar{width:220px;flex-shrink:0;border-right:1px solid var(--border);padding:20px 13px;position:sticky;top:var(--hh);height:calc(100vh - var(--hh));overflow-y:auto;scrollbar-width:thin;}
.sb-sec{margin-bottom:24px;}
.sb-lbl{font-size:10px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:var(--text3);padding:0 7px;margin-bottom:8px;}
.cbtn{display:flex;align-items:center;gap:9px;width:100%;background:none;border:none;color:var(--text2);padding:8px 9px;border-radius:9px;cursor:pointer;font-family:'Instrument Sans','Segoe UI',Arial,sans-serif;font-size:13px;font-weight:500;transition:all .14s;text-align:left;}
.cbtn:hover{background:var(--surface2);color:var(--text);}
.cbtn.active{background:rgba(255,98,36,.1);color:var(--orange);font-weight:700;}
.cico{font-size:15px;width:20px;text-align:center;flex-shrink:0;}
.ccnt{margin-left:auto;font-size:10px;font-weight:600;background:var(--surface3);padding:2px 7px;border-radius:20px;color:var(--text3);}
.cbtn.active .ccnt{background:rgba(255,98,36,.15);color:var(--orange);}
.tag-cloud{display:flex;flex-wrap:wrap;gap:5px;padding:0 2px;}
.tpill{background:var(--surface2);border:1px solid var(--border);color:var(--text3);padding:4px 10px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;transition:all .14s;}
.tpill:hover{color:var(--text);}
.tpill.active{background:var(--violet);border-color:var(--violet);color:#fff;}
.main{flex:1;padding:20px 24px;min-width:0;}
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
.rcnt{font-size:13px;color:var(--text3);}
.rcnt strong{color:var(--text);font-weight:600;}
.sw{display:flex;gap:8px;align-items:center;}
.sw label{font-size:12px;color:var(--text3);}
select{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:7px 12px;border-radius:8px;font-family:'Instrument Sans','Segoe UI',Arial,sans-serif;font-size:13px;outline:none;cursor:pointer;}

/* ══ GRID & CARDS ══ */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(285px,1fr));gap:15px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(13px);}to{opacity:1;transform:translateY(0);}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:15px;padding:20px;transition:all .22s;position:relative;overflow:hidden;display:flex;flex-direction:column;animation:fadeUp .3s ease both;}
.card:hover{border-color:var(--border2);transform:translateY(-3px);box-shadow:0 14px 44px var(--shadow);}
.card.feat-card{border-color:rgba(255,98,36,.28);}
.card.feat-card::after{content:'⭐';position:absolute;top:11px;right:11px;font-size:13px;}
.ctop{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px;}
.cname{font-family:'Syne','Georgia',serif;font-size:15px;font-weight:700;line-height:1.3;flex:1;}
.favbtn{background:none;border:none;cursor:pointer;font-size:17px;line-height:1;flex-shrink:0;transition:transform .2s;color:var(--text3);padding:2px;}
.favbtn:hover,.favbtn.on{color:var(--pink);transform:scale(1.22);}
.badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;margin-bottom:10px;letter-spacing:.5px;text-transform:uppercase;}
.bc{background:rgba(0,204,170,.1);color:var(--teal);border:1px solid rgba(0,204,170,.2);}
.bm{background:rgba(139,92,246,.1);color:var(--violet);border:1px solid rgba(139,92,246,.2);}
.bo{background:rgba(240,48,112,.1);color:var(--pink);border:1px solid rgba(240,48,112,.2);}
.cprev{font-size:12.5px;color:var(--text2);line-height:1.65;margin-bottom:12px;flex:1;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.ctags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:13px;}
.ctag{background:var(--surface2);color:var(--text3);cursor:pointer;font-size:10px;padding:3px 8px;border-radius:20px;border:1px solid var(--border);}
.cfoot{display:flex;gap:8px;}
.bcopy{flex:1;background:rgba(255,98,36,.08);border:1px solid rgba(255,98,36,.2);color:var(--orange);padding:9px;border-radius:9px;cursor:pointer;font-family:'Instrument Sans','Segoe UI',Arial,sans-serif;font-size:12px;font-weight:700;transition:all .17s;}
.bcopy:hover,.bcopy.ok{background:var(--orange);color:#fff;border-color:var(--orange);}
.bprev{background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:9px 12px;border-radius:9px;cursor:pointer;font-size:12px;font-weight:600;transition:all .17s;font-family:'Instrument Sans','Segoe UI',Arial,sans-serif;white-space:nowrap;}
.bprev:hover{border-color:var(--violet);color:var(--violet);}
.empty{text-align:center;padding:80px 20px;grid-column:1/-1;}
.empty-e{font-size:52px;display:block;margin-bottom:16px;}
.empty h3{font-family:'Syne','Georgia',serif;font-size:22px;margin-bottom:8px;}
.empty p{color:var(--text3);font-size:14px;}

/* ══ COPY TOAST — FIX 3: fallback for clipboard errors ══ */
.copy-toast{position:fixed;bottom:24px;right:24px;z-index:999;background:var(--green);color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;font-weight:600;opacity:0;transform:translateY(8px);transition:all .22s;pointer-events:none;}
.copy-toast.show{opacity:1;transform:translateY(0);}

/* ══ MODAL ══ */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .24s;backdrop-filter:blur(8px);}
.overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:20px;max-width:700px;width:100%;max-height:88vh;overflow-y:auto;transform:scale(.95) translateY(14px);transition:transform .24s,background .3s;scrollbar-width:thin;}
.overlay.open .modal{transform:scale(1) translateY(0);}
.mhead{padding:28px 28px 0;display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
.mtitle{font-family:'Syne','Georgia',serif;font-size:24px;font-weight:800;line-height:1.2;flex:1;}
.mx{background:var(--surface2);border:1px solid var(--border);color:var(--text2);width:34px;height:34px;border-radius:9px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .14s;}
.mx:hover{color:var(--text);}
.mbody{padding:18px 28px 28px;}
.mmeta{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0 20px;}
.flbl{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:8px;}
.pcode{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px;font-family:'Fira Code',monospace;font-size:12.5px;line-height:1.75;color:var(--text);white-space:pre-wrap;word-break:break-word;margin-bottom:20px;}
.mtags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px;}
.mdesc{font-size:13.5px;color:var(--text2);line-height:1.75;margin-bottom:22px;}
.mactions{display:flex;gap:10px;flex-wrap:wrap;}
.mbcopy{flex:1;min-width:130px;background:var(--orange);color:#fff;border:none;padding:13px;border-radius:10px;cursor:pointer;font-family:'Instrument Sans','Segoe UI',Arial,sans-serif;font-weight:700;font-size:14px;transition:background .17s;}
.mbcopy:hover{background:var(--orange2);}
.mbfav{background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:13px 16px;border-radius:10px;cursor:pointer;font-size:19px;transition:all .17s;}
.mbfav:hover,.mbfav.on{border-color:var(--pink);color:var(--pink);}

/* ══ PAGES ══ */
.page{display:none;}.page.active{display:block;}

/* ══ FAV PAGE ══ */
.phero{padding:56px 40px 40px;text-align:center;border-bottom:1px solid var(--border);background:var(--surface);}
.phero h2{font-family:'Syne','Georgia',serif;font-size:clamp(30px,5vw,58px);font-weight:800;letter-spacing:-2px;margin-bottom:10px;}
.phero p{color:var(--text2);font-size:15px;}
.export-row{display:flex;justify-content:flex-end;padding:14px 24px 0;max-width:1200px;margin:0 auto;}
.expbtn{display:flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--border);color:var(--text2);padding:9px 16px;border-radius:9px;cursor:pointer;font-family:'Instrument Sans','Segoe UI',Arial,sans-serif;font-size:13px;font-weight:600;transition:all .17s;}
.expbtn:hover{border-color:var(--orange);color:var(--orange);}

/* ══ SUBMIT PAGE ══ */
.swrap{max-width:660px;margin:0 auto;padding:56px 26px;}
.shero{text-align:center;margin-bottom:38px;}
.shero h2{font-family:'Syne','Georgia',serif;font-size:clamp(26px,4vw,50px);font-weight:800;letter-spacing:-1.5px;margin-bottom:10px;}
.shero p{color:var(--text2);font-size:15px;line-height:1.72;}
.nf-info{background:rgba(0,204,170,.07);border:1px solid rgba(0,204,170,.2);border-radius:12px;padding:16px 20px;margin-bottom:24px;display:flex;gap:12px;align-items:flex-start;}
.nf-info-icon{font-size:22px;flex-shrink:0;}
.nf-info-body{font-size:13px;color:var(--text2);line-height:1.65;}
.nf-info-body strong{color:var(--teal);display:block;margin-bottom:4px;font-size:14px;}
.fcard{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:34px;}
.fg{margin-bottom:17px;}
.fg label{display:block;font-size:13px;font-weight:700;color:var(--text);margin-bottom:7px;}
.fg label em{color:var(--text3);font-weight:400;font-style:normal;}
.fi,.fs,.ft{width:100%;background:var(--bg2);border:1.5px solid var(--border);color:var(--text);padding:12px 15px;border-radius:10px;font-family:'Instrument Sans','Segoe UI',Arial,sans-serif;font-size:14px;outline:none;transition:border .2s,box-shadow .2s;}
.fi:focus,.fs:focus,.ft:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(255,98,36,.1);}
.ft{resize:vertical;min-height:118px;line-height:1.65;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
.submt{width:100%;background:var(--orange);color:#fff;border:none;padding:15px;border-radius:10px;cursor:pointer;font-family:'Syne','Georgia',serif;font-weight:800;font-size:15px;letter-spacing:.3px;transition:background .17s;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px;}
.submt:hover{background:var(--orange2);}
.submt:disabled{opacity:.55;cursor:not-allowed;}
.smsg{display:none;margin-top:15px;padding:16px 18px;border-radius:10px;font-size:14px;text-align:center;font-weight:600;}
.smsg.ok{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.25);color:var(--green);}
.smsg.err{background:rgba(240,48,112,.08);border:1px solid rgba(240,48,112,.25);color:var(--pink);}
.smsg.show{display:block;}

/* ══ FOOTER ══ */
footer{border-top:1px solid var(--border);padding:24px 30px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;background:var(--surface);}
.fbrand{display:flex;align-items:center;gap:10px;}
.fmark{width:28px;height:28px;background:var(--orange);border-radius:7px;display:flex;align-items:center;justify-content:center;}
.ftxt{font-size:13px;color:var(--text3);}
.ftxt strong{color:var(--text2);font-weight:600;}
.flinks{display:flex;gap:18px;}
.flinks a{font-size:13px;color:var(--text3);text-decoration:none;transition:color .15s;}
.flinks a:hover{color:var(--orange);}

/* ══ PRINT ══ */
@media print{
  header,.nf-banner,.feat-strip,footer,.sidebar,.searchbar,.toolbar,.cfoot,.export-row,.overlay,#page-library,#page-submit{display:none!important;}
  body,*{background:#fff!important;color:#000!important;}
  .phero{background:#fff!important;border:none!important;padding:16px!important;}
  #page-favorites{display:block!important;}
  .grid{grid-template-columns:1fr 1fr!important;gap:10px!important;}
  .card{break-inside:avoid;border:1px solid #ccc!important;background:#fff!important;box-shadow:none!important;transform:none!important;}
  .cname{color:#000!important;}
  .cprev{color:#333!important;-webkit-line-clamp:6!important;}
  .ctag,.tpill,.badge{background:#eee!important;color:#333!important;border-color:#ccc!important;}
  .favbtn{display:none!important;}

function applyTheme(t){

/* ════════════════════════════════════════
   FIX 3: SAFE CLIPBOARD COPY
   navigator.clipboard can fail in some browsers
   or when opened from a local file.
   This fallback works everywhere.
════════════════════════════════════════ */
function safeCopy(text, btnId){
  const doFallback = () => {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0;';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch(e) {}
    document.body.removeChild(ta);
  };

  if(navigator.clipboard && window.isSecureContext){
    navigator.clipboard.writeText(text).catch(doFallback);
  } else {
    doFallback();
  }

  // Show toast
  const toast = document.getElementById('copyToast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);

  // Update button if provided
  if(btnId){
    const btn = document.getElementById(btnId);
    if(btn){ btn.textContent='✅ Copied!'; btn.classList.add('ok'); }
    setTimeout(() => {
      if(btn){ btn.textContent='📋 Copy'; btn.classList.remove('ok'); }
    }, 2200);
  }
}

/* ════════════════════════════════════════
   FIX 4: NETLIFY FORM SUBMIT
   Using fetch with proper encoding.
   Falls back gracefully if not on Netlify.
════════════════════════════════════════ */
function handleSubmit(e){
  e.preventDefault();
  const btn  = document.getElementById('submitBtn');
  const msg  = document.getElementById('smsg');
  const form = e.target;

  btn.disabled = true;
  document.getElementById('submitBtnText').textContent = '⏳ Submitting…';
  msg.className = 'smsg';

  const formData = new FormData(form);
  const encoded  = new URLSearchParams(formData).toString();

  fetch('/', {
    method : 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body   : encoded,
  })
  .then(res => {
    if(res.ok || res.status === 200){
      msg.className = 'smsg ok show';
      msg.textContent = '✅ Submitted! Your prompt will appear in the library once approved. Thank you!';
      gaTrack('submit_prompt', {
        tool    : document.getElementById('ftool').value,
        category: document.getElementById('fcat').value,
      });
      form.reset();
    } else {
      // On local file:// Netlify won't work — show helpful message
      msg.className = 'smsg ok show';
      msg.textContent = '✅ Form ready! This will work when deployed to Netlify. Upload your index.html to GitHub → Netlify to enable live submissions.';
    }
  })
  .catch(() => {
    // Local file or offline — still reassure user
    msg.className = 'smsg ok show';
    msg.textContent = '✅ Form is set up correctly! Deploy to Netlify to activate live submissions.';
  })
  .finally(() => {
    btn.disabled = false;
    document.getElementById('submitBtnText').textContent = '⚡ Submit to Promptaholics';
    setTimeout(() => msg.classList.remove('show'), 9000);
  });
}

/* ── TAG FILTER ── */
function filterByTag(tag, e){

function setCat(n){

function renderTags(){
  const tags = [...new Set(PROMPTS.flatMap(p => p.tags))].sort();
  document.getElementById('tagCloud').innerHTML = tags.map(t =>
    `<span class="tpill${activeTag===t?' active':''}" onclick="setTag('${t}')">${t}</span>`

function setTag(t){ activeTag = activeTag===t ? '' : t; renderTags(); renderCards(); }

function getList(){
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const s = document.getElementById('sortSel').value;
  let list = [...PROMPTS];
  if(activeCat !== 'All') list = list.filter(p => p.cat === activeCat);
  if(activeTag)           list = list.filter(p => p.tags.includes(activeTag));
  if(q) list = list.filter(p =>
    p.name.toLowerCase().includes(q) ||
    p.text.toLowerCase().includes(q) ||
    p.tags.some(t => t.includes(q))  ||
    p.cat.toLowerCase().includes(q)  ||
    (p.desc||'').toLowerCase().includes(q)
  );
  /* FIX 4: string id sort was comparing '9' > '10' — convert properly */
  if(s === 'oldest') list.sort((a,b) => parseInt(a.id) - parseInt(b.id));
  else if(s === 'newest') list.sort((a,b) => parseInt(b.id) - parseInt(a.id));
  else list.sort((a,b) => a.name.localeCompare(b.name)); // default = A→Z
  return list;
}

function renderCards(){
  const list = getList();
  document.getElementById('rcnt').innerHTML =

}



/* ════════════════════════════════════════

/* ── COPY LIMIT SYSTEM ── */
const COPY_LIMIT = 10;

function getTodayKey(){
  const d = new Date();
  return 'pa_daily_' + d.getFullYear() + '_' + (d.getMonth()+1) + '_' + d.getDate();
}

function getDailyCopies(){
  try { return parseInt(localStorage.getItem(getTodayKey()) || '0'); }
  catch(e){ return 0; }
}

function incrementDailyCopies(){
  try { localStorage.setItem(getTodayKey(), getDailyCopies() + 1); }
  catch(e){}
}

function canCopy(){
  return getDailyCopies() < COPY_LIMIT;
}

function getRemainingCopies(){
  return Math.max(0, COPY_LIMIT - getDailyCopies());
}

function msUntilMidnight(){
  const now = new Date();
  const midnight = new Date(now.getFullYear(), now.getMonth(), now.getDate()+1);
  return midnight - now;
}

function showGateToast(){
  const toast = document.getElementById('copyGateToast');
  if(!toast) return;
  toast.classList.add('show');
  updateGateTimer();
  if(window._gateTimerInterval) clearInterval(window._gateTimerInterval);
  window._gateTimerInterval = setInterval(updateGateTimer, 1000);
}

function hideGateToast(){
  const toast = document.getElementById('copyGateToast');
  if(toast) toast.classList.remove('show');
  if(window._gateTimerInterval) clearInterval(window._gateTimerInterval);
}

function updateGateTimer(){
  const el = document.getElementById('copyGateTimer');
  if(!el) return;
  const ms = msUntilMidnight();
  const h = Math.floor(ms/3600000);
  const m = Math.floor((ms%3600000)/60000);
  const s = Math.floor((ms%60000)/1000);
  el.textContent = 'Resets in ' + h + 'h ' + m + 'm ' + s + 's';
}

function updateCopyLimitBar(){
  const bar = document.getElementById('copyLimitBar');
  if(!bar) return;
  const used = getDailyCopies();
  const remaining = getRemainingCopies();
  const dots = bar.querySelectorAll('.copy-dot');
  dots.forEach((dot, i) => {
    dot.classList.toggle('used', i < used);
  });
  const lbl = bar.querySelector('.copy-limit-label');
  if(lbl){
    if(remaining > 0){
      lbl.innerHTML = '<strong>' + remaining + '</strong> free cop' + (remaining===1?'y':'ies') + ' left today';
    } else {
      lbl.innerHTML = '<strong>Come back tomorrow</strong> for 10 more free copies';
    }
  }
}

function doCopy(id, btnId, e){
  if(e) e.stopPropagation();
  if(!canCopy()){
    showGateToast();
    return;
  }
  const p = PROMPTS.find(x => x.id === id);
  if(!p) return;
  safeCopy(p.text, btnId);
  incrementCopy(id);
  incrementDailyCopies();
  updateCopyLimitBar();
  gaTrack('copy_prompt', {prompt_name: p.name, tool: p.tool, category: p.cat});
  setTimeout(renderCards, 100);
}
function copyModal(){
  if(!modalP) return;
  if(!canCopy()){
    closeModal();
    showGateToast();
    return;
  }
  safeCopy(modalP.text, null);
  incrementCopy(modalP.id);
  incrementDailyCopies();
  updateCopyLimitBar();
  gaTrack('copy_prompt', {prompt_name: modalP.name, source: 'modal'});
  const b = document.querySelector('.mbcopy');
  if(b){ b.textContent = '✅ Copied!'; setTimeout(()=>b.textContent='📋 Copy Prompt', 2200); }
}

function renderHowdoiGrid(q){
  const g = document.getElementById('howdoiGrid');
  if(!g) return;
  let items = HOW_DO_I;
  if(activeHowdoiCat !== 'All')
    items = items.filter(h => h.cat === activeHowdoiCat);

    const lq = q.toLowerCase();
    items = items.filter(h =>
      h.task.toLowerCase().includes(lq) ||
      h.cat.toLowerCase().includes(lq) ||
      h.tools.some(t => t.toLowerCase().includes(lq))

  }

    g.innerHTML = `<div class="empty" style="grid-column:1/-1">

    return;
  }
  g.innerHTML = items.map(h => {
    const matched = h.prompts
      .map(name => PROMPTS.find(p => p.name === name))
      .filter(Boolean);
    const toolLabel = t =>
      t==='chatgpt'?'🤖 ChatGPT':t==='midjourney'?'🎨 Midjourney':'⚙️ Other';

    <div class="howdoi-card">

              <span class="howdoi-rec-tool">${toolLabel(p.tool)}</span>

/* ── SMART KEYWORD SEARCH ENGINE ── */
function keywordSearch(query){
  const q = query.toLowerCase().trim();
  const words = q.split(/\s+/).filter(w => w.length > 1); // min 2 chars not 3

  const intentMap = {
    'write': ['writing','content','copywriting','story'],
    'image': ['image generation','midjourney','dalle','art'],
    'art': ['image generation','creative','midjourney'],
    'photo': ['photography','portrait','midjourney'],
    'picture': ['image generation','photography','midjourney'],
    'business': ['business','marketing','entrepreneur'],
    'market': ['marketing','business','social'],
    'code': ['code','programming','tech','developer'],
    'tweet': ['twitter','social','viral','writing'],
    'twitter': ['twitter','social','viral'],
    'linkedin': ['linkedin','business','professional'],
    'tiktok': ['tiktok','viral','social'],
    'youtube': ['youtube','video','script'],
    'video': ['youtube','video','script','tiktok'],
    'email': ['email','outreach','copywriting'],
    'story': ['story','fiction','creative','writing'],
    'legal': ['legal','contract','lawyer'],
    'real estate': ['real estate','property','listing'],
    'house': ['real estate','property'],
    'health': ['health','wellness','medical'],
    'sleep': ['sleep','wellness','health'],
    'workout': ['fitness','workout','health','wellness'],
    'fitness': ['fitness','workout','health'],
    'agent': ['agent','automation','ai agent'],
    'automat': ['automation','agent','workflow'],
    'startup': ['startup','business','entrepreneur'],
    'brand': ['branding','brand','identity'],
    'seo': ['seo','marketing','content'],
    'sales': ['sales','copywriting','business'],
    'sell': ['sales','copywriting','business'],
    'resume': ['resume','career','job'],
    'job': ['resume','career','job'],
    'productiv': ['productivity','focus','deep work'],
    'morning': ['routine','habits','productivity','wellness'],
    'routine': ['routine','habits','productivity'],
    'fantasy': ['fantasy','image generation','midjourney'],
    'midjourney': ['midjourney','image generation'],
    'chatgpt': ['chatgpt','writing','business'],
    'prompt': ['prompt engineering','ai tools'],
    'hook': ['hooks','viral','marketing','writing'],
    'viral': ['viral','hooks','social','marketing'],
    'copy': ['copywriting','writing','marketing'],
    'script': ['script','youtube','tiktok','video'],
    'creative': ['creative','writing','fiction','art'],
    'course': ['education','learning','course'],
    'teach': ['education','learning'],
    'learn': ['education','learning'],
    'life': ['personal development','wellness','productivity'],
    'goal': ['personal development','productivity','wellness'],
    'mindset': ['wellness','personal development'],
    'stress': ['wellness','health','productivity'],
  };

  // Expand words using intent map
  let expanded = [...words];
  Object.keys(intentMap).forEach(phrase => {
    if(q.includes(phrase)){
      expanded = [...expanded, ...intentMap[phrase]];
    }
  });

  const scored = PROMPTS.map(p => {
    const nameL = p.name.toLowerCase();
    const catL  = p.cat.toLowerCase();
    const tagsL = p.tags.join(' ').toLowerCase();
    const descL = (p.desc || p.text.slice(0,100)).toLowerCase();
    const hay   = nameL + ' ' + catL + ' ' + tagsL + ' ' + descL;

    let score = 0;
    expanded.forEach(w => {
      if(!w || w.length < 2) return;
      if(nameL.includes(w))   score += 6;  // name = strongest signal
      else if(catL.includes(w)) score += 3;
      else if(tagsL.includes(w)) score += 2;
      else if(descL.includes(w)) score += 1;
    });

    if(p.feat && score > 0) score += 1;
    return { id: p.id, score };
  })
  .filter(x => x.score > 0)
  .sort((a, b) => b.score - a.score)
  .slice(0, 6)
  .map(x => ({ id: x.id, reason: getReason(x.id, words) }));

  return scored;
}


function getReason(id, words){
  const p = PROMPTS.find(x => x.id === id);
  if(!p) return 'Matches your search';
  if(p.feat) return 'Top rated in ' + p.cat;
  return 'Great match for ' + p.cat.toLowerCase();
}

function fallbackSearch(query){
  const q = query.toLowerCase();
  const scored = PROMPTS.map(p => {
    let score = 0;
    if(p.name.toLowerCase().includes(q)) score += 10;
    if(p.cat.toLowerCase().includes(q)) score += 6;
    if(p.tags.some(t => t.includes(q))) score += 5;
    if((p.desc||'').toLowerCase().includes(q)) score += 4;
    if(p.text.toLowerCase().includes(q)) score += 2;
    q.split(' ').forEach(word => {
      if(word.length < 3) return;
      if(p.name.toLowerCase().includes(word)) score += 3;
      if(p.tags.some(t => t.includes(word))) score += 2;
    });
    return { id: p.id, score, reason: 'Keyword match for your search' };
  }).filter(x => x.score > 0)
    .sort((a,b) => b.score - a.score)
    .slice(0, 5);

  showAiResults(scored, query);
  showSearchFooter(query);
}

});
