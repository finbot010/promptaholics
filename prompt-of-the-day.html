<style>
/* ── RESET ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

/* ── BRAND TOKENS (exact match to library.html) ── */
:root{
  --bg:#07070a;
  --bg2:#0d0d14;
  --ink:#f0f0f8;
  --ink2:#7070a0;
  --ink3:#30304a;
  --orange:#ff6224;
  --o2:#ff9f24;
  --glass:rgba(255,255,255,.04);
  --glass2:rgba(255,255,255,.08);
  --glass3:rgba(255,255,255,.12);
  --border:rgba(255,255,255,.07);
  --border2:rgba(255,255,255,.13);
  --blur:blur(12px);
  --radius:16px;
  --cat-color:#ff6224;
}

html,body{
  background:var(--bg);color:var(--ink);
  font-family:'Instrument Sans',sans-serif;
  min-height:100dvh;overflow-x:hidden;
}

/* ── CANVAS BG ── */
#bgCanvas{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;}

/* ── GRAIN ── */
.grain{
  position:fixed;inset:0;z-index:1;pointer-events:none;
  opacity:.028;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px;
  animation:grain .4s steps(1) infinite;
}
@keyframes grain{
  0%{background-position:0 0;}25%{background-position:-4px 2px;}
  50%{background-position:3px -3px;}75%{background-position:2px 4px;}
}

/* ── TOPNAV (matches site) ── */
.topnav{
  position:fixed;top:0;left:0;right:0;z-index:500;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;height:56px;
  background:rgba(7,7,10,.92);
  backdrop-filter:var(--blur);
  border-bottom:1px solid var(--border);
}
.nav-logo{
  display:flex;align-items:center;gap:8px;
  font-family:'Syne',serif;font-weight:900;font-size:17px;
  color:var(--ink);text-decoration:none;
}
.nav-logo svg{width:20px;height:22px;}
.nav-logo span{color:var(--orange);}
.nav-links{display:flex;align-items:center;gap:6px;}
.nav-link{
  padding:6px 12px;border-radius:8px;font-size:12px;
  font-weight:600;color:var(--ink2);text-decoration:none;
  transition:all .15s;
}
.nav-link:hover{color:var(--ink);background:var(--glass);}
.nav-cta{
  padding:7px 16px;border-radius:8px;font-size:12px;
  font-weight:700;background:var(--orange);color:#fff;
  text-decoration:none;transition:all .15s;
}
.nav-cta:hover{background:var(--o2);}
@media(max-width:600px){
  .nav-links .nav-link{display:none;}
  .nav-cta{font-size:11px;padding:6px 12px;}
}

/* ── MAIN STAGE ── */
.stage{
  position:relative;z-index:10;
  min-height:100dvh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:80px 24px 110px;
  max-width:860px;margin:0 auto;
}

/* ── DATE LABEL ── */
.date-label{
  font-family:'JetBrains Mono',monospace;
  font-size:10px;color:var(--ink3);
  letter-spacing:2.5px;text-transform:uppercase;
  margin-bottom:22px;
  animation:fadeUp .5s .1s ease both;
}

/* ── CATEGORY BADGE ── */
.cat-badge{
  display:inline-flex;align-items:center;gap:8px;
  padding:6px 14px 6px 10px;border-radius:30px;
  background:rgba(255,98,36,.08);
  border:1px solid rgba(255,98,36,.2);
  font-size:10px;font-weight:700;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--orange);
  margin-bottom:28px;cursor:pointer;
  transition:all .2s;
  animation:fadeUp .5s .15s ease both;
}
.cat-badge:hover{background:rgba(255,98,36,.13);border-color:rgba(255,98,36,.35);}
.cat-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--orange);box-shadow:0 0 8px var(--orange);
  animation:pulse 2s infinite;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(1.5);}}

/* ── LOADING ── */
.loading-wrap{
  min-height:220px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:20px;
}
.loading-orbs{display:flex;gap:10px;}
.orb{
  width:10px;height:10px;border-radius:50%;
  background:var(--orange);
  animation:orbUp .6s ease infinite;
}
.orb:nth-child(2){animation-delay:.12s;background:var(--o2);}
.orb:nth-child(3){animation-delay:.24s;}
@keyframes orbUp{0%,100%{transform:translateY(0);}50%{transform:translateY(-14px);}}
.loading-msg{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;color:var(--ink3);letter-spacing:1px;
}

/* ── THE PROMPT (the star of the show) ── */
.prompt-wrap{
  width:100%;text-align:center;position:relative;
  animation:fadeUp .4s ease both;
}

/* Huge decorative quote */
.deco-quote{
  font-family:'Syne',serif;font-weight:900;
  font-size:260px;line-height:.55;
  color:rgba(255,98,36,.04);
  position:absolute;top:-20px;left:-30px;
  pointer-events:none;user-select:none;
  z-index:0;
}

.prompt-text{
  font-family:'Syne',serif;
  font-weight:800;
  font-size:clamp(26px,4.5vw,58px);
  line-height:1.12;
  letter-spacing:-.5px;
  color:var(--ink);
  position:relative;z-index:2;
  min-height:180px;
  display:flex;align-items:center;justify-content:center;
}

/* Typewriter cursor */
.cur{
  display:inline-block;width:3px;height:.9em;
  background:var(--orange);border-radius:2px;
  margin-left:3px;vertical-align:middle;
  animation:blink .65s step-end infinite;
}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

/* ── META CHIPS ── */
.meta-row{
  display:flex;align-items:center;justify-content:center;
  gap:8px;flex-wrap:wrap;
  margin:24px 0 32px;
  animation:fadeUp .5s ease both;
}
.chip{
  display:inline-flex;align-items:center;gap:5px;
  padding:5px 11px;border-radius:6px;
  background:var(--glass);border:1px solid var(--border);
  font-size:11px;font-weight:600;color:var(--ink2);
  letter-spacing:.3px;
}
.chip i{font-size:12px;}
.chip.fw{
  background:rgba(255,98,36,.07);
  border-color:rgba(255,98,36,.18);
  color:var(--orange);
}
.chip.gold{
  background:rgba(255,159,36,.07);
  border-color:rgba(255,159,36,.18);
  color:var(--o2);
}

/* ── ACTION BUTTONS (brand-matched) ── */
.actions{
  display:flex;align-items:center;justify-content:center;
  gap:8px;flex-wrap:wrap;
  animation:fadeUp .5s .05s ease both;
}

/* Primary — matches site btn-hero-primary */
.btn-primary{
  display:inline-flex;align-items:center;gap:8px;
  padding:11px 22px;border-radius:10px;
  background:var(--orange);color:#fff;
  font-family:'Instrument Sans',sans-serif;
  font-weight:700;font-size:13px;letter-spacing:.2px;
  border:none;cursor:pointer;transition:all .2s;
}
.btn-primary:hover{background:var(--o2);transform:translateY(-2px);}
.btn-primary:active{transform:none;}
.btn-primary i{font-size:15px;}
.btn-primary.spinning i{animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Secondary — matches pcard-btn */
.btn-sec{
  display:inline-flex;align-items:center;gap:7px;
  padding:10px 18px;border-radius:10px;
  background:var(--glass);
  border:1px solid var(--border2);
  color:var(--ink);
  font-family:'Instrument Sans',sans-serif;
  font-weight:600;font-size:13px;
  cursor:pointer;transition:all .2s;text-decoration:none;
}
.btn-sec:hover{background:var(--glass2);transform:translateY(-2px);}
.btn-sec i{font-size:15px;}
.btn-sec.copied{border-color:rgba(34,197,94,.3);color:#22c55e;}

/* Gold variant */
.btn-gold{
  display:inline-flex;align-items:center;gap:7px;
  padding:10px 18px;border-radius:10px;
  background:rgba(255,159,36,.08);
  border:1px solid rgba(255,159,36,.2);
  color:var(--o2);
  font-family:'Instrument Sans',sans-serif;
  font-weight:600;font-size:13px;
  cursor:pointer;transition:all .2s;text-decoration:none;
}
.btn-gold:hover{background:rgba(255,159,36,.14);transform:translateY(-2px);}
.btn-gold i{font-size:15px;}

/* Icon-only (matches pcard-icon-btn) */
.btn-icon{
  display:inline-flex;align-items:center;justify-content:center;
  width:40px;height:40px;border-radius:10px;
  background:var(--glass);
  border:1px solid var(--border2);
  color:var(--ink2);cursor:pointer;
  transition:all .2s;font-size:16px;
}
.btn-icon:hover{
  background:rgba(255,98,36,.1);
  border-color:rgba(255,98,36,.25);
  color:var(--orange);
  transform:translateY(-2px);
}
.btn-icon i{font-size:16px;}

/* ── GLOW DIVIDER ── */
.divider{
  width:100px;height:1px;margin:44px auto 36px;
  background:linear-gradient(90deg,transparent,var(--orange),transparent);
  opacity:.4;animation:fadeUp .5s .3s ease both;
}

/* ── STATS (matches hero-stats) ── */
.stats{
  display:flex;align-items:center;justify-content:center;
  gap:0;flex-wrap:wrap;
  animation:fadeUp .5s .35s ease both;
}
.stat{text-align:center;padding:0 28px;}
.stat .n{
  display:block;font-family:'Syne',serif;font-weight:900;
  font-size:32px;color:var(--orange);letter-spacing:-.5px;
  line-height:1;
}
.stat .l{
  display:block;font-size:9px;color:var(--ink3);
  letter-spacing:2px;text-transform:uppercase;margin-top:4px;
}
.stat-sep{width:1px;height:36px;background:var(--border);}
@media(max-width:480px){
  .stats{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
  .stat-sep{display:none;}
  .stat{padding:0;}
}

/* ── PREVIOUS PROMPTS STRIP ── */
.prev-strip{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  display:flex;align-items:center;gap:14px;
  padding:12px 24px;
  background:rgba(7,7,10,.94);
  backdrop-filter:var(--blur);
  border-top:1px solid var(--border);
  animation:slideUp .6s .5s cubic-bezier(.16,1,.3,1) both;
}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:none;}}
.prev-label{
  font-family:'JetBrains Mono',monospace;
  font-size:9px;color:var(--ink3);
  letter-spacing:2px;text-transform:uppercase;
  white-space:nowrap;flex-shrink:0;
}
.prev-list{
  display:flex;gap:6px;overflow-x:auto;
  scrollbar-width:none;flex:1;
}
.prev-list::-webkit-scrollbar{display:none;}
.prev-chip{
  flex-shrink:0;
  display:inline-flex;align-items:center;gap:5px;
  padding:5px 10px;border-radius:6px;
  background:var(--glass);border:1px solid var(--border);
  font-size:10px;color:var(--ink2);
  max-width:180px;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;
  cursor:pointer;transition:all .15s;
  font-family:'Instrument Sans',sans-serif;
}
.prev-chip i{font-size:11px;flex-shrink:0;color:var(--ink3);}
.prev-chip:hover{background:var(--glass2);color:var(--ink);}

/* ── CATEGORY MODAL ── */
.modal-bg{
  position:fixed;inset:0;z-index:800;
  background:rgba(0,0,0,.6);
  backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
.modal-bg.open{opacity:1;pointer-events:all;}
.modal-panel{
  background:var(--bg2);
  border:1px solid var(--border2);
  border-radius:20px;padding:28px;
  width:min(460px,90vw);
  transform:translateY(12px) scale(.97);
  transition:all .3s cubic-bezier(.16,1,.3,1);
}
.modal-bg.open .modal-panel{transform:none;}
.modal-title{
  font-family:'Syne',serif;font-weight:900;
  font-size:22px;margin-bottom:18px;
  letter-spacing:-.3px;
}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.cat-btn{
  display:flex;align-items:center;gap:10px;
  padding:12px 14px;border-radius:12px;
  background:var(--glass);border:1px solid var(--border);
  cursor:pointer;transition:all .15s;text-align:left;
  font-family:'Instrument Sans',sans-serif;
}
.cat-btn:hover{border-color:rgba(255,98,36,.25);background:rgba(255,98,36,.05);}
.cat-btn.active{border-color:rgba(255,98,36,.4);background:rgba(255,98,36,.08);}
.cat-btn-icon{font-size:20px;flex-shrink:0;}
.cat-btn-info{flex:1;}
.cat-btn-name{font-size:12px;font-weight:700;color:var(--ink);display:block;}
.cat-btn-desc{font-size:10px;color:var(--ink3);display:block;margin-top:1px;}

/* ── TOAST (matches site) ── */
.pa-toast{
  position:fixed;bottom:70px;left:50%;
  transform:translateX(-50%) translateY(16px);
  background:rgba(13,13,20,.96);
  border:1px solid var(--border2);
  color:var(--ink);font-size:12px;font-weight:600;
  padding:9px 18px;border-radius:10px;
  backdrop-filter:var(--blur);
  z-index:999;pointer-events:none;
  opacity:0;transition:all .25s;
  font-family:'Instrument Sans',sans-serif;
  white-space:nowrap;
}
.pa-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── MOBILE NAV ── */
.mobile-nav{
  display:none;position:fixed;bottom:0;left:0;right:0;z-index:600;
  background:rgba(7,7,10,.97);border-top:1px solid var(--border);
  padding:6px 0 env(safe-area-inset-bottom,0);
}
.mobile-nav-inner{display:flex;justify-content:space-around;}
.mn-btn{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:6px 10px;color:var(--ink3);text-decoration:none;
  font-size:9px;font-weight:700;letter-spacing:.3px;
  background:none;border:none;cursor:pointer;transition:color .15s;
}
.mn-btn i{font-size:20px;}
.mn-btn.active,.mn-btn:hover{color:var(--orange);}
@media(max-width:768px){
  .mobile-nav{display:block;}
  .prev-strip{bottom:56px;}
  body{padding-bottom:56px;}
}

/* ── UTILS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:none;}}
</style>
</head>

<script>
// ══════════════════════════════════════════
//  CANVAS — floating orbs (brand colors)
// ══════════════════════════════════════════
const cvs = document.getElementById('bgCanvas');
const ctx = cvs.getContext('2d');
let W,H,orbs=[];

function resize(){W=cvs.width=innerWidth;H=cvs.height=innerHeight;}

class Orb{
  constructor(){this.init(true);}
  init(rand){
    this.x=Math.random()*W;
    this.y=rand?Math.random()*H:H+100;
    this.r=Math.random()*220+80;
    this.vx=(Math.random()-.5)*.12;
    this.vy=-(Math.random()*.25+.06);
    this.a=Math.random()*.055+.008;
    // Brand colors only: orange #ff6224 or gold #ff9f24
    this.isGold=Math.random()>.55;
  }
  update(){
    this.x+=this.vx;this.y+=this.vy;
    if(this.y+this.r<0)this.init(false);
  }
  draw(){
    const h=this.isGold?28:18; // hue for gold vs orange
    const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r);
    g.addColorStop(0,  `hsla(${h},100%,55%,${this.a})`);
    g.addColorStop(.5, `hsla(${h},90%,45%,${this.a*.25})`);
    g.addColorStop(1,  `hsla(${h},80%,30%,0)`);
    ctx.fillStyle=g;
    ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fill();
  }
}

function initOrbs(){orbs=Array.from({length:7},()=>new Orb());}
function tick(){ctx.clearRect(0,0,W,H);orbs.forEach(o=>{o.update();o.draw();});requestAnimationFrame(tick);}
addEventListener('resize',resize);resize();initOrbs();tick();

// ══════════════════════════════════════════
//  TYPEWRITER
// ══════════════════════════════════════════
function typewrite(el,text,speed,onDone){
  clearTimeout(typeTimer);
  el.innerHTML='';
  let i=0;
  function step(){
    if(i<text.length){
      el.innerHTML=text.slice(0,++i)+'<span class="cur"></span>';
      typeTimer=setTimeout(step,speed);
    } else {
      el.innerHTML=text;
      if(onDone)onDone();
    }
  }
  step();
}

//  COPY
// ══════════════════════════════════════════
function doCopy(){
  if(!currentPrompt)return;
  navigator.clipboard.writeText(currentPrompt).then(()=>{
    const btn=document.getElementById('copyBtn');
    btn.innerHTML='<i class="ti ti-check"></i>Copied!';
    btn.classList.add('copied');
    setTimeout(()=>{btn.innerHTML='<i class="ti ti-copy"></i>Copy';btn.classList.remove('copied');},2000);
  });
}

// ══════════════════════════════════════════
//  BUILD IT — passes prompt to builder via URL
// ══════════════════════════════════════════
function doBuildIt(e){
  e.preventDefault();
  if(!currentPrompt){
    showToast('Generate a prompt first!');
    return;
  }
  var encoded = encodeURIComponent(currentPrompt);
  window.location.href = 'prompt-builder.html?prompt=' + encoded;
}

// ══════════════════════════════════════════
//  SHARE
// ══════════════════════════════════════════
function doShare(){
  if(navigator.share&&currentPrompt){
    navigator.share({
      title:'Prompt of the Day — Promptaholics',
      text:currentPrompt,
      url:window.location.href,
    });
  } else {
    navigator.clipboard.writeText(window.location.href);
    showToast('Link copied!');
  }
}

// ══════════════════════════════════════════
//  BOOKMARK / SAVE
// ══════════════════════════════════════════
function doBookmark(){
  if(!currentPrompt)return;
  const idx=savedPrompts.indexOf(currentPrompt);
  if(idx>-1){
    savedPrompts.splice(idx,1);
    showToast('Removed from saved');
  } else {
    savedPrompts.push(currentPrompt);
    showToast('Saved to your prompts!');
  }
  localStorage.setItem('pa_potd_saved',JSON.stringify(savedPrompts));
  updateBookmarkState();
}
function updateBookmarkState(){
  const saved=savedPrompts.includes(currentPrompt);
  document.getElementById('bookmarkIcon').className=
    saved?'ti ti-bookmark-filled':'ti ti-bookmark';
  const btn=document.getElementById('bookmarkBtn');
  btn.style.color=saved?'var(--orange)':'';
}

// ══════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════
function showToast(msg){
  const t=document.getElementById('paToast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);
  t._t=setTimeout(()=>t.classList.remove('show'),2500);
}

// ══════════════════════════════════════════
//  PREV PROMPTS
// ══════════════════════════════════════════
function renderPrev(){
  const list=document.getElementById('prevList');
  if(!prevPrompts.length){list.innerHTML='<span style="font-size:10px;color:var(--ink3);font-family:\'JetBrains Mono\',monospace;">Generate your first prompt above</span>';return;}
  list.innerHTML=prevPrompts.map(p=>
    `<div class="prev-chip" onclick="reusePrompt(${JSON.stringify(p)})">
      <i class="ti ti-history"></i>
      ${p.slice(0,55)}...
    </div>`
  ).join('');
}
function reusePrompt(p){
  currentPrompt=p;
  document.getElementById('promptWrap').style.display='block';
  document.getElementById('loadingWrap').style.display='none';
  document.getElementById('metaRow').style.display='flex';
  document.getElementById('actionsRow').style.display='flex';
  typewrite(document.getElementById('promptText'),p,8);
  updateBookmarkState();
}
