<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PA Admin — Prompt Approvals</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root{
  --bg:#07070a; --bg2:#0d0d14; --glass:rgba(255,255,255,.04);
  --glass2:rgba(255,255,255,.07); --border:rgba(255,255,255,.06);
  --border2:rgba(255,255,255,.1); --ink:#f0ede8; --ink2:#a09a94;
  --ink3:#55504a; --orange:#ff6224; --o2:#e0521a;
  --green:#22c55e; --red:#ef4444; --blur:blur(12px);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--ink);font-family:'Instrument Sans',sans-serif;min-height:100vh;padding:0 0 60px;}

/* Nav */
.topnav{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border);background:rgba(7,7,10,.9);backdrop-filter:var(--blur);position:sticky;top:0;z-index:100;}
.nav-logo{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:700;color:var(--ink);text-decoration:none;}
.nav-logo svg{width:20px;height:22px;}
.nav-logo span{color:var(--orange);}
.admin-badge{font-size:10px;font-weight:700;letter-spacing:1px;padding:3px 8px;border-radius:5px;background:rgba(255,98,36,.12);border:1px solid rgba(255,98,36,.25);color:var(--orange);}

/* Layout */
.container{max-width:900px;margin:0 auto;padding:32px 20px;}
.page-header{margin-bottom:28px;}
.page-header h1{font-size:22px;font-weight:700;letter-spacing:-.3px;margin-bottom:4px;}
.page-header p{font-size:13px;color:var(--ink2);}
.stats-row{display:flex;gap:12px;margin-bottom:28px;flex-wrap:wrap;}
.stat-card{background:var(--glass);border:1px solid var(--border);border-radius:12px;padding:14px 18px;flex:1;min-width:120px;}
.stat-num{font-size:24px;font-weight:700;line-height:1;}
.stat-label{font-size:11px;color:var(--ink2);margin-top:4px;}
.stat-card.pending .stat-num{color:var(--orange);}
.stat-card.approved .stat-num{color:var(--green);}
.stat-card.rejected .stat-num{color:var(--red);}

/* Filter bar */
.filter-bar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.filter-btn{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border2);background:var(--glass);color:var(--ink2);transition:all .15s;font-family:'Instrument Sans',sans-serif;}
.filter-btn.active{background:rgba(255,98,36,.1);border-color:rgba(255,98,36,.3);color:var(--orange);}
.filter-btn:hover{background:var(--glass2);color:var(--ink);}

/* Prompt cards */
.prompt-list{display:flex;flex-direction:column;gap:12px;}
.prompt-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:18px 20px;transition:border .2s;}
.prompt-card:hover{border-color:var(--border2);}
.prompt-card.status-pending{border-left:3px solid var(--orange);}
.prompt-card.status-live{border-left:3px solid var(--green);}
.prompt-card.status-rejected{border-left:3px solid var(--red);opacity:.6;}
.card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px;}
.card-name{font-size:14px;font-weight:700;line-height:1.3;}
.card-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:5px;letter-spacing:.3px;}
.badge.cat{background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.2);color:#818cf8;}
.badge.fw{background:rgba(167,139,250,.08);border:1px solid rgba(167,139,250,.2);color:#a78bfa;}
.badge.status-pending{background:rgba(255,98,36,.1);border:1px solid rgba(255,98,36,.25);color:var(--orange);}
.badge.status-live{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);color:var(--green);}
.badge.status-rejected{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:var(--red);}
.badge.source{background:var(--glass);border:1px solid var(--border2);color:var(--ink2);}
.card-goal{font-size:11px;color:var(--ink3);font-style:italic;margin-bottom:10px;}
.card-text{font-size:12px;color:var(--ink2);line-height:1.65;font-family:'JetBrains Mono',monospace;background:var(--glass);border:1px solid var(--border);border-radius:8px;padding:12px;max-height:120px;overflow-y:auto;margin-bottom:14px;white-space:pre-wrap;}
.card-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.btn-approve{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:9px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:var(--green);font-weight:700;font-size:12px;cursor:pointer;transition:all .15s;font-family:'Instrument Sans',sans-serif;}
.btn-approve:hover{background:rgba(34,197,94,.18);}
.btn-approve:disabled{opacity:.4;cursor:not-allowed;}
.btn-reject{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:9px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:var(--red);font-weight:600;font-size:12px;cursor:pointer;transition:all .15s;font-family:'Instrument Sans',sans-serif;}
.btn-reject:hover{background:rgba(239,68,68,.15);}
.btn-reject:disabled{opacity:.4;cursor:not-allowed;}
.btn-copy{display:inline-flex;align-items:center;gap:5px;padding:8px 12px;border-radius:9px;background:var(--glass);border:1px solid var(--border2);color:var(--ink2);font-size:12px;cursor:pointer;transition:all .15s;font-family:'Instrument Sans',sans-serif;}
.btn-copy:hover{color:var(--ink);}
.card-date{font-size:10px;color:var(--ink3);font-family:'JetBrains Mono',monospace;margin-left:auto;}

/* Empty / loading */
.loading{text-align:center;padding:48px;color:var(--ink2);}
.loading i{font-size:32px;display:block;margin-bottom:12px;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty{text-align:center;padding:48px;color:var(--ink3);}
.empty i{font-size:40px;display:block;margin-bottom:12px;}
.empty p{font-size:14px;}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(12px);background:rgba(13,13,20,.96);border:1px solid var(--border2);color:var(--ink);font-size:12px;font-weight:600;padding:9px 18px;border-radius:10px;backdrop-filter:var(--blur);z-index:999;pointer-events:none;opacity:0;transition:all .25s;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* Auth gate */
.auth-gate{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;text-align:center;padding:24px;}
.auth-gate i{font-size:48px;color:var(--ink3);}
.auth-gate h2{font-size:18px;font-weight:700;}
.auth-gate p{font-size:13px;color:var(--ink2);max-width:300px;line-height:1.5;}
</style>
</head>
<body>

<nav class="topnav">
  <a href="index.html" class="nav-logo">
    <svg viewBox="0 0 22 24" fill="none"><path d="M3 2h8a5 5 0 0 1 0 10H3V2z" fill="white" fill-opacity=".9"/><path d="M14 13l-5 10 4.5-5.5H9.5L14 7l-4.5 5.5H14z" fill="white"/></svg>
    Prompt<span>aholics</span>
  </a>
  <div style="display:flex;align-items:center;gap:10px;">
    <span id="adminEmail" style="font-size:11px;color:var(--ink3);font-family:'JetBrains Mono',monospace;"></span>
    <span class="admin-badge">⚡ ADMIN</span>
  </div>
</nav>

<div class="container">
  <div id="authGate" class="auth-gate">
    <i class="ti ti-lock"></i>
    <h2>Admin Access Required</h2>
    <p id="authMsg">Checking authentication…</p>
    <button onclick="signInWithGoogle()" style="padding:12px 28px;background:var(--orange);color:#fff;border-radius:10px;font-weight:700;border:none;cursor:pointer;font-size:14px;font-family:'Instrument Sans',sans-serif;">
      <i class="ti ti-brand-google"></i> Sign In with Google
    </button>
    <a href="index.html" style="font-size:12px;color:var(--ink3);text-decoration:none;margin-top:8px;">← Back to Home</a>
  </div>

  <div id="adminPanel" style="display:none;">
    <div class="page-header">
      <h1>Prompt Approval Queue</h1>
      <p>Review PA-generated prompts. Approve to publish live to the library, reject to discard.</p>
    </div>

    <div class="stats-row">
      <div class="stat-card pending"><div class="stat-num" id="statPending">—</div><div class="stat-label">Pending</div></div>
      <div class="stat-card approved"><div class="stat-num" id="statLive">—</div><div class="stat-label">Live</div></div>
      <div class="stat-card rejected"><div class="stat-num" id="statRejected">—</div><div class="stat-label">Rejected</div></div>
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" onclick="setFilter('pending',this)">🟠 Pending</button>
      <button class="filter-btn" onclick="setFilter('live',this)">🟢 Live</button>
      <button class="filter-btn" onclick="setFilter('rejected',this)">🔴 Rejected</button>
      <button class="filter-btn" onclick="setFilter('all',this)">All</button>
    </div>

    <div class="prompt-list" id="promptList">
      <div class="loading"><i class="ti ti-loader-2"></i>Loading prompts…</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import {
  getFirestore, collection, getDocs, doc,
  updateDoc, addDoc, deleteDoc, query,
  orderBy, serverTimestamp, where
} from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup }
  from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

// ── ADMIN EMAILS — add yours here ──────────────────────────────
const ADMIN_EMAILS = [
  'finbot010@gmail.com',
  'promptaholics1@gmail.com',
];

const app = initializeApp({
  apiKey: "AIzaSyCWuUZjRUKMUEFtUHz6LCeWFSYS-c7qndQ",
  authDomain: "promptaholics-534d3.firebaseapp.com",
  projectId: "promptaholics-534d3",
  storageBucket: "promptaholics-534d3.firebasestorage.app",
  messagingSenderId: "426595742101",
  appId: "1:426595742101:web:1eb95579695bc6b1a5869c"
});

const db   = getFirestore(app);
const auth = getAuth(app);

let allPrompts   = [];
let activeFilter = 'pending';

// ── Sign in with Google ──────────────────────────────────────────
window.signInWithGoogle = async function(){
  try {
    const provider = new GoogleAuthProvider();
    const result = await signInWithPopup(auth, provider);
    // signInWithPopup stays on the same page — no redirect needed
    // onAuthStateChanged fires automatically and grants access if email matches
  } catch(e){
    if(e.code !== 'auth/popup-closed-by-user'){
      document.getElementById('authMsg').textContent = 'Sign-in failed: ' + e.message;
    }
  }
};
onAuthStateChanged(auth, async user => {
  const email = user ? user.email : null;
  console.log('PA Admin — signed in as:', email || 'NOT SIGNED IN');

  // Not signed in at all
  if(!user){
    document.getElementById('adminPanel').style.display = 'none';
    document.getElementById('authGate').style.display  = 'flex';
    document.getElementById('authMsg').textContent = 'You are not signed in. Please sign in first.';
    return;
  }

  // Signed in but wrong email
  if(!ADMIN_EMAILS.includes(email)){
    document.getElementById('adminPanel').style.display = 'none';
    document.getElementById('authGate').style.display  = 'flex';
    document.getElementById('authMsg').textContent = `Signed in as ${email} — not an admin account. Use one of your admin emails.`;
    return;
  }

  // ✅ Authorised
  document.getElementById('authGate').style.display  = 'none';
  document.getElementById('adminPanel').style.display = 'block';
  document.getElementById('adminEmail').textContent   = email;
  await loadPrompts();
});

// ── Load all pending prompts ────────────────────────────────────
async function loadPrompts(){
  const list = document.getElementById('promptList');
  list.innerHTML = '<div class="loading"><i class="ti ti-loader-2"></i>Loading…</div>';

  try {
    const snap = await getDocs(
      query(collection(db,'pending-prompts'), orderBy('submittedAt','desc'))
    );
    allPrompts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    updateStats();
    renderList();
  } catch(e){
    list.innerHTML = `<div class="empty"><i class="ti ti-alert-circle"></i><p>Error loading: ${e.message}</p></div>`;
  }
}

function updateStats(){
  document.getElementById('statPending').textContent  = allPrompts.filter(p=>p.status==='pending').length;
  document.getElementById('statLive').textContent     = allPrompts.filter(p=>p.status==='live').length;
  document.getElementById('statRejected').textContent = allPrompts.filter(p=>p.status==='rejected').length;
}

function renderList(){
  const list   = document.getElementById('promptList');
  const filtered = activeFilter === 'all'
    ? allPrompts
    : allPrompts.filter(p => p.status === activeFilter);

  if(!filtered.length){
    list.innerHTML = `<div class="empty"><i class="ti ti-inbox"></i><p>No ${activeFilter} prompts.</p></div>`;
    return;
  }

  list.innerHTML = filtered.map(p => {
    const date = p.submittedAt?.toDate
      ? p.submittedAt.toDate().toLocaleDateString()
      : '—';
    const isPending = p.status === 'pending';
    return `
    <div class="prompt-card status-${p.status}" id="card-${p.id}">
      <div class="card-header">
        <div class="card-name">${esc(p.name||'Untitled Prompt')}</div>
      </div>
      <div class="card-meta">
        <span class="badge status-${p.status}">${p.status}</span>
        <span class="badge cat">${esc(p.category||'General')}</span>
        <span class="badge fw">${esc(p.framework||'RTF')}</span>
        <span class="badge source">PA Agent</span>
      </div>
      ${p.goal ? `<div class="card-goal">Goal: "${esc(p.goal)}"</div>` : ''}
      <div class="card-text">${esc(p.text||'')}</div>
      <div class="card-actions">
        ${isPending ? `
          <button class="btn-approve" onclick="approvePrompt('${p.id}')">
            <i class="ti ti-check"></i> Approve & Publish
          </button>
          <button class="btn-reject" onclick="rejectPrompt('${p.id}')">
            <i class="ti ti-x"></i> Reject
          </button>
        ` : ''}
        <button class="btn-copy" onclick="copyText('${escAttr(p.text||'')}',this)">
          <i class="ti ti-copy"></i> Copy
        </button>
        <span class="card-date">${date}</span>
      </div>
    </div>`;
  }).join('');
}

// ── APPROVE — moves from pending-prompts → prompts (live library) ─
window.approvePrompt = async function(id){
  const btn = document.querySelector(`#card-${id} .btn-approve`);
  if(btn){ btn.disabled = true; btn.innerHTML = '<i class="ti ti-loader-2"></i> Publishing…'; }

  try {
    const prompt = allPrompts.find(p => p.id === id);
    if(!prompt) throw new Error('Prompt not found');

    // 1. Add to live prompts collection
    await addDoc(collection(db,'prompts'), {
      name:        prompt.name,
      text:        prompt.text,
      category:    prompt.category,
      framework:   prompt.framework,
      tags:        prompt.tags || ['ai-generated','pa-agent'],
      tool:        prompt.tool || 'chatgpt',
      feat:        false,
      source:      'pa-agent',
      views:       0,
      copies:      0,
      createdAt:   serverTimestamp(),
      approvedAt:  serverTimestamp(),
    });

    // 2. Update status in pending-prompts
    await updateDoc(doc(db,'pending-prompts',id), {
      status: 'live',
      approvedAt: serverTimestamp()
    });

    // 3. Update local state
    const idx = allPrompts.findIndex(p => p.id === id);
    if(idx > -1) allPrompts[idx].status = 'live';
    updateStats();
    renderList();
    showToast('✅ Prompt published to library!');
  } catch(e){
    showToast('❌ Error: ' + e.message);
    if(btn){ btn.disabled = false; btn.innerHTML = '<i class="ti ti-check"></i> Approve & Publish'; }
  }
};

// ── REJECT ───────────────────────────────────────────────────────
window.rejectPrompt = async function(id){
  const btn = document.querySelector(`#card-${id} .btn-reject`);
  if(btn){ btn.disabled = true; btn.innerHTML = '<i class="ti ti-loader-2"></i> Rejecting…'; }

  try {
    await updateDoc(doc(db,'pending-prompts',id), {
      status: 'rejected',
      rejectedAt: serverTimestamp()
    });
    const idx = allPrompts.findIndex(p => p.id === id);
    if(idx > -1) allPrompts[idx].status = 'rejected';
    updateStats();
    renderList();
    showToast('🗑 Prompt rejected');
  } catch(e){
    showToast('❌ Error: ' + e.message);
    if(btn){ btn.disabled = false; btn.innerHTML = '<i class="ti ti-x"></i> Reject'; }
  }
};

// ── Filter ───────────────────────────────────────────────────────
window.setFilter = function(f, btn){
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
};

// ── Utils ─────────────────────────────────────────────────────────
window.copyText = function(text, btn){
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.innerHTML;
    btn.innerHTML = '<i class="ti ti-check"></i> Copied!';
    setTimeout(() => btn.innerHTML = orig, 2000);
  });
};

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s){ return String(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,' ').replace(/\r/g,''); }

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
