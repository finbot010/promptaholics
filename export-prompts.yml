name: Export Approved Prompts to Library

on:
  schedule:
    - cron: '0 14 * * 1'  # Every Monday 2PM UTC
  workflow_dispatch:        # Manual trigger

jobs:
  export-prompts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install firebase-admin

      - name: Export approved prompts
        env:
          FIREBASE_PROJECT_ID: promptaholics-534d3
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
        run: node .github/scripts/export-prompts.js

      - name: Commit and push if changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "PA Agent Bot"
          git add prompts.js
          git diff --staged --quiet || git commit -m "🤖 Auto-export PA-generated prompts [skip ci]"
          git push
