<style>

*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#08080b;--surface:#111116;--surface2:#18181f;--surface3:#1e1e27;
  --border:#1f1f2a;--border2:#2a2a38;
  --text:#f0f0f8;--text2:#9999b0;--text3:#4a4a62;
  --orange:#ff6224;--orange2:#e84e0e;
  --teal:#00ccaa;--violet:#8b5cf6;
  --hh:60px;
}
.light{--bg:#f5f5f0;--surface:#fff;--surface2:#efefea;--surface3:#e5e5e0;--border:#e0ddd6;--border2:#c8c4bc;--text:#18170f;--text2:#58554e;--text3:#9a9590;}
body{background:var(--bg);color:var(--text);font-family:sans-serif;min-height:100vh;}
a{color:var(--orange);text-decoration:none;}

/* HEADER */
.hdr{height:var(--hh);display:flex;align-items:center;justify-content:space-between;padding:0 24px;background:rgba(8,8,11,.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.light .hdr{background:rgba(245,245,240,.96);}
.logo{display:flex;align-items:center;gap:9px;text-decoration:none;}
.logo-box{width:32px;height:32px;background:var(--orange);border-radius:8px;display:flex;align-items:center;justify-content:center;}
.logo-box svg{width:13px;height:15px;}
.logo-name{font-family:Syne,serif;font-size:16px;font-weight:800;color:var(--text);}
.logo-name span{color:var(--orange);}
.nav{display:flex;align-items:center;gap:8px;}
.nav a{font-size:13px;color:var(--text2);padding:7px 12px;border-radius:8px;transition:all .15s;font-weight:500;}
.nav a:hover{color:var(--orange);}
.nav .home-btn{background:var(--orange);color:#fff;font-weight:700;border-radius:9px;}
.nav .home-btn:hover{background:var(--orange2);color:#fff;}
.theme-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text2);width:34px;height:34px;border-radius:8px;cursor:pointer;font-size:15px;}
@media(max-width:600px){.nav a:not(.home-btn){display:none;}}

/* LAYOUT */
.wrap{display:flex;min-height:calc(100vh - var(--hh));}
.sidebar{width:210px;flex-shrink:0;border-right:1px solid var(--border);padding:16px 12px;position:sticky;top:var(--hh);height:calc(100vh - var(--hh));overflow-y:auto;scrollbar-width:thin;}
@media(max-width:860px){.sidebar{display:none;}}
.sb-label{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:8px;margin-top:16px;}
.sb-label:first-child{margin-top:0;}
.cbtn{display:flex;align-items:center;gap:6px;width:100%;padding:7px 10px;background:none;border:none;border-radius:9px;cursor:pointer;font-family:sans-serif;font-size:13px;color:var(--text2);transition:all .15s;text-align:left;}
.cbtn:hover{background:var(--surface2);color:var(--text);}
.cbtn.active{background:rgba(255,98,36,.1);color:var(--orange);}
.cico{font-size:14px;flex-shrink:0;}
.ccnt{margin-left:auto;font-size:11px;color:var(--text3);}
.tag-cloud{display:flex;flex-wrap:wrap;gap:5px;}
.tpill{font-size:11px;background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:4px 9px;border-radius:10px;cursor:pointer;transition:all .15s;}
.tpill:hover,.tpill.active{background:rgba(255,98,36,.1);border-color:var(--orange);color:var(--orange);}

/* MOBILE CAT BAR */
.mob-cats{display:none;overflow-x:auto;gap:8px;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:var(--hh);z-index:40;scrollbar-width:none;}
.mob-cats::-webkit-scrollbar{display:none;}
@media(max-width:860px){.mob-cats{display:flex;}}
.mob-cats .cbtn{flex-shrink:0;white-space:nowrap;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:6px 14px;}
.mob-cats .cbtn.active{background:var(--orange);border-color:var(--orange);color:#fff;}

/* MAIN */
.main{flex:1;min-width:0;padding:16px 20px;}
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
.srch{flex:1;min-width:180px;background:var(--surface);border:1px solid var(--border2);color:var(--text);padding:10px 14px;border-radius:10px;font-family:sans-serif;font-size:14px;outline:none;}
.srch:focus{border-color:var(--orange);}
.srch::placeholder{color:var(--text3);}
select{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:9px;font-family:sans-serif;font-size:13px;cursor:pointer;}
.rcnt{font-size:13px;color:var(--text2);margin-bottom:14px;}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;transition:border .2s;animation:fadeUp .3s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.card:hover{border-color:var(--border2);}
.feat-card{border-color:rgba(255,98,36,.25);}
.ctop{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px;}
.cname{font-family:Syne,serif;font-size:15px;font-weight:800;color:var(--text);line-height:1.25;}
.favbtn{background:none;border:none;cursor:pointer;font-size:18px;color:var(--text3);flex-shrink:0;padding:0;}
.favbtn.on{color:#e84e0e;}
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:3px 9px;border-radius:8px;margin-bottom:8px;}
.bc{background:rgba(0,204,170,.1);color:var(--teal);}
.bm{background:rgba(139,92,246,.1);color:var(--violet);}
.bo{background:rgba(255,98,36,.1);color:var(--orange);}
.cprev{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.ctags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px;}
.ctag{font-size:10px;background:var(--surface2);color:var(--text3);padding:3px 8px;border-radius:6px;}
.cfoot{display:flex;gap:8px;}
.bcopy{flex:1;background:var(--orange);color:#fff;border:none;padding:9px;border-radius:9px;cursor:pointer;font-family:sans-serif;font-size:13px;font-weight:700;transition:background .15s;}
.bcopy:hover{background:var(--orange2);}
.bprev{background:var(--surface2);border:1px solid var(--border2);color:var(--text2);padding:9px 14px;border-radius:9px;cursor:pointer;font-family:sans-serif;font-size:13px;font-weight:600;white-space:nowrap;transition:all .15s;}
.bprev:hover{border-color:var(--orange);color:var(--orange);}
.empty{text-align:center;padding:60px 20px;color:var(--text2);}
.empty-e{font-size:40px;display:block;margin-bottom:12px;}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center;padding:20px;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:18px;width:100%;max-width:600px;max-height:85vh;overflow-y:auto;padding:28px;}
.mhead{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:16px;}
.mtitle{font-family:Syne,serif;font-size:20px;font-weight:800;color:var(--text);}
.mclose{background:var(--surface2);border:1px solid var(--border);color:var(--text2);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:18px;flex-shrink:0;}
.mmeta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.mpill{font-size:11px;background:var(--surface2);border:1px solid var(--border);color:var(--text3);padding:3px 10px;border-radius:8px;}
.mtext{font-size:13px;color:var(--text2);line-height:1.75;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;white-space:pre-wrap;font-family:'Fira Code','Courier New',monospace;margin-bottom:14px;}
.mfoot{display:flex;gap:8px;}
.mfoot button{flex:1;padding:11px;border-radius:10px;cursor:pointer;font-family:sans-serif;font-size:14px;font-weight:700;}
#mCopyBtn{background:var(--orange);color:#fff;border:none;}
#mCopyBtn:hover{background:var(--orange2);}
#mFavBtn{background:var(--surface2);border:1px solid var(--border2);color:var(--text2);}

/* ── MOBILE FIXES ── */
body{overflow-x:hidden;}
@media(max-width:768px){
  button,input,select,textarea{font-size:16px!important;}
  button.act-btn,button.build-btn,.bcopy,.bprev{min-height:48px;}
}
/* ── Bottom Nav ── */
.bottom-nav {
  display: flex;
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  z-index: 200; height: 60px;
  padding: 0;
}
.bn-item {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 3px; text-decoration: none;
  color: var(--text3); font-size: 10px; font-weight: 600;
  border-top: 2px solid transparent;
  transition: color .15s; cursor: pointer;
  -webkit-tap-highlight-color: rgba(255,98,36,.1);
  touch-action: manipulation;
  font-family: 'Instrument Sans', sans-serif;
}
.bn-item.active { color: var(--orange); border-top-color: var(--orange); }
.bn-item:hover  { color: var(--text2); }
.bn-icon { font-size: 22px; line-height: 1; }
/* Pad main content above bottom nav on mobile */
.main-wrap { padding-bottom: 70px; }
@media (min-width: 900px) {
  .bottom-nav { display: none; }
  .main-wrap  { padding-bottom: 0; }
}


/* ── Phosphor Icons ── */
.ph { font-size: inherit; line-height: 1; display: inline-block; }
.bn-icon.ph { font-size: 22px; line-height: 1; display: block; }

/* ── Share button ── */
.bshare {
  background: var(--s2);
  border: 1px solid var(--border2);
  color: var(--text2);
  width: 34px;
  height: 34px;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  transition: all .15s;
  flex-shrink: 0;
  touch-action: manipulation;
}
.bshare:hover { border-color: var(--orange); color: var(--orange); }

/* Also add share to modal */
.modal-share {
  background: var(--s2);
  border: 1px solid var(--border2);
  color: var(--text2);
  height: 40px;
  padding: 0 14px;
  border-radius: 9px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  font-weight: 600;
  font-family: 'Instrument Sans', sans-serif;
  transition: all .15s;
}
.modal-share:hover { border-color: var(--orange); color: var(--orange); }

/* ── Share Popover ── */
.share-popover {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 16px; padding: 18px; z-index: 1000;
  min-width: 280px; box-shadow: 0 8px 32px rgba(0,0,0,.5);
  animation: fadeUp .2s ease;
}
.sp-title {
  font-family: 'Syne', serif; font-weight: 800; font-size: 13px;
  color: var(--text); margin-bottom: 14px;
}
.sp-grid {
  display: grid; grid-template-columns: repeat(4,1fr);
  gap: 8px; margin-bottom: 12px;
}
.sp-btn {
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  padding: 10px 6px; background: var(--s2); border: 1px solid var(--border2);
  border-radius: 10px; text-decoration: none; cursor: pointer;
  color: var(--text2); font-size: 9px; font-weight: 700;
  font-family: 'Instrument Sans', sans-serif;
  transition: border-color .15s, color .15s;
}
.sp-btn:hover { border-color: var(--orange); color: var(--orange); }
.sp-btn span { font-size: 9px; font-weight: 700; }
.sp-close {
  width: 100%; background: none; border: 1px solid var(--border2);
  color: var(--text3); padding: 9px; border-radius: 9px;
  font-size: 12px; cursor: pointer; font-family: 'Instrument Sans', sans-serif;
  transition: all .15s;
}
.sp-close:hover { border-color: var(--orange); color: var(--orange); }

/* ── OpenArt affiliate button ── */
.bopenart {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 0 10px;
  height: 34px;
  background: linear-gradient(135deg, #e11d48, #7c3aed);
  color: #fff;
  border-radius: 8px;
  font-size: 11px;
  font-weight: 700;
  text-decoration: none;
  transition: opacity .15s;
  white-space: nowrap;
  font-family: 'Instrument Sans', sans-serif;
  flex-shrink: 0;
}
.bopenart:hover { opacity: .85; color: #fff; }

/* ── Share Popover — bulletproof ── */
.share-popover {
  position: fixed !important;
  bottom: 90px !important;
  left: 50% !important;
  transform: translateX(-50%) !important;
  background: var(--surface) !important;
  border: 1.5px solid var(--orange) !important;
  border-radius: 16px !important;
  padding: 18px !important;
  z-index: 9999 !important;
  min-width: 290px !important;
  max-width: 360px !important;
  width: calc(100vw - 40px) !important;
  box-shadow: 0 8px 40px rgba(0,0,0,.6) !important;
  animation: fadeUp .15s ease !important;
}

/* ── Mobile category pills ── */
.search-row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 10px;
}
.search-row .srch { flex: 1; margin-bottom: 0; }
.srch-clear {
  background: var(--s2); border: 1px solid var(--border2);
  color: var(--text3); width: 36px; height: 36px;
  border-radius: 8px; cursor: pointer; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.srch-clear:hover { border-color: var(--orange); color: var(--orange); }

.mob-cats {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  scrollbar-width: none;
  padding-bottom: 4px;
  -webkit-overflow-scrolling: touch;
}
.mob-cats::-webkit-scrollbar { display: none; }
.mob-cat {
  flex-shrink: 0;
  padding: 6px 12px;
  border-radius: 20px;
  border: 1px solid var(--border2);
  background: var(--surface);
  font-size: 11px;
  font-weight: 600;
  color: var(--text2);
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
  font-family: 'Instrument Sans', sans-serif;
  touch-action: manipulation;
  -webkit-tap-highlight-color: rgba(255,98,36,.1);
}
.mob-cat.active {
  background: rgba(255,98,36,.1);
  border-color: rgba(255,98,36,.35);
  color: var(--orange);
}
.mob-cat:hover { border-color: var(--border); color: var(--text); }

/* Hide mob-cats on desktop (sidebar handles it) */
@media (min-width: 860px) {
  .mob-cats { display: none; }
  .search-row { margin-bottom: 0; }
}
/* On mobile hide the sidebar */
@media (max-width: 860px) {
  .sidebar { display: none; }
}

<script>
var favs = JSON.parse(localStorage.getItem('pa_favs')||'[]');
var activeCat = 'All';
var activeTag = '';
var curModal = null;
var theme = localStorage.getItem('pa_theme')||'dark';
if(theme==='light') document.body.classList.add('light');

function openSaved(e){
  if(e) e.preventDefault();
  var ids = [];
  try { ids = JSON.parse(localStorage.getItem('pa_favs')||'[]'); } catch(err){}
  var texts = [];
  try { texts = JSON.parse(localStorage.getItem('pa_saved_text')||'[]'); } catch(err){}
  var total = ids.length + texts.length;
  if(!total){ alert('No saved prompts yet. Tap the heart on any prompt to save it.'); return; }
  var msg = '★ You have '+total+' saved prompt'+(total>1?'s':'')+'.\n\nGo to the homepage to view, copy and download them as PDF.';
  if(confirm(msg + '\n\nOpen homepage now?')){ window.location.href = '/?saved=1'; }
}

function toggleTheme(){
  localStorage.setItem('pa_theme', theme==='dark'?'light':'dark');
  location.reload();
}

var CATS = ['All','Writing & Content','Video & Film','Business & Marketing','Image Generation',
  'Code & Tech','Creative & Art','Education & Learning','AI Agents','Other',
  'Wellness','Health','Photography','Real Estate','Legal'];

var CAT_ICONS = {'All':'✦','Writing & Content':'✍️','Business & Marketing':'💼',
  'Image Generation':'🎨','Code & Tech':'💻','Creative & Art':'🎭',
  'Education & Learning':'📚','AI Agents':'🤖','Other':'⚙️',
  'Wellness':'🧘','Health':'💊','Photography':'📸','Real Estate':'🏠','Legal':'⚖️'};

function renderMobCats(){
  var el = document.getElementById('mobCats');
  if (!el) return;
  var catSet = {};
  if (Array.isArray(PROMPTS)) {
    PROMPTS.forEach(function(p){ catSet[p.cat] = 1; });
  }
  var cats = ['All'].concat(Object.keys(catSet).sort());
  var html = '';
  for (var i = 0; i < cats.length; i++) {
    var c = cats[i];
    var active = (activeCat === c) ? ' active' : '';
    html += '<button class="mob-cat' + active + '" data-cat="' + c.replace(/"/g,'&quot;') + '" onclick="setMobCat(this)">' + c + '</button>';
  }
  el.innerHTML = html;
}


function setMobCat(btn){
  activeCat = btn.getAttribute('data-cat');
  renderCats();
  renderMobCats();
  renderCards();
  // Scroll to grid
  var g = document.getElementById('mainGrid');
  if(g) setTimeout(function(){ g.scrollIntoView({behavior:'smooth',block:'start'}); }, 100);
}

function clearSearch(){
  document.getElementById('searchInput').value='';
  document.getElementById('srchClear').style.display='none';
  renderCards();
}

function renderCats(){
  var h='';
  for(var i=0;i<CATS.length;i++){
    var n=CATS[i];
    var cnt = n==='All' ? (Array.isArray(PROMPTS)?PROMPTS.length:0) : (Array.isArray(PROMPTS)?PROMPTS.filter(function(p){return p.cat===n;}).length:0);
    var cls = 'cbtn'+(activeCat===n?' active':'');
    h+='<button class="'+cls+'" onclick="setCat(\''+n+'\')"><span class="cico">'+(CAT_ICONS[n]||'•')+'</span>'+n+'<span class="ccnt">'+cnt+'</span></button>';
  }
  var d=document.getElementById('catList'); if(d) d.innerHTML=h;
  var m=document.getElementById('mobCats'); if(m) m.innerHTML=h;
}

function renderTags(){
  var ts={};
  PROMPTS.forEach(function(p){(p.tags||[]).forEach(function(t){ts[t]=1;});});
  var arr=Object.keys(ts).sort();
  var h='';
  for(var i=0;i<arr.length;i++){
    var t=arr[i];
    var active=activeTag===t?' active':'';
    h+='<span class="tpill'+active+'" data-tag="'+t.replace(/"/g,'&quot;')+'" onclick="setTagEl(this)">'+t+'</span>';
  }
  var el=document.getElementById('tagCloud');
  if(el) el.innerHTML=h;
}

function getList(){
  var q=document.getElementById('searchInput').value.toLowerCase().trim();
  var s=document.getElementById('sortSel').value;
  var list=Array.isArray(PROMPTS)?PROMPTS.slice():[];
  if(activeCat!=='All') list=list.filter(function(p){return p.cat===activeCat;});
  if(activeTag) list=list.filter(function(p){return p.tags.indexOf(activeTag)!==-1;});
  if(q) list=list.filter(function(p){
    var ql=q.toLowerCase();
    return p.name.toLowerCase().indexOf(ql)!==-1
      ||p.cat.toLowerCase().indexOf(ql)!==-1
      ||(p.tags||[]).some(function(t){return t.toLowerCase().indexOf(ql)!==-1;})
      ||p.text.toLowerCase().indexOf(ql)!==-1;
  });
  if(s==='oldest') list.sort(function(a,b){return parseInt(a.id)-parseInt(b.id);});
  else if(s==='newest') list.sort(function(a,b){return parseInt(b.id)-parseInt(a.id);});
  else list.sort(function(a,b){return a.name.localeCompare(b.name);});
  return list;
}

function renderCards(){
  var list=getList();
  var rc=document.getElementById('rcnt');
  if(rc) rc.innerHTML='Showing <strong>'+list.length+'</strong> of <strong>'+PROMPTS.length+'</strong> prompts';
  var g=document.getElementById('mainGrid');
  if(!g) return;
  if(!list.length){g.innerHTML='<div class="empty"><i class="ph ph-magnifying-glass" style="font-size:40px;color:var(--text3);"></i><h3>No prompts found</h3><p>Try different keywords.</p></div>';return;}
  var h='';
  for(var i=0;i<list.length;i++) h+=makeCard(list[i],i);
  g.innerHTML=h;
}

function makeCard(p,i){
  var fav = favs.indexOf(p.id) !== -1;
  var isImg = p.cat === 'Image Generation' || p.tool === 'midjourney';
  var bc = p.tool==='chatgpt' ? 'bc' : p.tool==='midjourney' ? 'bm' : 'bo';
  var tl = p.tool==='chatgpt' ? 'ChatGPT' : p.tool==='midjourney' ? 'Midjourney' : 'Other';
  var prev = (p.text.length>130 ? p.text.slice(0,130)+'\u2026' : p.text).replace(/\n/g,' ');
  var tags = '';
  var ptags = p.tags||[];
  for(var t=0; t<Math.min(ptags.length,3); t++){
    tags += '<span class="ctag" data-tag="'+ptags[t].replace(/"/g,'&quot;')+'" onclick="setTagEl(this)">'+ptags[t]+'</span>';
  }
  var oaUrl='https://openart.ai/home?utm_source=tolt&utm_medium=affiliate&utm_campaign=affiliate-tolt--acq-web&via=wilsonjg';
  var oaBtn=isImg?'<a class="bopenart" href="'+oaUrl+'" target="_blank" rel="noopener">✴ Try on OpenArt</a>':'';
  return [
    '<div class="card'+(p.feat?' feat-card':'')+'" style="animation-delay:'+Math.min(i*.03,.4)+'s">',
    '<div class="ctop"><div class="cname">'+p.name+'</div>',
    '<button class="favbtn'+(fav?' on':'')+'" data-id="'+p.id+'" onclick="toggleFav(event,this)">'+(fav?'<i class="ph ph-heart-fill"></i>':'<i class="ph ph-heart"></i>')+'</button>',
    '</div>',
    '<span class="badge '+bc+'">'+tl+'</span>',
    '<div class="cprev">'+prev+'</div>',
    '<div class="ctags">'+tags+'</div>',
    '<div class="cfoot">',
    '<button class="bcopy" data-id="'+p.id+'" onclick="copyPrompt(event,this)"><i class="ph ph-copy"></i> Copy</button>',
    '<button class="bshare" data-id="'+p.id+'" onclick="sharePrompt(event,this)"><i class="ph ph-share-network"></i></button>',
    oaBtn,
    '<button class="bprev" data-id="'+p.id+'" onclick="openModal(this.dataset.id)">Preview →</button>',
    '</div></div>'
  ].join('');
}

function setCat(n){activeCat=n;activeTag='';renderCats();renderCards();}
function setTag(t){activeTag=activeTag===t?'':t;renderTags();renderCards();}
function setTagEl(el){
  var t=el.getAttribute('data-tag');
  activeTag=activeTag===t?'':t;
  renderTags();
  renderCards();
  // Scroll to grid
  var g=document.getElementById('mainGrid');
  if(g) g.scrollIntoView({behavior:'smooth',block:'start'});
}

function sharePrompt(e, btn) {
  e.stopPropagation();
  var id = btn.getAttribute('data-id');
  var p = PROMPTS.find(function(x){ return x.id === id; });
  if (!p) return;

  var shareText = p.name + ' — Free AI Prompt on Promptaholics';
  var shareUrl  = 'https://promptaholics.com/library.html?cat=' + encodeURIComponent(p.cat);
  var fullText  = shareText + '\n\n' + p.text.slice(0, 200) + '...';

  // Mobile — use native share
  if (navigator.share) {
    navigator.share({ title: p.name, text: fullText, url: shareUrl }).catch(function(){});
    return;
  }

  // Remove existing popover
  var existing = document.getElementById('sharePopover');
  if (existing) { existing.remove(); return; }

  var xUrl = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(shareText + ' ' + shareUrl);
  var waUrl = 'https://wa.me/?text=' + encodeURIComponent(fullText + '\n' + shareUrl);
  var liUrl = 'https://www.linkedin.com/sharing/share-offsite/?url=' + encodeURIComponent(shareUrl);

  var div = document.createElement('div');
  div.id = 'sharePopover';
  div.setAttribute('data-url', shareUrl);
  div.className = 'share-popover';
  div.innerHTML =
    '<div class="sp-title">Share this prompt</div>' +
    '<div class="sp-grid">' +
      '<a class="sp-btn" href="' + xUrl + '" target="_blank" rel="noopener">' +
        '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.748l7.73-8.835L1.254 2.25H8.08l4.262 5.636 5.902-5.636zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>' +
        '<span>X</span>' +
      '</a>' +
      '<a class="sp-btn" href="' + waUrl + '" target="_blank" rel="noopener">' +
        '<svg width="20" height="20" viewBox="0 0 24 24" fill="#25D366"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413z"/></svg>' +
        '<span>WhatsApp</span>' +
      '</a>' +
      '<a class="sp-btn" href="' + liUrl + '" target="_blank" rel="noopener">' +
        '<svg width="20" height="20" viewBox="0 0 24 24" fill="#0A66C2"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>' +
        '<span>LinkedIn</span>' +

        '<i class="ph ph-link" style="font-size:20px;"></i>' +
        '<span id="copyLinkTxt">Copy Link</span>' +
      '</button>' +
    '</div>' +
    '<button class="sp-close" id="spClose">Close</button>';

  document.body.appendChild(div);
  document.getElementById('spClose').onclick = function(e){ e.stopPropagation(); div.remove(); };

  // Use mousedown with longer delay to avoid catching the button click
  setTimeout(function(){
    function closeIt(ev){
      var pop = document.getElementById('sharePopover');
      if(!pop) { document.removeEventListener('mousedown', closeIt); return; }
      if(!pop.contains(ev.target)){
        pop.remove();
        document.removeEventListener('mousedown', closeIt);
      }
    }
    document.addEventListener('mousedown', closeIt);
  }, 300);
}


function copyShareLink() {
  var pop = document.getElementById('sharePopover');
  var url = pop ? pop.getAttribute('data-url') : location.href;
  navigator.clipboard.writeText(url).then(function(){
    var el = document.getElementById('copyLinkTxt');
    if(el){ el.textContent = '✅'; setTimeout(function(){ el.textContent='Copy Link'; }, 2000); }
  });
}

function copyPrompt(e,btn){
  e.stopPropagation();
  var id=typeof btn==='string'?btn:btn.getAttribute('data-id');
  var p=PROMPTS.find(function(x){return x.id===id;});
  if(!p) return;
  // Auto-save to pa_favs when copied
  if(favs.indexOf(id)===-1){
    favs.push(id);
    localStorage.setItem('pa_favs',JSON.stringify(favs));
    renderCards();
  }
  var btn=e.target;
  var orig=btn.innerHTML;
  if(navigator.clipboard){
    navigator.clipboard.writeText(p.text).then(function(){
      btn.innerHTML='✅ Saved!';
      setTimeout(function(){btn.innerHTML=orig;},2000);
    });
  } else {
    var ta=document.createElement('textarea');
    ta.value=p.text; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    btn.innerHTML='✅ Saved!';
    setTimeout(function(){btn.innerHTML=orig;},2000);
  }
}
function toggleFav(e,btn){
  e.stopPropagation();
  var id=typeof btn==='string'?btn:btn.getAttribute('data-id');
  var i=favs.indexOf(id);
  if(i===-1) favs.push(id); else favs.splice(i,1);
  localStorage.setItem('pa_favs',JSON.stringify(favs));
  renderCards();
}

function openModal(id){
  var p=PROMPTS.find(function(x){return x.id===id;});
  if(!p) return;
  curModal=p;
  document.getElementById('mTitle').textContent=p.name;
  document.getElementById('mCat').textContent=p.cat;
  document.getElementById('mTool').textContent=p.tool==='chatgpt'?'🤖 ChatGPT':p.tool==='midjourney'?'🎨 Midjourney':'⚙️ Other';
  document.getElementById('mText').textContent=p.text;
  document.getElementById('mFavBtn').innerHTML=favs.indexOf(id)!==-1?'<i class="ph ph-heart-fill"></i> Saved':'<i class="ph ph-heart"></i> Save';
  var ov=document.getElementById('overlay');
  ov.style.display='flex';
  document.body.style.overflow='hidden';
}
function closeModal(){
  document.getElementById('overlay').style.display='none';
  document.body.style.overflow='';
}
function modalCopy(){
  // Auto-save to pa_favs
  if(curModal && curModal.id && favs.indexOf(curModal.id)===-1){
    favs.push(curModal.id);
    localStorage.setItem('pa_favs',JSON.stringify(favs));
  }
  if(!curModal) return;
  var btn=document.getElementById('mCopyBtn');
  if(navigator.clipboard){
    navigator.clipboard.writeText(curModal.text).then(function(){
      btn.innerHTML='✅ Copied!';setTimeout(function(){btn.innerHTML='<i class="ph ph-copy"></i> Copy Prompt';},2000);
    });
  } else {
    var ta=document.createElement('textarea');
    ta.value=curModal.text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
    btn.innerHTML='✅ Copied!';setTimeout(function(){btn.innerHTML='<i class="ph ph-copy"></i> Copy Prompt';},2000);
  }
}
function modalShare(){
  var btn = document.getElementById('mShareBtn');
  if(!btn || !curModal) return;
  var shareEl = document.createElement('button');
  shareEl.setAttribute('data-id', curModal.id);
  sharePrompt({stopPropagation:function(){}}, shareEl);
}

function modalFav(){
  if(!curModal) return;
  var i=favs.indexOf(curModal.id);
  if(i===-1) favs.push(curModal.id); else favs.splice(i,1);
  localStorage.setItem('pa_favs',JSON.stringify(favs));
  document.getElementById('mFavBtn').innerHTML=favs.indexOf(curModal.id)!==-1?'<i class="ph ph-heart-fill"></i> Saved':'<i class="ph ph-heart"></i> Save';
  renderCards();
}

// BOOT
document.addEventListener('DOMContentLoaded', function(){
  var tb=document.getElementById('themeBtn');
  if(tb) tb.innerHTML=theme==='light'?'<i class="ph ph-sun"></i>':'<i class="ph ph-moon"></i>';

  // Read ?cat= URL param
  var params = new URLSearchParams(window.location.search);
  var catParam = params.get('cat');
  if(catParam){
    activeCat = decodeURIComponent(catParam.replace(/\+/g,' '));
  }

  // Wait for PROMPTS to load then render
  function init(){
    if(typeof PROMPTS !== 'undefined' && Array.isArray(PROMPTS) && PROMPTS.length){
      renderCats();
      renderMobCats();
      renderTags();
      renderCards();
      if(catParam){
        setTimeout(function(){
          var grid = document.getElementById('mainGrid');
          if(grid) grid.scrollIntoView({behavior:'smooth',block:'start'});
        }, 200);
      }
    } else {
      setTimeout(init, 50);
    }
  }
  init();
});
