<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#08080b;--surface:#111116;--surface2:#18181f;--surface3:#1e1e27;
  --border:#1f1f2a;--border2:#2a2a38;
  --text:#f0f0f8;--text2:#9999b0;--text3:#4a4a62;
  --orange:#ff6224;--orange2:#e84e0e;
  --teal:#00ccaa;--violet:#8b5cf6;
  --hh:60px;
}
.light{--bg:#f5f5f0;--surface:#fff;--surface2:#efefea;--surface3:#e5e5e0;--border:#e0ddd6;--border2:#c8c4bc;--text:#18170f;--text2:#58554e;--text3:#9a9590;}
body{background:var(--bg);color:var(--text);font-family:'Instrument Sans',sans-serif;min-height:100vh;}
a{color:var(--orange);text-decoration:none;}

/* HEADER */
.hdr{height:var(--hh);display:flex;align-items:center;justify-content:space-between;padding:0 24px;background:rgba(8,8,11,.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.light .hdr{background:rgba(245,245,240,.96);}
.logo{display:flex;align-items:center;gap:9px;text-decoration:none;}
.logo-box{width:32px;height:32px;background:var(--orange);border-radius:8px;display:flex;align-items:center;justify-content:center;}
.logo-box svg{width:13px;height:15px;}
.logo-name{font-family:'Syne',serif;font-size:16px;font-weight:800;color:var(--text);}
.logo-name span{color:var(--orange);}
.nav{display:flex;align-items:center;gap:8px;}
.nav a{font-size:13px;color:var(--text2);padding:7px 12px;border-radius:8px;transition:all .15s;font-weight:500;}
.nav a:hover{color:var(--orange);}
.nav .home-btn{background:var(--orange);color:#fff;font-weight:700;border-radius:9px;}
.nav .home-btn:hover{background:var(--orange2);color:#fff;}
.theme-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text2);width:34px;height:34px;border-radius:8px;cursor:pointer;font-size:15px;}
@media(max-width:600px){.nav a:not(.home-btn){display:none;}}

/* LAYOUT */
.wrap{display:flex;min-height:calc(100vh - var(--hh));}
.sidebar{width:210px;flex-shrink:0;border-right:1px solid var(--border);padding:16px 12px;position:sticky;top:var(--hh);height:calc(100vh - var(--hh));overflow-y:auto;scrollbar-width:thin;}
@media(max-width:860px){.sidebar{display:none;}}
.sb-label{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:8px;margin-top:16px;}
.sb-label:first-child{margin-top:0;}
.cbtn{display:flex;align-items:center;gap:6px;width:100%;padding:7px 10px;background:none;border:none;border-radius:9px;cursor:pointer;font-family:'Instrument Sans',sans-serif;font-size:13px;color:var(--text2);transition:all .15s;text-align:left;}
.cbtn:hover{background:var(--surface2);color:var(--text);}
.cbtn.active{background:rgba(255,98,36,.1);color:var(--orange);}
.cico{font-size:14px;flex-shrink:0;}
.ccnt{margin-left:auto;font-size:11px;color:var(--text3);}
.tag-cloud{display:flex;flex-wrap:wrap;gap:5px;}
.tpill{font-size:11px;background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:4px 9px;border-radius:10px;cursor:pointer;transition:all .15s;}
.tpill:hover,.tpill.active{background:rgba(255,98,36,.1);border-color:var(--orange);color:var(--orange);}

/* MOBILE CAT BAR */
.mob-cats{display:none;overflow-x:auto;gap:8px;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:var(--hh);z-index:40;scrollbar-width:none;}
.mob-cats::-webkit-scrollbar{display:none;}
@media(max-width:860px){.mob-cats{display:flex;}}
.mob-cats .cbtn{flex-shrink:0;white-space:nowrap;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:6px 14px;}
.mob-cats .cbtn.active{background:var(--orange);border-color:var(--orange);color:#fff;}

/* MAIN */
.main{flex:1;min-width:0;padding:16px 20px;}
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
.srch{flex:1;min-width:180px;background:var(--surface);border:1px solid var(--border2);color:var(--text);padding:10px 14px;border-radius:10px;font-family:'Instrument Sans',sans-serif;font-size:14px;outline:none;}
.srch:focus{border-color:var(--orange);}
.srch::placeholder{color:var(--text3);}
select{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:9px;font-family:'Instrument Sans',sans-serif;font-size:13px;cursor:pointer;}
.rcnt{font-size:13px;color:var(--text2);margin-bottom:14px;}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;transition:border .2s;animation:fadeUp .3s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.card:hover{border-color:var(--border2);}
.feat-card{border-color:rgba(255,98,36,.25);}
.ctop{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px;}
.cname{font-family:'Syne',serif;font-size:15px;font-weight:800;color:var(--text);line-height:1.25;}
.favbtn{background:none;border:none;cursor:pointer;font-size:18px;color:var(--text3);flex-shrink:0;padding:0;}
.favbtn.on{color:#e84e0e;}
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:3px 9px;border-radius:8px;margin-bottom:8px;}
.bc{background:rgba(0,204,170,.1);color:var(--teal);}
.bm{background:rgba(139,92,246,.1);color:var(--violet);}
.bo{background:rgba(255,98,36,.1);color:var(--orange);}
.cprev{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.ctags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px;}
.ctag{font-size:10px;background:var(--surface2);color:var(--text3);padding:3px 8px;border-radius:6px;}
.cfoot{display:flex;gap:8px;}
.bcopy{flex:1;background:var(--orange);color:#fff;border:none;padding:9px;border-radius:9px;cursor:pointer;font-family:'Instrument Sans',sans-serif;font-size:13px;font-weight:700;transition:background .15s;}
.bcopy:hover{background:var(--orange2);}
.bprev{background:var(--surface2);border:1px solid var(--border2);color:var(--text2);padding:9px 14px;border-radius:9px;cursor:pointer;font-family:'Instrument Sans',sans-serif;font-size:13px;font-weight:600;white-space:nowrap;transition:all .15s;}
.bprev:hover{border-color:var(--orange);color:var(--orange);}
.empty{text-align:center;padding:60px 20px;color:var(--text2);}
.empty-e{font-size:40px;display:block;margin-bottom:12px;}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center;padding:20px;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:18px;width:100%;max-width:600px;max-height:85vh;overflow-y:auto;padding:28px;}
.mhead{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:16px;}
.mtitle{font-family:'Syne',serif;font-size:20px;font-weight:800;color:var(--text);}
.mclose{background:var(--surface2);border:1px solid var(--border);color:var(--text2);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:18px;flex-shrink:0;}
.mmeta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.mpill{font-size:11px;background:var(--surface2);border:1px solid var(--border);color:var(--text3);padding:3px 10px;border-radius:8px;}
.mtext{font-size:13px;color:var(--text2);line-height:1.75;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;white-space:pre-wrap;font-family:'Fira Code','Courier New',monospace;margin-bottom:14px;}
.mfoot{display:flex;gap:8px;}
.mfoot button{flex:1;padding:11px;border-radius:10px;cursor:pointer;font-family:'Instrument Sans',sans-serif;font-size:14px;font-weight:700;}
#mCopyBtn{background:var(--orange);color:#fff;border:none;}
#mCopyBtn:hover{background:var(--orange2);}
#mFavBtn{background:var(--surface2);border:1px solid var(--border2);color:var(--text2);}
</style>
</head>
<body>

<header class="hdr">
  <a class="logo" href="/">
    <div class="logo-box"><svg viewBox="0 0 22 24" fill="none"><path d="M3 2h8a5 5 0 0 1 0 10H3V2z" fill="white" fill-opacity=".9"/><path d="M14 13l-5 10 4.5-5.5H9.5L14 7l-4.5 5.5H14z" fill="white"/></svg></div>
    <div class="logo-name">Prompt<span>aholics</span></div>
  </a>
  <div class="nav">
    <a href="/">Home</a>
    <a href="creationstation.html" target="_blank">⚡ AI Tools</a>
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">🌙</button>
    <a href="/" class="home-btn">← Home</a>
  </div>
</header>

<div class="mob-cats" id="mobCats"></div>

<div class="wrap">
  <aside class="sidebar">
    <div class="sb-label">Category</div>
    <div id="catList"></div>
    <div class="sb-label">Tags</div>
    <div class="tag-cloud" id="tagCloud"></div>
  </aside>
  <div class="main">
    <div class="toolbar">
      <input class="srch" id="searchInput" type="text" placeholder="Search 382 prompts..." oninput="renderCards()"/>
      <select id="sortSel" onchange="renderCards()">
        <option value="alpha" selected>A → Z</option>
        <option value="newest">Newest</option>
        <option value="oldest">Oldest</option>
      </select>
    </div>
    <div class="rcnt" id="rcnt"></div>
    <div class="grid" id="mainGrid"></div>
  </div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="mhead">
      <div class="mtitle" id="mTitle"></div>
      <button class="mclose" onclick="closeModal()">✕</button>
    </div>
    <div class="mmeta">
      <span class="mpill" id="mCat"></span>
      <span class="mpill" id="mTool"></span>
    </div>
    <div class="mtext" id="mText"></div>
    <div class="mfoot">
      <button id="mCopyBtn" onclick="modalCopy()">📋 Copy Prompt</button>
      <button id="mFavBtn" onclick="modalFav()">♡ Save</button>
    </div>
  </div>
</div>

<script src="prompts.js?v=382"></script>

<!-- Safety check — shows error if prompts.js failed to load -->
<script>
if (typeof PROMPTS === 'undefined' || !Array.isArray(PROMPTS)) {
  document.getElementById('mainGrid').innerHTML = '<div class="empty"><span class="empty-e">⚠️</span><h3>Library failed to load</h3><p>Please hard refresh the page (Ctrl+Shift+R) or <a href="/">return home</a>.</p></div>';
  throw new Error("PROMPTS not defined — prompts.js failed to load");
}
</script>

<script>
var favs = JSON.parse(localStorage.getItem('pa_favs')||'[]');
var activeCat = 'All';
var activeTag = '';
var curModal = null;
var theme = localStorage.getItem('pa_theme')||'dark';
if(theme==='light') document.body.classList.add('light');

function toggleTheme(){
  localStorage.setItem('pa_theme', theme==='dark'?'light':'dark');
  location.reload();
}

var CATS = ['All','Writing & Content','Business & Marketing','Image Generation',
  'Code & Tech','Creative & Art','Education & Learning','AI Agents','Other',
  'Wellness','Health','Photography','Real Estate','Legal'];

var CAT_ICONS = {'All':'✦','Writing & Content':'✍️','Business & Marketing':'💼',
  'Image Generation':'🎨','Code & Tech':'💻','Creative & Art':'🎭',
  'Education & Learning':'📚','AI Agents':'🤖','Other':'⚙️',
  'Wellness':'🧘','Health':'💊','Photography':'📸','Real Estate':'🏠','Legal':'⚖️'};

function renderCats(){
  var h='';
  for(var i=0;i<CATS.length;i++){
    var n=CATS[i];
    var cnt = n==='All' ? (Array.isArray(PROMPTS)?PROMPTS.length:0) : (Array.isArray(PROMPTS)?PROMPTS.filter(function(p){return p.cat===n;}).length:0);
    var cls = 'cbtn'+(activeCat===n?' active':'');
    h+='<button class="'+cls+'" onclick="setCat(\''+n+'\')"><span class="cico">'+(CAT_ICONS[n]||'•')+'</span>'+n+'<span class="ccnt">'+cnt+'</span></button>';
  }
  var d=document.getElementById('catList'); if(d) d.innerHTML=h;
  var m=document.getElementById('mobCats'); if(m) m.innerHTML=h;
}

function renderTags(){
  var ts={};
  PROMPTS.forEach(function(p){(p.tags||[]).forEach(function(t){ts[t]=1;});});
  var arr=Object.keys(ts).sort();
  var h='';
  for(var i=0;i<arr.length;i++){
    h+='<span class="tpill'+(activeTag===arr[i]?' active':'')+'" onclick="setTag(\''+arr[i]+'\')">'+arr[i]+'</span>';
  }
  var el=document.getElementById('tagCloud'); if(el) el.innerHTML=h;
}

function getList(){
  var q=document.getElementById('searchInput').value.toLowerCase().trim();
  var s=document.getElementById('sortSel').value;
  var list=Array.isArray(PROMPTS)?PROMPTS.slice():[];
  if(activeCat!=='All') list=list.filter(function(p){return p.cat===activeCat;});
  if(activeTag) list=list.filter(function(p){return p.tags.indexOf(activeTag)!==-1;});
  if(q) list=list.filter(function(p){
    return p.name.toLowerCase().indexOf(q)!==-1
      ||p.text.toLowerCase().indexOf(q)!==-1
      ||p.cat.toLowerCase().indexOf(q)!==-1
      ||(p.desc||'').toLowerCase().indexOf(q)!==-1
      ||(p.tags||[]).some(function(t){return t.indexOf(q)!==-1;});
  });
  if(s==='oldest') list.sort(function(a,b){return parseInt(a.id)-parseInt(b.id);});
  else if(s==='newest') list.sort(function(a,b){return parseInt(b.id)-parseInt(a.id);});
  else list.sort(function(a,b){return a.name.localeCompare(b.name);});
  return list;
}

function renderCards(){
  var list=getList();
  var rc=document.getElementById('rcnt');
  if(rc) rc.innerHTML='Showing <strong>'+list.length+'</strong> of <strong>'+PROMPTS.length+'</strong> prompts';
  var g=document.getElementById('mainGrid');
  if(!g) return;
  if(!list.length){g.innerHTML='<div class="empty"><span class="empty-e">🔍</span><h3>No prompts found</h3><p>Try different keywords.</p></div>';return;}
  var h='';
  for(var i=0;i<list.length;i++) h+=makeCard(list[i],i);
  g.innerHTML=h;
}

function makeCard(p,i){
  var fav=favs.indexOf(p.id)!==-1;
  var bc=p.tool==='chatgpt'?'bc':p.tool==='midjourney'?'bm':'bo';
  var tl=p.tool==='chatgpt'?'🤖 ChatGPT':p.tool==='midjourney'?'🎨 Midjourney':'⚙️ Other';
  var prev=(p.text.length>130?p.text.slice(0,130)+'…':p.text).replace(/\n/g,' ');
  var tags='';
  var ptags=p.tags||[]; for(var t=0;t<Math.min(ptags.length,4);t++) tags+='<span class="ctag">'+ptags[t]+'</span>';
  return '<div class="card'+(p.feat?' feat-card':'')+'" style="animation-delay:'+Math.min(i*.03,.4)+'s">'
    +'<div class="ctop"><div class="cname">'+p.name+'</div>'
    +'<button class="favbtn'+(fav?' on':'')+'" onclick="toggleFav(event,\''+p.id+'\')"> '+(fav?'♥':'♡')+'</button>'
    +'</div>'
    +'<span class="badge '+bc+'">'+tl+'</span>'
    +'<div class="cprev">'+prev+'</div>'
    +'<div class="ctags">'+tags+'</div>'
    +'<div class="cfoot">'
    +'<button class="bcopy" onclick="copyPrompt(event,\''+p.id+'\')">📋 Copy</button>'
    +'<button class="bprev" onclick="openModal(\''+p.id+'\')">Preview →</button>'
    +'</div></div>';
}

function setCat(n){activeCat=n;activeTag='';renderCats();renderCards();}
function setTag(t){activeTag=activeTag===t?'':t;renderTags();renderCards();}

function copyPrompt(e,id){
  e.stopPropagation();
  var p=PROMPTS.find(function(x){return x.id===id;});
  if(!p) return;
  var btn=e.target;
  var orig=btn.innerHTML;
  if(navigator.clipboard){
    navigator.clipboard.writeText(p.text).then(function(){
      btn.innerHTML='✅ Copied!';
      setTimeout(function(){btn.innerHTML=orig;},2000);
    });
  } else {
    var ta=document.createElement('textarea');
    ta.value=p.text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
    btn.innerHTML='✅ Copied!';setTimeout(function(){btn.innerHTML=orig;},2000);
  }
}

function toggleFav(e,id){
  e.stopPropagation();
  var i=favs.indexOf(id);
  if(i===-1) favs.push(id); else favs.splice(i,1);
  localStorage.setItem('pa_favs',JSON.stringify(favs));
  renderCards();
}

function openModal(id){
  var p=PROMPTS.find(function(x){return x.id===id;});
  if(!p) return;
  curModal=p;
  document.getElementById('mTitle').textContent=p.name;
  document.getElementById('mCat').textContent=p.cat;
  document.getElementById('mTool').textContent=p.tool==='chatgpt'?'🤖 ChatGPT':p.tool==='midjourney'?'🎨 Midjourney':'⚙️ Other';
  document.getElementById('mText').textContent=p.text;
  document.getElementById('mFavBtn').innerHTML=favs.indexOf(id)!==-1?'♥ Saved':'♡ Save';
  var ov=document.getElementById('overlay');
  ov.style.display='flex';
  document.body.style.overflow='hidden';
}
function closeModal(){
  document.getElementById('overlay').style.display='none';
  document.body.style.overflow='';
}
function modalCopy(){
  if(!curModal) return;
  var btn=document.getElementById('mCopyBtn');
  if(navigator.clipboard){
    navigator.clipboard.writeText(curModal.text).then(function(){
      btn.innerHTML='✅ Copied!';setTimeout(function(){btn.innerHTML='📋 Copy Prompt';},2000);
    });
  } else {
    var ta=document.createElement('textarea');
    ta.value=curModal.text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
    btn.innerHTML='✅ Copied!';setTimeout(function(){btn.innerHTML='📋 Copy Prompt';},2000);
  }
}
function modalFav(){
  if(!curModal) return;
  var i=favs.indexOf(curModal.id);
  if(i===-1) favs.push(curModal.id); else favs.splice(i,1);
  localStorage.setItem('pa_favs',JSON.stringify(favs));
  document.getElementById('mFavBtn').innerHTML=favs.indexOf(curModal.id)!==-1?'♥ Saved':'♡ Save';
  renderCards();
}

// BOOT
document.addEventListener('DOMContentLoaded', function(){
  var tb=document.getElementById('themeBtn');
  if(tb) tb.textContent=theme==='light'?'☀️':'🌙';
  renderCats();
  renderTags();
  renderCards();
});
</script>
</body>
</html>
