name: Export Approved Prompts

on:
  schedule:
    - cron: '0 14 * * 1'
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Firebase Admin
        run: npm install firebase-admin

      - name: Run export script
        env:
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
        run: node export-prompts.cjs

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet prompts.js && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "PA Agent"
          git config user.email "promptaholics1@gmail.com"
          git add prompts.js
          git commit -m "Auto-export: prompts.js updated $(date +'%Y-%m-%d')"
          git push

      - name: No new prompts
        if: steps.changes.outputs.changed == 'false'
        run: echo "No new prompts to export."
